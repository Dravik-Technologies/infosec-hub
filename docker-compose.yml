services:

  # ── Shared Database ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-securityapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-securityapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MTSI Hub — SSO portal (port 3010) ───────────────────────────────────────
  hub:
    build:
      context: .
      dockerfile: hub/Dockerfile
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      PORT: 3010
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securityapp}
      SESSION_SECRET: ${HUB_SESSION_SECRET:-hub-local-session-secret-2026-please-change}
      SSO_TOKEN_TTL: 60
      SCORVA_HOST: scorva
      SCORVA_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  # ── SCORVA — Cyber Command Center (port 3000) ────────────────────────────────
  scorva:
    build:
      context: .
      dockerfile: scorva-v1/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securityapp}
      SESSION_SECRET: ${SCORVA_SESSION_SECRET:-scorva-local-session-secret-2026-please-change}
      JWT_SECRET: ${JWT_SECRET:-scorva-local-jwt-secret-2026-please-change}
      JWT_EXPIRES_IN: 8h
      HUB_URL: http://hub:3010
    depends_on:
      postgres:
        condition: service_healthy
      hub:
        condition: service_started

  # ── CRATER API — eMASS RMF backend (port 3001, internal) ────────────────────
  crater-api:
    build:
      context: .
      dockerfile: crater/server/Dockerfile
    restart: unless-stopped
    ports:
      - "${CRATER_API_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securityapp}
      JWT_SECRET: ${JWT_SECRET:-crater-local-jwt-secret-2026-please-change}
      JWT_EXPIRES_IN: 7d
      HUB_URL: http://hub:3010
    depends_on:
      postgres:
        condition: service_healthy
      hub:
        condition: service_started

  # ── CRATER UI — eMASS RMF frontend via nginx (port 3003) ───────────────────
  crater-ui:
    build:
      context: ./crater
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CRATER_UI_PORT:-3003}:3003"
    depends_on:
      - crater-api

  # ── MASH — MTSI Advanced Sentinel Hub (port 8080) ───────────────────────────
  mash:
    build:
      context: .
      dockerfile: security-dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securityapp}
      JWT_SECRET: ${JWT_SECRET:-mash-local-jwt-secret-2026-please-change}
      HUB_URL: http://hub:3010
      HUB_HOST: hub
      HUB_PORT: 3010
    depends_on:
      postgres:
        condition: service_healthy
      hub:
        condition: service_started

  # ── Data Fabric — CIM-ARC platform (port 8081) ──────────────────────────────
  data-fabric:
    build:
      context: .
      dockerfile: data-fabric/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securityapp}
      HUB_URL: http://hub:3010
    depends_on:
      postgres:
        condition: service_healthy
      hub:
        condition: service_started

  # ── LAVA — Network Access Portal (port 3002) ────────────────────────────────
  lava:
    build:
      context: .
      dockerfile: lava/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securityapp}
      SESSION_SECRET: ${LAVA_SESSION_SECRET:-lava-local-session-secret-2026-please-change}
      HUB_URL: http://hub:3010
    depends_on:
      postgres:
        condition: service_healthy
      hub:
        condition: service_started

volumes:
  postgres_data:
    driver: local
