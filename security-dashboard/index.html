/* ════════════════════════════════════════════════════════════════════════════
   VIEW 6 — TIMELINE
   CSS Gantt bars scaled to the full program date range.
════════════════════════════════════════════════════════════════════════════ */
function TimelineView({ data }) {
  // ── Local milestone state (fetched from /api/timeline) ────────────────────
  const [milestones,  setMilestones]  = useState(data.timeline?.milestones || data.milestones || []);
  const [loading,     setLoading]     = useState(false);
  const [fetchError,  setFetchError]  = useState('');

  useEffect(() => {
    async function load() {
      setLoading(true); setFetchError('');
      try {
        const res  = await fetch('/api/timeline', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setMilestones(Array.isArray(json.milestones) ? json.milestones : []);
      } catch (err) { setFetchError(err.message); }
      finally { setLoading(false); }
    }
    load();
  }, []);

  // ── Filter ────────────────────────────────────────────────────────────────
  const [filter, setFilter] = useState('all');
  const FILTERS = ['all','in-progress','complete','upcoming'];

  const filtered = filter === 'all' ? milestones : milestones.filter(m => {
    if (filter === 'upcoming') return m.status !== 'complete' && m.status !== 'in-progress';
    return m.status === filter;
  });

  // ── Gantt bar helpers ─────────────────────────────────────────────────────
  const allDates = milestones
    .flatMap(m => [m.startDate, m.endDate].filter(Boolean))
    .map(d => new Date(d + 'T12:00:00Z').getTime());
  const minTs = allDates.length ? Math.min(...allDates) : Date.now();
  const maxTs = allDates.length ? Math.max(...allDates) : Date.now() + 864e5 * 90;
  const span  = maxTs - minTs || 1;

  const barLeft  = d => !d ? 0 : Math.max(0, ((new Date(d + 'T12:00:00Z').getTime() - minTs) / span) * 100);
  const barWidth = (s, e) => {
    if (!s || !e) return 5;
    return Math.max(1, ((new Date(e + 'T12:00:00Z').getTime() - new Date(s + 'T12:00:00Z').getTime()) / span) * 100);
  };

  // ── Drawer state ──────────────────────────────────────────────────────────
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [drawerMode, setDrawerMode] = useState('create'); // 'create' | 'edit'
  const [editTarget, setEditTarget] = useState(null);
  const EMPTY_FORM = { title: '', site: '', standard: '', status: 'upcoming', percentComplete: '', startDate: '', endDate: '', notes: '' };
  const [form,       setForm]       = useState(EMPTY_FORM);
  const [saving,     setSaving]     = useState(false);
  const [deleting,   setDeleting]   = useState(false);
  const [saveError,  setSaveError]  = useState('');

  function openCreate() {
    setDrawerMode('create'); setEditTarget(null); setForm(EMPTY_FORM); setSaveError(''); setDrawerOpen(true);
  }
  function openEdit(ms) {
    setDrawerMode('edit'); setEditTarget(ms);
    setForm({
      title:           ms.title           || '',
      site:            ms.site            || '',
      standard:        ms.standard        || '',
      status:          ms.status          || 'upcoming',
      percentComplete: ms.percentComplete != null ? String(ms.percentComplete) : '',
      startDate:       ms.startDate       || '',
      endDate:         ms.endDate         || '',
      notes:           ms.notes           || '',
    });
    setSaveError(''); setDrawerOpen(true);
  }
  function closeDrawer() { setDrawerOpen(false); setSaveError(''); }

  // ── Save (create or edit) ─────────────────────────────────────────────────
  async function handleSave(e) {
    e.preventDefault();
    if (!form.title.trim()) { setSaveError('Title is required'); return; }
    setSaving(true); setSaveError('');
    try {
      const payload = { ...form, percentComplete: form.percentComplete !== '' ? Number(form.percentComplete) : 0 };

      if (drawerMode === 'create') {
        const res  = await fetch('/api/timeline/milestones', {
          method: 'POST', headers: AUTH.hdrs(), body: JSON.stringify(payload),
        });
        const json = await safeJson(res);
        setMilestones(prev => [...prev, json.data]);
      } else {
        const id  = editTarget.id || editTarget._id;
        const res = await fetch(`/api/timeline/${id}`, {
          method: 'PATCH', headers: AUTH.hdrs(), body: JSON.stringify(payload),
        });
        const json = await safeJson(res);
        const updated = json.data || { ...editTarget, ...payload };
        setMilestones(prev => prev.map(m => (m.id || m._id) === id ? updated : m));
      }
      closeDrawer();
    } catch (err) { setSaveError(err.message); }
    finally { setSaving(false); }
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function handleDelete() {
    if (!editTarget) return;
    const id = editTarget.id || editTarget._id;
    if (!window.confirm(`Delete "${editTarget.title}"? This cannot be undone.`)) return;
    setDeleting(true); setSaveError('');
    try {
      const res = await fetch(`/api/timeline/milestones/${id}`, {
        method: 'DELETE', headers: AUTH.hdrs(),
      });
      await safeJson(res);
      setMilestones(prev => prev.filter(m => (m.id || m._id) !== id));
      closeDrawer();
    } catch (err) { setSaveError(err.message); }
    finally { setDeleting(false); }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div className="max-w-6xl mx-auto space-y-5">
      <SectionHeader eyebrow="Program Milestones" title="Project Timeline"/>

      {/* ── Toolbar ── */}
      <div className="flex items-center justify-between gap-4 flex-wrap">
        <div className="flex items-center gap-1">
          {FILTERS.map(f => (
            <button key={f} className={`tab-btn ${filter === f ? 'active' : ''}`}
                    onClick={() => setFilter(f)}>{f}</button>
          ))}
          <span className="mono text-[10px] text-zt-dim ml-3">
            {filtered.length} item{filtered.length !== 1 ? 's' : ''}
          </span>
        </div>
        <button onClick={openCreate}
                className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium
                           bg-blue-600 hover:bg-blue-500 text-white transition-colors shrink-0">
          <i className="fa-solid fa-plus text-xs"/>
          Add Milestone
        </button>
      </div>

      {fetchError && <div className="text-red-400 text-sm mono">{fetchError}</div>}
      {loading    && <div className="text-zt-dim text-sm mono">Loading…</div>}

      {/* ── Milestone list ── */}
      <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
        {filtered.length === 0
          ? <EmptyState message="No milestones in this category"/>
          : filtered.map((ms, i) => {
              const pct   = ms.percentComplete || 0;
              const color = ms.status === 'complete' ? '#10B981' : ms.status === 'in-progress' ? '#3B82F6' : '#94A3B8';
              return (
                <div key={ms.id || i}
                     className="px-5 py-4 border-b border-zt-border last:border-0 cursor-pointer
                                hover:bg-white/[.03] transition-colors"
                     onClick={() => openEdit(ms)}>
                  <div className="flex items-start justify-between gap-4 mb-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-3 flex-wrap">
                        <StatusBadge status={ms.status || 'unknown'}/>
                        <span className="text-sm font-medium text-zt-text">{ms.title}</span>
                        {ms.standard && (
                          <span className="mono text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wider"
                                style={{background:'rgba(148,163,184,.1)',color:'#94A3B8',border:'1px solid rgba(148,163,184,.15)'}}>
                            {ms.standard}
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-4 mt-1.5">
                        <span className="mono text-[10px] text-zt-dim uppercase tracking-wider">{ms.site || 'All Sites'}</span>
                        <span className="mono text-[10px] text-zt-dim">{fmtDate(ms.startDate)} → {fmtDate(ms.endDate)}</span>
                      </div>
                    </div>
                    <div className="text-right shrink-0">
                      <span className="mono text-sm font-medium" style={{color}}>{pct}%</span>
                      <div className="mono text-[9px] text-zt-dim uppercase tracking-wider">complete</div>
                    </div>
                  </div>
                  <div className="relative h-2 rounded-full" style={{background:'var(--zt-track)'}}>
                    <div className="absolute top-0 h-full rounded-full transition-all duration-700"
                         style={{left:`${barLeft(ms.startDate)}%`,width:`${barWidth(ms.startDate,ms.endDate)}%`,background:color}}/>
                  </div>
                </div>
              );
            })
        }
      </div>

      {/* ── Slide-over drawer ── */}
      {/* Backdrop */}
      <div className="fixed inset-0 z-40 transition-opacity duration-300"
           style={{background:'rgba(0,0,0,.5)',opacity:drawerOpen?1:0,pointerEvents:drawerOpen?'auto':'none'}}
           onClick={closeDrawer}/>
      {/* Panel */}
      <div className="fixed top-0 right-0 h-full w-full max-w-md z-50 flex flex-col transition-transform duration-300"
           style={{background:'var(--zt-card)',borderLeft:'1px solid var(--zt-border)',
                   transform:drawerOpen?'translateX(0)':'translateX(100%)'}}>
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-5" style={{borderBottom:'1px solid var(--zt-border)'}}>
          <div className="flex items-center gap-3">
            <i className="fa-solid fa-calendar-check text-blue-400"/>
            <span className="font-semibold text-sm text-zt-text">
              {drawerMode === 'create' ? 'New Milestone' : 'Edit Milestone'}
            </span>
          </div>
          <button onClick={closeDrawer} className="text-zt-dim hover:text-zt-text transition-colors">
            <i className="fa-solid fa-xmark"/>
          </button>
        </div>

        {/* Form body */}
        <form onSubmit={handleSave} className="flex-1 flex flex-col overflow-hidden">
          <div className="flex-1 overflow-y-auto px-6 py-5 space-y-4">

            {/* Title */}
            <div>
              <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">
                Title <span className="text-red-400">*</span>
              </label>
              <input type="text" required value={form.title}
                     onChange={e => setForm(p => ({...p, title: e.target.value}))}
                     placeholder="e.g. NISPOM Ch. 2 Annual Review"
                     className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                border border-zt-border focus:border-blue-500 focus:outline-none"/>
            </div>

            {/* Site + Standard row */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">Site</label>
                <input type="text" value={form.site}
                       onChange={e => setForm(p => ({...p, site: e.target.value}))}
                       placeholder="All Sites"
                       className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                  border border-zt-border focus:border-blue-500 focus:outline-none"/>
              </div>
              <div>
                <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">Standard</label>
                <input type="text" value={form.standard}
                       onChange={e => setForm(p => ({...p, standard: e.target.value}))}
                       placeholder="NISPOM, ICD 705…"
                       className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                  border border-zt-border focus:border-blue-500 focus:outline-none"/>
              </div>
            </div>

            {/* Status + % Complete row */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">Status</label>
                <select value={form.status} onChange={e => setForm(p => ({...p, status: e.target.value}))}
                        className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                   border border-zt-border focus:border-blue-500 focus:outline-none">
                  <option value="upcoming">Upcoming</option>
                  <option value="in-progress">In-Progress</option>
                  <option value="complete">Complete</option>
                </select>
              </div>
              <div>
                <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">% Complete</label>
                <input type="number" min="0" max="100" value={form.percentComplete}
                       onChange={e => setForm(p => ({...p, percentComplete: e.target.value}))}
                       placeholder="0"
                       className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                  border border-zt-border focus:border-blue-500 focus:outline-none"/>
              </div>
            </div>

            {/* Date range row */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">Start Date</label>
                <input type="date" value={form.startDate}
                       onChange={e => setForm(p => ({...p, startDate: e.target.value}))}
                       className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                  border border-zt-border focus:border-blue-500 focus:outline-none"/>
              </div>
              <div>
                <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">End Date</label>
                <input type="date" value={form.endDate}
                       onChange={e => setForm(p => ({...p, endDate: e.target.value}))}
                       className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                  border border-zt-border focus:border-blue-500 focus:outline-none"/>
              </div>
            </div>

            {/* Notes */}
            <div>
              <label className="mono text-[10px] uppercase tracking-wider text-zt-muted block mb-1.5">Notes</label>
              <textarea rows="4" value={form.notes}
                        onChange={e => setForm(p => ({...p, notes: e.target.value}))}
                        placeholder="Findings, outcomes, references…"
                        className="w-full px-3 py-2 rounded-lg text-sm bg-transparent text-zt-text
                                   border border-zt-border focus:border-blue-500 focus:outline-none resize-none"/>
            </div>

            {saveError && <div className="text-red-400 text-xs mono">{saveError}</div>}
          </div>

          {/* Pinned footer */}
          <div className="px-6 py-4 flex items-center gap-3" style={{borderTop:'1px solid var(--zt-border)'}}>
            <button type="submit" disabled={saving}
                    className="flex-1 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500
                               disabled:opacity-50 text-white transition-colors">
              {saving ? 'Saving…' : drawerMode === 'create' ? 'Create Milestone' : 'Save Changes'}
            </button>
            {drawerMode === 'edit' && (
              <button type="button" onClick={handleDelete} disabled={deleting}
                      className="px-3 py-2 rounded-lg text-sm font-medium text-red-400
                                 border border-red-500/30 hover:bg-red-500/10 disabled:opacity-50 transition-colors">
                {deleting ? '…' : <i className="fa-solid fa-trash"/>}
              </button>
            )}
            <button type="button" onClick={closeDrawer}
                    className="px-3 py-2 rounded-lg text-sm font-medium text-zt-muted
                               border border-zt-border hover:bg-white/5 transition-colors">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   VIEW 7 — RISKS & CONSTRUCTION
   Tabbed risk register + construction project progress.
════════════════════════════════════════════════════════════════════════════ */
function RisksView({ data }) {
  // ── Local state (fetched fresh so mutations reflect immediately) ──────────
  const [risks,        setRisks]        = useState(data.risks        || []);
  const [construction, setConstruction] = useState(data.construction || []);

  useEffect(() => {
    async function loadRisks() {
      try {
        const res  = await fetch('/api/risks', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setRisks(Array.isArray(json) ? json : []);
      } catch { /* keep seed data */ }
    }
    async function loadBuild() {
      try {
        const res  = await fetch('/api/construction', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setConstruction(Array.isArray(json) ? json : []);
      } catch { /* keep seed data */ }
    }
    loadRisks(); loadBuild();
  }, []);

  // ── Risk filter ───────────────────────────────────────────────────────────
  const [riskTab, setRiskTab] = useState('all');
  const RISK_TABS = ['all','critical','high','medium','low'];
  const RCOLS     = 'grid-cols-[2fr_1fr_76px_84px_90px_96px]';
  const visibleRisks = riskTab === 'all' ? risks : risks.filter(r => r.severity === riskTab);

  // ── Drawer state ──────────────────────────────────────────────────────────
  const [drawerOpen,    setDrawerOpen]    = useState(false);
  const [drawerSection, setDrawerSection] = useState('risk');   // 'risk' | 'build'
  const [drawerMode,    setDrawerMode]    = useState('create'); // 'create' | 'edit'
  const [editTarget,    setEditTarget]    = useState(null);
  const [saving,        setSaving]        = useState(false);
  const [deleting,      setDeleting]      = useState(false);
  const [saveError,     setSaveError]     = useState('');

  const EMPTY_RISK = {
    title: '', site: '', standard: '', severity: 'medium',
    likelihood: 'medium', impact: 'medium', financialImpact: '',
    dueDate: '', owner: '', status: 'open', mitigation: '', description: '',
  };
  const EMPTY_BUILD = {
    title: '', site: '', phase: '', contractor: '',
    status: 'upcoming', percentComplete: '', startDate: '', endDate: '', notes: '',
  };

  const [riskForm,  setRiskForm]  = useState(EMPTY_RISK);
  const [buildForm, setBuildForm] = useState(EMPTY_BUILD);

  function openCreateRisk() {
    setDrawerSection('risk'); setDrawerMode('create'); setEditTarget(null);
    setRiskForm(EMPTY_RISK); setSaveError(''); setDrawerOpen(true);
  }
  function openEditRisk(r) {
    setDrawerSection('risk'); setDrawerMode('edit'); setEditTarget(r);
    setRiskForm({
      title:           r.title           || '',
      site:            r.site            || r.siteId || '',
      standard:        r.standard        || '',
      severity:        r.severity        || 'medium',
      likelihood:      r.likelihood      || r.probability || 'medium',
      impact:          r.impact          || 'medium',
      financialImpact: r.financialImpact != null ? String(r.financialImpact) : '',
      dueDate:         r.dueDate         || '',
      owner:           r.owner           || '',
      status:          r.status          || 'open',
      mitigation:      r.mitigation      || '',
      description:     r.description     || '',
    });
    setSaveError(''); setDrawerOpen(true);
  }
  function openCreateBuild() {
    setDrawerSection('build'); setDrawerMode('create'); setEditTarget(null);
    setBuildForm(EMPTY_BUILD); setSaveError(''); setDrawerOpen(true);
  }
  function openEditBuild(proj) {
    setDrawerSection('build'); setDrawerMode('edit'); setEditTarget(proj);
    setBuildForm({
      title:           proj.title           || proj.name || '',
      site:            proj.site            || proj.siteId || '',
      phase:           proj.phase           || '',
      contractor:      proj.contractor      || '',
      status:          proj.status          || 'upcoming',
      percentComplete: proj.percentComplete != null ? String(proj.percentComplete) : '',
      startDate:       proj.startDate       || '',
      endDate:         proj.endDate         || proj.projectedCompletion || '',
      notes:           proj.notes           || '',
    });
    setSaveError(''); setDrawerOpen(true);
  }
  function closeDrawer() { setDrawerOpen(false); setSaveError(''); }

  // ── Save ──────────────────────────────────────────────────────────────────
  async function handleSave(e) {
    e.preventDefault();
    const isRisk = drawerSection === 'risk';
    const form   = isRisk ? riskForm : buildForm;
    if (!form.title.trim()) { setSaveError('Title is required'); return; }

    setSaving(true); setSaveError('');
    try {
      const collection = isRisk ? 'risks' : 'construction';
      let payload = isRisk
        ? { ...riskForm, financialImpact: riskForm.financialImpact !== '' ? Number(riskForm.financialImpact) : 0 }
        : { ...buildForm, percentComplete: buildForm.percentComplete !== '' ? Number(buildForm.percentComplete) : 0 };

      if (drawerMode === 'create') {
        const res  = await fetch(`/api/${collection}`, {
          method: 'POST', headers: AUTH.hdrs(), body: JSON.stringify(payload),
        });
        const json = await safeJson(res);
        const newItem = json.data || json;
        isRisk ? setRisks(prev => [...prev, newItem]) : setConstruction(prev => [...prev, newItem]);
      } else {
        const id  = editTarget.id || editTarget._id;
        const res = await fetch(`/api/${collection}/${id}`, {
          method: 'PATCH', headers: AUTH.hdrs(), body: JSON.stringify(payload),
        });
        const json    = await safeJson(res);
        const updated = json.data || { ...editTarget, ...payload };
        if (isRisk) {
          setRisks(prev => prev.map(r => (r.id || r._id) === id ? updated : r));
        } else {
          setConstruction(prev => prev.map(p => (p.id || p._id) === id ? updated : p));
        }
      }
      closeDrawer();
    } catch (err) { setSaveError(err.message); }
    finally { setSaving(false); }
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function handleDelete() {
    if (!editTarget) return;
    const isRisk     = drawerSection === 'risk';
    const collection = isRisk ? 'risks' : 'construction';
    const id         = editTarget.id || editTarget._id;
    const label      = editTarget.title || editTarget.name || id;
    if (!window.confirm(`Delete "${label}"? This cannot be undone.`)) return;

    setDeleting(true); setSaveError('');
    try {
      const res = await fetch(`/api/${collection}/${id}`, {
        method: 'DELETE', headers: AUTH.hdrs(),
      });
      await safeJson(res);
      if (isRisk) setRisks(prev => prev.filter(r => (r.id || r._id) !== id));
      else        setConstruction(prev => prev.filter(p => (p.id || p._id) !== id));
      closeDrawer();
    } catch (err) { setSaveError(err.message); }
    finally { setDeleting(false); }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div className="max-w-6xl mx-auto space-y-6">
      <SectionHeader eyebrow="Risk & Construction" title="Risks & Active Build Projects"/>

      {/* ── Risk Register ── */}
      <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid var(--zt-border)'}}>
          <div className="flex items-center gap-2">
            <i className="fa-solid fa-triangle-exclamation text-sm" style={{color:'#F59E0B'}}/>
            <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Risk Register</span>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex items-center gap-1">
              {RISK_TABS.map(t => (
                <button key={t} className={`tab-btn ${riskTab === t ? 'active' : ''}`} onClick={() => setRiskTab(t)}>
                  {t} <span className="opacity-50 ml-0.5">{t === 'all' ? risks.length : risks.filter(r => r.severity === t).length}</span>
                </button>
              ))}
            </div>
            <button onClick={openCreateRisk}
                    className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium
                               bg-blue-600 hover:bg-blue-500 text-white transition-colors">
              <i className="fa-solid fa-plus text-[10px]"/> Log Risk
            </button>
          </div>
        </div>

        {visibleRisks.length === 0
          ? <EmptyState message="No risks in this category"/>
          : (
            <>
              <div className={`tbl-head ${RCOLS}`}>
                {['Risk','Site','Severity','Impact','Likelihood','Status'].map(h => (
                  <span key={h} className="sort-btn" style={{cursor:'default'}}>{h}</span>
                ))}
              </div>
              {visibleRisks.map(r => (
                <div key={r.id || r.title}
                     className={`tbl-row ${RCOLS} cursor-pointer hover:bg-white/[.03] transition-colors`}
                     onClick={() => openEditRisk(r)}>
                  <div className="min-w-0">
                    <div className="text-sm font-medium text-zt-text truncate">{r.title}</div>
                    {r.standard && <div className="mono text-[9px] text-zt-dim truncate">{r.standard}</div>}
                  </div>
                  <div className="mono text-xs text-zt-muted truncate">{r.site || r.siteId || 'All'}</div>
                  <SeverityBadge severity={r.severity}/>
                  <div className="mono text-xs text-zt-muted">{r.financialImpact ? fmtMoney(r.financialImpact) : '—'}</div>
                  <div className="mono text-xs text-zt-muted capitalize">{r.likelihood || r.probability || '—'}</div>
                  <StatusBadge status={r.status || 'open'}/>
                </div>
              ))}
            </>
          )
        }
      </div>

      {/* ── Construction Projects ── */}
      <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid var(--zt-border)'}}>
          <div className="flex items-center gap-2">
            <i className="fa-solid fa-helmet-safety text-sm" style={{color:'#F59E0B'}}/>
            <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Active Construction Projects</span>
          </div>
          <button onClick={openCreateBuild}
                  className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium
                             bg-blue-600 hover:bg-blue-500 text-white transition-colors">
            <i className="fa-solid fa-plus text-[10px]"/> Add Project
          </button>
        </div>
        {construction.length === 0
          ? <EmptyState message="No active construction projects"/>
          : construction.map((proj, i) => {
              const pct   = proj.percentComplete || 0;
              const color = pct >= 100 ? '#10B981' : pct >= 60 ? '#3B82F6' : pct >= 30 ? '#F59E0B' : '#EF4444';
              return (
                <div key={proj.id || i}
                     className="px-5 py-4 border-b border-zt-border last:border-0 cursor-pointer
                                hover:bg-white/[.03] transition-colors"
                     onClick={() => openEditBuild(proj)}>
                  <div className="flex items-start justify-between gap-4 mb-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-3 flex-wrap">
                        <StatusBadge status={proj.status || 'unknown'}/>
                        <span className="text-sm font-medium text-zt-text">{proj.title || proj.name}</span>
                        {proj.phase && (
                          <span className="mono text-[9px] px-2 py-0.5 rounded uppercase tracking-widest"
                                style={{background:'rgba(148,163,184,.07)',color:'#94A3B8',border:'1px solid rgba(148,163,184,.15)'}}>
                            {proj.phase}
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-4 mt-1.5 flex-wrap">
                        <span className="mono text-[10px] text-zt-dim uppercase tracking-wider">{proj.site || proj.siteId}</span>
                        {proj.contractor && <span className="mono text-[10px] text-zt-dim">{proj.contractor}</span>}
                        <span className="mono text-[10px] text-zt-dim">{fmtDate(proj.startDate)} → {fmtDate(proj.endDate || proj.projectedCompletion)}</span>
                      </div>
                    </div>
                    <div className="text-right shrink-0">
                      <div className="mono text-sm font-medium" style={{color}}>{pct}%</div>
                      <div className="mono text-[9px] text-zt-dim uppercase tracking-wider">complete</div>
                    </div>
                  </div>
                  <ThinBar pct={pct} color={color} height={5}/>
                </div>
              );
            })
        }
      </div>

      {/* ── Shared slide-over drawer ── */}
      <div className="fixed inset-0 z-40 transition-opacity duration-300"
           style={{background:'rgba(0,0,0,.5)',opacity:drawerOpen?1:0,pointerEvents:drawerOpen?'auto':'none'}}
           onClick={closeDrawer}/>
      <div className="fixed top-0 right-0 h-full w-full max-w-md z-50 flex flex-col transition-transform duration-300"
           style={{background:'var(--zt-card)',borderLeft:'1px solid var(--zt-border)',
                   transform:drawerOpen?'translateX(0)':'translateX(100%)'}}>

        {/* Header */}
        <div className="flex items-center justify-between px-6 py-5" style={{borderBottom:'1px solid var(--zt-border)'}}>
          <div className="flex items-center gap-3">
            <i className={`fa-solid ${drawerSection === 'risk' ? 'fa-triangle-exclamation text-amber-400' : 'fa-helmet-safety text-amber-400'}`}/>
            <span className="font-semibold text-sm text-zt-text">
              {drawerMode === 'create'
                ? (drawerSection === 'risk' ? 'Log New Risk' : 'Add Build Project')
                : (drawerSection === 'risk' ? 'Edit Risk'    : 'Edit Build Project')}
            </span>
          </div>

/* ════════════════════════════════════════════════════════════════════════════
   THEME TOGGLE — reads/writes html.dark class directly, no prop drilling.
════════════════════════════════════════════════════════════════════════════ */
function ThemeToggle() {
  const [dark, setDark] = useState(() => document.documentElement.classList.contains('dark'));
  function toggle() {
    document.documentElement.classList.toggle('dark');
    setDark(d => !d);
  }
  return (
    <button onClick={toggle} title={dark ? 'Switch to light mode' : 'Switch to dark mode'}
            className="text-zt-dim hover:text-zt-text transition-colors"
            style={{padding:'6px 8px',borderRadius:'6px',background:'none',border:'none',cursor:'pointer',fontSize:'13px'}}>
      <i className={`fa-solid ${dark ? 'fa-sun' : 'fa-moon'}`}/>
    </button>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   SHELL — LoginPage, Sidebar, TopBar
════════════════════════════════════════════════════════════════════════════ */
function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);

  async function handleSubmit(e) {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const r = await fetch('/api/auth/login',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
      const d = await safeJson(r);
      AUTH.setToken(d.token); AUTH.setUser(d.user); onLogin(d.user);
    } catch (err) { setError(err.message || 'Cannot reach server — is MASH running?'); }
    finally   { setLoading(false); }
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="w-full max-w-xs">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-5"
               style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.18)'}}>
            <i className="fa-solid fa-shield-halved text-2xl text-blue-400"/>
          </div>
          <div className="font-semibold text-lg tracking-wide text-zt-text">MASH</div>
          <div className="mono text-xs mt-1.5 uppercase tracking-[.18em] text-zt-dim">MTSI Advanced Sentinel Hub</div>
        </div>
        <form onSubmit={handleSubmit} className="space-y-3">
          <input className="zt-input" type="text" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} autoComplete="username" required/>
          <input className="zt-input" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} autoComplete="current-password" required/>
          {error&&<div className="mono text-xs p-3 rounded" style={{background:'rgba(239,68,68,.07)',color:'#f87171',border:'1px solid rgba(239,68,68,.18)'}}>{error}</div>}
          <button className="zt-btn-primary !mt-5" type="submit" disabled={loading}>
            {loading?'Authenticating…':'Sign In'}
          </button>
        </form>
        <p className="mono text-center text-xs mt-6 text-zt-dim">Dev: admin / admin</p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   APP ROOT
   Owns: currentUser, activeView, data (all API responses), loaded flag.
   Layout: Sidebar (fixed) | TopBar + scrollable main
════════════════════════════════════════════════════════════════════════════ */
function App() {
  const [currentUser, setCurrentUser] = useState(() => {
    /* Check for Hub SSO token in the URL query string */
    const params   = new URLSearchParams(window.location.search);
    const ssoToken = params.get('mash_token');
    if (ssoToken) {
      try {
        const b64     = ssoToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
        const padded  = b64 + '='.repeat((4 - b64.length % 4) % 4);
        const payload = JSON.parse(atob(padded));
        AUTH.setToken(ssoToken); AUTH.setUser(payload);
        setTimeout(()=>window.history.replaceState({},'','/'), 0);
        return payload;
      } catch {}
    }
    return AUTH.getUser();
  });

  const [activeView, setActiveView] = useState('dashboard');
  const [data, setData] = useState({ sites:[],risks:[],budget:{},timeline:{},compliance:{},activity:[],milestones:[],construction:[] });
  const [loaded, setLoaded] = useState(false);

  /*
   * Parallel data fetch — Promise.all fires all requests simultaneously
   * and waits for the slowest, rather than chaining them sequentially.
   */
  useEffect(() => {
    if (!currentUser) return;
    (async () => {
      const [sites,risks,budget,timeline,compliance,activity,milestones,construction] = await Promise.all([
        API.get('sites'), API.get('risks'), API.get('budget'), API.get('timeline'),
        API.get('compliance'), API.get('activity'), API.get('milestones'), API.get('construction'),
      ]);
      setData({ sites:sites??[], risks:risks??[], budget:budget??{}, timeline:timeline??{},
                compliance:compliance??{}, activity:activity??[], milestones:milestones??[], construction:construction??[] });
      setLoaded(true);
    })();
  }, [currentUser]);

  function handleLogin(u)  { setCurrentUser(u); setActiveView('dashboard'); }
  function handleLogout()  { AUTH.clearAll(); setCurrentUser(null); setLoaded(false); }

  if (!currentUser) return <LoginPage onLogin={handleLogin}/>;

  /* Loading screen — sidebar stays visible for orientation */
  if (!loaded) return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar activeView={activeView} onNavigate={setActiveView} user={currentUser} onLogout={handleLogout}/>
      <div className="flex flex-col flex-1 min-w-0 overflow-hidden">
        <TopBar activeView={activeView}/>
        <div className="flex-1 flex items-center justify-center">
          <div className="text-center">
            <i className="fa-solid fa-rotate-right text-xl text-blue-400 animate-spin mb-4 block"/>
            <div className="mono text-[10px] uppercase tracking-widest text-zt-dim">Loading program data…</div>
          </div>
        </div>
      </div>
    </div>
  );

  const sections = {
    briefing:   <ExecutiveBriefing data={data}/>,
    dashboard:  <DashboardView     data={data} onNavigate={setActiveView}/>,
    sites:      <SitesSection       data={data} onDataChange={setData}/>,
    compliance: <ComplianceSection  data={data}/>,
    budget:     <BudgetView        data={data}/>,
    timeline:   <TimelineView      data={data}/>,
    risks:      <RisksView         data={data}/>,
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar activeView={activeView} onNavigate={setActiveView} user={currentUser} onLogout={handleLogout}/>
      <div className="flex flex-col flex-1 min-w-0 overflow-hidden">
        <TopBar activeView={activeView}/>
        {/* Only <main> scrolls; Sidebar and TopBar remain fixed */}
        <main className="flex-1 overflow-y-auto p-6">
          {sections[activeView]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
