<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASH · MTSI Advanced Sentinel Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --navy:       #0a1628;
  --navy-mid:   #0d1f3c;
  --navy-light: #16335e;
  --gray-1:     #1a2540;
  --gray-2:     #2a3a5c;
  --gray-txt:   #8fa3c0;
  --gold:       #c9a84c;
  --gold-lt:    #e8c96d;
  --gold-dim:   rgba(201,168,76,.18);
  --off-white:  #f0f4f8;
  --green:      #10B981;
  --amber:      #F59E0B;
  --red:        #EF4444;
  --surf:       rgba(13,31,60,0.78);
  --bdr:        rgba(201,168,76,0.13);
  --bdr-g:      rgba(201,168,76,0.32);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: #d8e4f0;
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 160% 60% at 50% 108%, rgba(201,168,76,.04) 0%, transparent 55%),
    radial-gradient(ellipse at 88% 6%,  rgba(201,168,76,.03) 0%, transparent 40%),
    radial-gradient(ellipse at 12% 8%,  rgba(22,51,94,.08)   0%, transparent 40%),
    linear-gradient(170deg, #060e1c 0%, #0a1628 30%, #0d1f3c 65%, #0a1628 100%);
}

/* Star field */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 14% 11%, rgba(255,255,255,.22) 0%, transparent 100%),
    radial-gradient(1px 1px at 37% 6%,  rgba(255,255,255,.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 62% 17%, rgba(255,255,255,.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 81% 4%,  rgba(255,255,255,.20) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 21%, rgba(255,255,255,.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 6%  29%, rgba(255,255,255,.14) 0%, transparent 100%),
    radial-gradient(1px 1px at 54% 27%, rgba(255,255,255,.10) 0%, transparent 100%),
    radial-gradient(1px 1px at 73% 37%, rgba(255,255,255,.12) 0%, transparent 100%),
    radial-gradient(2px 2px at 27% 5%,  rgba(201,168,76,.08)  0%, transparent 100%),
    radial-gradient(1px 1px at 47% 41%, rgba(255,255,255,.08) 0%, transparent 100%);
}

/* Gold horizon glow */
body::after {
  content: '';
  position: fixed; bottom: -60vh; left: 50%; transform: translateX(-50%);
  width: 200vw; height: 80vh; border-radius: 50% 50% 0 0;
  background: radial-gradient(ellipse at center 80%,
    rgba(201,168,76,.04) 0%, rgba(22,51,94,.05) 35%, transparent 65%);
  pointer-events: none; z-index: 0;
}

.font-head { font-family: 'Space Grotesk', sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }

/* ── Header ─────────────────────────────────────────── */
.hdr {
  background: rgba(8,16,34,.97);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-bottom: 1px solid rgba(201,168,76,.28);
  box-shadow: 0 1px 0 rgba(201,168,76,.06), 0 4px 40px rgba(0,0,0,.75);
  position: sticky; top: 0; z-index: 500;
}

/* ── Nav ─────────────────────────────────────────────── */
.nav-btn {
  position: relative; cursor: pointer;
  padding: 5px 14px; font-size: .68rem; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase;
  color: rgba(143,163,192,.55); border-radius: 6px;
  border: none; background: none;
  transition: color .18s, background .18s;
}
.nav-btn:hover  { color: var(--gold-lt); background: rgba(201,168,76,.06); }
.nav-btn.active { color: var(--gold);    background: rgba(201,168,76,.10); }
.nav-btn::after {
  content: ''; position: absolute; bottom: -1px; left: 9px; right: 9px;
  height: 2px; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold-lt));
  transform: scaleX(0); transform-origin: left;
  transition: transform .24s ease;
}
.nav-btn.active::after { transform: scaleX(1); }

/* ── Gold Glitch (logo only) ─────────────────────────── */
.glitch { position: relative; display: inline-block; }
.glitch::before, .glitch::after {
  content: attr(data-text); position: absolute; top:0; left:0; width:100%; height:100%;
}
.glitch::before { left:2px; color:var(--gold-lt); clip-path:polygon(0 20%,100% 20%,100% 36%,0 36%); animation:glitch1 9s infinite; }
.glitch::after  { left:-2px; color:rgba(201,168,76,.4); clip-path:polygon(0 65%,100% 65%,100% 80%,0 80%); animation:glitch2 9s infinite; }
@keyframes glitch1 { 0%,85%,100%{opacity:0} 87%{transform:translate(-3px,1px);opacity:1} 89%{transform:translate(2px,-1px);opacity:1} 91%{opacity:0} }
@keyframes glitch2 { 0%,88%,100%{opacity:0} 90%{transform:translate(3px,0);opacity:1} 92%{transform:translate(-1px,1px);opacity:1} 94%{opacity:0} }

/* ── Card ────────────────────────────────────────────── */
.card {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.55), inset 0 1px 0 rgba(201,168,76,.04);
  position: relative; overflow: hidden;
  transition: border-color .22s, box-shadow .22s;
}
.card::before {
  content: ''; position: absolute; top:0; left:-100%; width:45%; height:100%;
  background: linear-gradient(90deg,transparent,rgba(201,168,76,.025),transparent);
  transition: left .8s ease; pointer-events: none;
}
.card:hover::before { left: 150%; }
.card-gold {
  border-color: var(--bdr-g);
  box-shadow: 0 4px 24px rgba(0,0,0,.55), 0 0 0 1px rgba(201,168,76,.06),
              0 0 28px rgba(201,168,76,.06), inset 0 1px 0 rgba(201,168,76,.06);
}
.card-kpi {
  border-top: 2px solid var(--gold);
  box-shadow: 0 4px 24px rgba(0,0,0,.55), 0 -1px 12px rgba(201,168,76,.08),
              inset 0 1px 0 rgba(201,168,76,.06);
}
.card-g { border-color: rgba(16,185,129,.2); }
.card-a { border-color: rgba(245,158,11,.2); }
.card-r { border-color: rgba(239,68,68,.22); }

/* ── Progress ────────────────────────────────────────── */
.prog { height: 6px; border-radius: 99px; background: rgba(255,255,255,.06); overflow: hidden; }
.prog-s { height: 4px; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 1.1s cubic-bezier(.25,1,.5,1); }
.p-gold { background: linear-gradient(90deg, var(--gold), var(--gold-lt)); }
.p-g    { background: linear-gradient(90deg, #10B981, #059669); }
.p-a    { background: linear-gradient(90deg, var(--amber), #D97706); }
.p-r    { background: linear-gradient(90deg, var(--red), #B91C1C); }
.p-c    { background: linear-gradient(90deg, var(--gold), var(--gold-lt)); }

/* ── Badge ───────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: .62rem; font-weight: 700; padding: 2px 9px;
  border-radius: 99px; letter-spacing: .06em; white-space: nowrap;
}
.b-gold { background: rgba(201,168,76,.12); color: var(--gold-lt);     border: 1px solid rgba(201,168,76,.28); }
.b-g    { background: rgba(16,185,129,.10); color: #6EE7B7;            border: 1px solid rgba(16,185,129,.25); }
.b-a    { background: rgba(245,158,11,.10); color: #FCD34D;            border: 1px solid rgba(245,158,11,.25); }
.b-r    { background: rgba(239,68,68,.10);  color: #FCA5A5;            border: 1px solid rgba(239,68,68,.28); }
.b-c    { background: rgba(201,168,76,.08); color: var(--gold);        border: 1px solid rgba(201,168,76,.22); }
.b-b    { background: rgba(22,51,94,.35);   color: #93C5FD;            border: 1px solid rgba(22,51,94,.6); }
.b-v    { background: rgba(124,58,237,.12); color: #C4B5FD;            border: 1px solid rgba(124,58,237,.28); }

/* ── Pulse dot ───────────────────────────────────────── */
@keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.6)} }
.status-dot { animation: dot-pulse 2.5s ease-in-out infinite; border-radius: 50%; }

/* ── Logo ring ───────────────────────────────────────── */
@keyframes ring-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.45)} 70%{box-shadow:0 0 0 9px rgba(201,168,76,0)} }
.logo-ring { animation: ring-pulse 3.5s ease infinite; }

/* ── Section enter ───────────────────────────────────── */
.section { animation: sect-in .22s ease; }
@keyframes sect-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── Glow text ───────────────────────────────────────── */
.glow-gold { text-shadow: 0 0 20px rgba(201,168,76,.55); }
.glow-g    { text-shadow: 0 0 16px rgba(16,185,129,.45); }
.glow-a    { text-shadow: 0 0 14px rgba(245,158,11,.45); }

/* ── Sweep shimmer (status bar) ─────────────────────── */
@keyframes sweep { from{transform:translateX(-100%)} to{transform:translateX(200%)} }
.sweep::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(90deg,transparent,rgba(201,168,76,.04),transparent);
  animation: sweep 7s linear infinite;
}

/* ── Gold divider line ───────────────────────────────── */
.gold-line { width:1px; height:16px; background:rgba(201,168,76,.22); flex-shrink:0; }

/* ── Timeline phase segments ─────────────────────────── */
.ph-seg { height: 4px; flex: 1; border-radius: 2px; }
.ph-complete    { background: var(--gold); }
.ph-in-progress { background: var(--amber); }
.ph-upcoming    { background: rgba(255,255,255,.08); }

/* ── Gantt ───────────────────────────────────────────── */
.gantt-row { display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid rgba(201,168,76,.05); }
.gantt-bar-wrap { position:relative; flex:1; height:22px; background:rgba(201,168,76,.04); border-radius:4px; overflow:hidden; }
.gantt-bar { position:absolute; top:0; height:100%; border-radius:4px; transition:width 1.2s cubic-bezier(.25,1,.5,1); }
.gantt-today { position:absolute; top:-4px; bottom:-4px; width:2px; background:var(--gold); opacity:.6; z-index:2; }
.gantt-today::before { content:'▼'; position:absolute; top:-12px; left:50%; transform:translateX(-50%); font-size:8px; color:var(--gold); }

/* ── Modal ───────────────────────────────────────────── */
#modal-back { position:fixed; inset:0; z-index:800; background:rgba(0,0,0,.78); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .22s; }
#modal-back.open { opacity:1; pointer-events:all; }
#modal-box { background:rgba(9,17,35,.99); border:1px solid rgba(201,168,76,.25); border-radius:18px; width:min(600px,92vw); max-height:86vh; overflow-y:auto; transform:scale(.94) translateY(10px); transition:transform .22s ease; box-shadow:0 32px 80px rgba(0,0,0,.85), 0 0 0 1px rgba(201,168,76,.06); }
#modal-back.open #modal-box { transform:scale(1) translateY(0); }

/* ── Toast ───────────────────────────────────────────── */
#toasts { position:fixed; bottom:24px; right:24px; z-index:900; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast-item { pointer-events:all; min-width:290px; max-width:370px; background:rgba(9,17,35,.97); border-radius:12px; padding:13px 17px; display:flex; align-items:center; gap:11px; font-size:.8rem; border-left:3px solid; box-shadow:0 8px 32px rgba(0,0,0,.65); animation:t-in .3s ease; }
@keyframes t-in  { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes t-out { to{opacity:0;transform:translateX(20px)} }

/* ── Notification drawer ─────────────────────────────── */
#notif-drw { position:fixed; top:0; right:0; height:100vh; width:320px; background:rgba(8,16,34,.98); backdrop-filter:blur(20px); border-left:1px solid rgba(201,168,76,.18); transform:translateX(100%); transition:transform .3s cubic-bezier(.25,1,.5,1); z-index:600; display:flex; flex-direction:column; }
#notif-drw.open { transform:translateX(0); }

/* ── Form inputs ─────────────────────────────────────── */
.inp { background:rgba(255,255,255,.04); border:1px solid rgba(201,168,76,.15); border-radius:9px; padding:9px 13px; font-size:.83rem; color:#d8e4f0; width:100%; outline:none; font-family:'Inter',sans-serif; transition:border-color .2s; }
.inp:focus { border-color:rgba(201,168,76,.45); background:rgba(201,168,76,.03); }
.inp-lbl { font-size:.65rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(143,163,192,.55); margin-bottom:6px; display:block; }
select.inp option { background:#0a1628; color:#d8e4f0; }

/* ── Scrollbar ───────────────────────────────────────── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:rgba(255,255,255,.02); }
::-webkit-scrollbar-thumb { background:rgba(201,168,76,.2); border-radius:3px; }

/* ── Table ───────────────────────────────────────────── */
th { font-size:.61rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(143,163,192,.45); }
tbody tr { transition:background .12s; }
tbody tr:hover { background:rgba(201,168,76,.03); }

/* ── Report / action cards ───────────────────────────── */
.rpt-card { transition:transform .2s,box-shadow .2s; cursor:pointer; }
.rpt-card:hover { transform:translateY(-3px); box-shadow:0 16px 48px rgba(201,168,76,.08); }

/* ── Radial gauge ────────────────────────────────────── */
.radial-wrap { position:relative; width:84px; height:84px; flex-shrink:0; }
.radial-wrap svg { transform:rotate(-90deg); display:block; }
.radial-lbl { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-size:.82rem; font-weight:700; }

/* ══════════════════════════════════════════════════════
   LIGHT MODE
══════════════════════════════════════════════════════ */
[data-theme="light"] {
  --surf:      #ffffff;
  --bdr:       rgba(15,30,60,0.09);
  --bdr-g:     rgba(160,118,40,0.45);
  --off-white: #0d1e3c;
  --gold:      #96700e;
  --gold-lt:   #b88a18;
  --green:     #0a7040;
  --amber:     #b06000;
  --red:       #b01818;
}

/* Background */
[data-theme="light"] body {
  color: #1c2e4a;
  background:
    radial-gradient(ellipse 120% 40% at 50% 105%, rgba(150,112,14,.06) 0%, transparent 60%),
    radial-gradient(ellipse at 8% 5%,  rgba(15,40,90,.06) 0%, transparent 45%),
    radial-gradient(ellipse at 92% 8%, rgba(15,40,90,.04) 0%, transparent 40%),
    linear-gradient(160deg, #c8d4e6 0%, #d5e0ef 25%, #e2ecf6 55%, #d8e4f0 100%);
}
[data-theme="light"] body::before { opacity: 0; }
[data-theme="light"] body::after  { opacity: 0; }

/* ── THE FIX: force ALL text in main content dark so hardcoded
      rgba(143,163,192,X) inline styles can't wash out on white cards ── */
[data-theme="light"] main *,
[data-theme="light"] #modal-body *,
[data-theme="light"] #notif-list * {
  color: #1e3252 !important;
}

/* ── Restore: specific accent colors that must stay colored ── */
/* Gold section headings */
[data-theme="light"] .sec-heading                    { color: #96700e !important; }
/* Gold glow logo text */
[data-theme="light"] .glow-gold                      { color: #96700e !important; }
/* Radial gauge percentage labels */
[data-theme="light"] .radial-lbl                     { color: #96700e !important; }

/* Badges — all variants */
[data-theme="light"] .b-g    { color: #0a6e40 !important; background: rgba(10,110,64,.09)  !important; border-color: rgba(10,110,64,.28)  !important; }
[data-theme="light"] .b-a    { color: #8a5400 !important; background: rgba(138,84,0,.09)   !important; border-color: rgba(138,84,0,.28)   !important; }
[data-theme="light"] .b-r    { color: #9a1515 !important; background: rgba(154,21,21,.08)  !important; border-color: rgba(154,21,21,.26)  !important; }
[data-theme="light"] .b-gold { color: #7a5810 !important; background: rgba(150,112,14,.09) !important; border-color: rgba(150,112,14,.28) !important; }
[data-theme="light"] .b-c    { color: #7a5810 !important; background: rgba(150,112,14,.07) !important; border-color: rgba(150,112,14,.22) !important; }
[data-theme="light"] .b-b    { color: #1e3a60 !important; background: rgba(15,30,60,.07)   !important; border-color: rgba(15,30,60,.2)    !important; }
[data-theme="light"] .b-v    { color: #4a2090 !important; background: rgba(74,32,144,.08)  !important; border-color: rgba(74,32,144,.25)  !important; }

/* Tailwind status text utilities */
[data-theme="light"] .text-emerald-400  { color: #059669 !important; }
[data-theme="light"] .text-emerald-300  { color: #10b981 !important; }
[data-theme="light"] .text-red-400      { color: #dc2626 !important; }
[data-theme="light"] .text-amber-400    { color: #d97706 !important; }
[data-theme="light"] .text-sky-400      { color: #0284c7 !important; }
[data-theme="light"] .text-yellow-400   { color: #ca8a04 !important; }

/* Inline-color risk/finding severity text (applied via JS className) */
[data-theme="light"] .card .font-mono.font-bold { color: #96700e !important; }

/* SVG gauge track — keep subtle on white */
[data-theme="light"] circle[stroke="rgba(201,168,76,.08)"] { stroke: rgba(15,30,60,.1) !important; }

/* Canvas elements — Chart.js colors are set via JS, not CSS; leave them alone */
[data-theme="light"] canvas { color: unset !important; }

/* ── Header ── */
[data-theme="light"] .hdr {
  background: rgba(238,245,255,0.98);
  border-bottom: 1px solid rgba(150,112,14,0.28);
  box-shadow: 0 2px 20px rgba(15,30,60,.12);
}
[data-theme="light"] .gold-line   { background: rgba(15,30,60,.18); }
[data-theme="light"] .nav-btn     { color: rgba(15,30,60,.45) !important; }
[data-theme="light"] .nav-btn:hover  { color: #96700e !important; background: rgba(150,112,14,.08); }
[data-theme="light"] .nav-btn.active { color: #96700e !important; background: rgba(150,112,14,.11); }
[data-theme="light"] .nav-btn::after { background: linear-gradient(90deg,#96700e,#b88a18); }
/* Status bar text in header */
[data-theme="light"] .hdr .sweep * { color: #2a3e5c !important; }
[data-theme="light"] .hdr .sweep .text-emerald-300 { color: #059669 !important; }

/* ── Cards ── */
[data-theme="light"] .card {
  background: #ffffff;
  border-color: rgba(15,30,60,.08);
  box-shadow: 0 1px 3px rgba(15,30,60,.07), 0 6px 20px rgba(15,30,60,.09);
}
[data-theme="light"] .card:hover::before { display: none; }
[data-theme="light"] .card-kpi {
  border-top: 2px solid #96700e;
  box-shadow: 0 1px 3px rgba(15,30,60,.07), 0 6px 20px rgba(15,30,60,.09), 0 -2px 12px rgba(150,112,14,.1);
}
[data-theme="light"] .card-gold {
  border-color: rgba(150,112,14,.35);
  box-shadow: 0 1px 3px rgba(15,30,60,.07), 0 6px 20px rgba(15,30,60,.09);
}

/* ── Progress ── */
[data-theme="light"] .prog          { background: rgba(15,30,60,.1); }
[data-theme="light"] .ph-upcoming   { background: rgba(15,30,60,.12); }
[data-theme="light"] .ph-complete   { background: #96700e; }
[data-theme="light"] .ph-in-progress{ background: #b06000; }
[data-theme="light"] .p-gold        { background: linear-gradient(90deg,#96700e,#b88a18); }
[data-theme="light"] .p-g           { background: linear-gradient(90deg,#059669,#047857); }
[data-theme="light"] .p-a           { background: linear-gradient(90deg,#d97706,#b45309); }
[data-theme="light"] .p-r           { background: linear-gradient(90deg,#dc2626,#b91c1c); }
[data-theme="light"] .p-c           { background: linear-gradient(90deg,#96700e,#b88a18); }

/* ── Tables / Gantt ── */
[data-theme="light"] tbody tr:hover  { background: rgba(15,30,60,.03); }
[data-theme="light"] .gantt-bar-wrap { background: rgba(15,30,60,.06); }
[data-theme="light"] .gantt-row      { border-bottom-color: rgba(15,30,60,.07); }
[data-theme="light"] .gantt-today    { background: #96700e; }

/* ── Inputs ── */
[data-theme="light"] .inp {
  background: rgba(15,30,60,.04);
  border-color: rgba(15,30,60,.14);
  color: #1c2e4a !important;
}
[data-theme="light"] .inp:focus { border-color: rgba(150,112,14,.5); background: rgba(150,112,14,.03); }
[data-theme="light"] .inp-lbl   { color: rgba(15,30,60,.45) !important; }

/* ── Modal / Drawer ── */
[data-theme="light"] #modal-box   { background: #f5f9ff; border-color: rgba(150,112,14,.28); }
[data-theme="light"] #modal-title { color: #96700e !important; }
[data-theme="light"] #notif-drw   { background: #f5f9ff; border-left-color: rgba(150,112,14,.2); }
[data-theme="light"] .toast-item  { background: rgba(238,245,255,.99); }

/* ── Misc ── */

<!-- Utilities (plain JS) -->
<script>
window.MASH = {};

MASH.toast = function(msg, type='success') {
  const C = {success:'border-emerald-400 text-emerald-400', error:'border-red-400 text-red-400', info:'border-yellow-500 text-yellow-400', warning:'border-amber-400 text-amber-400'};
  const I = {success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info', warning:'fa-triangle-exclamation'};
  const d = document.createElement('div');
  d.className = `toast-item ${C[type]}`;
  d.innerHTML = `<i class="fa-solid ${I[type]} shrink-0"></i><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(d);
  setTimeout(() => { d.style.animation='t-out .3s ease forwards'; setTimeout(()=>d.remove(),300); }, 3500);
};

MASH.openModal = function(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-back').classList.add('open');
};
MASH.closeModal = function() { document.getElementById('modal-back').classList.remove('open'); };

document.getElementById('modal-close').onclick = MASH.closeModal;
document.getElementById('modal-back').addEventListener('click', e => { if (e.target === document.getElementById('modal-back')) MASH.closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') MASH.closeModal(); });

function _toggleNotif() {
  const d = document.getElementById('notif-drw'), o = document.getElementById('notif-overlay');
  const open = d.classList.toggle('open');
  o.classList.toggle('hidden', !open);
}
document.getElementById('notif-close').onclick   = _toggleNotif;
document.getElementById('notif-overlay').onclick  = _toggleNotif;
document.getElementById('notif-mark-read').onclick = () => {
  document.getElementById('bell-badge').style.display='none';
  document.getElementById('notif-count').textContent='0';
  MASH.toast('All alerts marked as read','success');
};
MASH.toggleNotif = _toggleNotif;

MASH.initTilt = function() {
  document.querySelectorAll('.card-tilt').forEach(c => {
    c.addEventListener('mousemove', e => {
      const r=c.getBoundingClientRect(), x=(e.clientX-r.left)/r.width-.5, y=(e.clientY-r.top)/r.height-.5;
      c.style.transition='none'; c.style.transform=`perspective(800px) rotateX(${y*-7}deg) rotateY(${x*7}deg) translateZ(5px)`;
    });
    c.addEventListener('mouseleave', () => { c.style.transition='transform .5s ease'; c.style.transform='none'; });
  });
};
</script>

<!-- React App -->
<script type="text/babel">
'use strict';
const { useState, useEffect, useRef, useCallback } = React;

/* ── Auth token store ── */
const AUTH = {
  getToken : ()  => localStorage.getItem('mash-token'),
  setToken : t   => localStorage.setItem('mash-token', t),
  getUser  : ()  => { try { return JSON.parse(localStorage.getItem('mash-user')); } catch { return null; } },
  setUser  : u   => localStorage.setItem('mash-user', JSON.stringify(u)),
  clearAll : ()  => { localStorage.removeItem('mash-token'); localStorage.removeItem('mash-user'); },
  hdrs     : ()  => {
    const t = localStorage.getItem('mash-token');
    const base = {'Content-Type':'application/json'};
    return t ? {...base, 'Authorization':`Bearer ${t}`} : base;
  },
};

/* ── API ── */
function _on401() { AUTH.clearAll(); window.location.reload(); }
const API = {
  async get(c)        { try{const r=await fetch(`/api/${c}`,{headers:AUTH.hdrs()});if(r.status===401){_on401();return null;}return r.json();}catch{return null;} },
  async put(c,d)      { const r=await fetch(`/api/${c}`,      {method:'PUT',   headers:AUTH.hdrs(),body:JSON.stringify(d)});if(r.status===401)_on401();return r.json(); },
  async post(c,d)     { const r=await fetch(`/api/${c}`,      {method:'POST',  headers:AUTH.hdrs(),body:JSON.stringify(d)});if(r.status===401)_on401();return r.json(); },
  async patch(c,id,d) { const r=await fetch(`/api/${c}/${id}`,{method:'PATCH', headers:AUTH.hdrs(),body:JSON.stringify(d)});if(r.status===401)_on401();return r.json(); },
  async del(c,id)     { const r=await fetch(`/api/${c}/${id}`,{method:'DELETE',headers:AUTH.hdrs()});if(r.status===401)_on401();return r.json(); },
};

/* ── Helpers ── */
const fmtDate  = d => { if(!d) return '—'; return new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fmtShort = d => { if(!d) return '—'; return new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const daysUntil= d => { if(!d) return null; return Math.ceil((new Date(d+'T12:00:00Z')-new Date())/(864e5)); };
const uid      = () => 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36);
const today    = new Date();

const pctColor = v => v>=95?'#10B981':v>=82?'var(--gold)':'#F59E0B';
const pctBar   = v => v>=95?'p-g':v>=82?'p-gold':'p-a';
const sevCls   = s => ({critical:'b-r',high:'b-r',medium:'b-a',low:'b-g'}[s]||'b-b');

/* ── Business-friendly compliance labels (no raw acronyms on dashboard) ── */
const COMP = {
  nispom:  { label:'Personnel & Operational Security', sub:'NISPOM',  icon:'fa-users-gear',       color:'var(--gold)'   },
  daapm:   { label:'Audit Readiness',                  sub:'DAAPM',   icon:'fa-clipboard-check',  color:'var(--gold-lt)' },
  icd705:  { label:'SCIF Technical Controls',          sub:'ICD 705', icon:'fa-building-lock',    color:'#93C5FD'        },
  tempest: { label:'Emanations Security',              sub:'TEMPEST', icon:'fa-tower-broadcast',  color:'#C4B5FD'        },
};

/* ── Clock hook ── */
function useClock() {
  const [t, setT] = useState('');
  useEffect(() => { const tick=()=>setT(new Date().toLocaleTimeString('en-US',{hour12:false})); tick(); const id=setInterval(tick,1000); return()=>clearInterval(id); },[]);
  return t;
}

/* ── Shared components ── */
function Prog({v, cls='p-gold', h='h-[6px]'}) {
  return <div className={`${h} rounded-full overflow-hidden`} style={{background:'rgba(255,255,255,.06)'}}><div className={`h-full rounded-full ${cls} transition-[width] duration-1000`} style={{width:`${v}%`}}/></div>;
}
function Badge({cls, children}) { return <span className={`badge ${cls}`}>{children}</span>; }
function GoldLine() { return <div className="gold-line"/>; }

/* ── Phase bar (construction projects) ── */
function PhaseBar({phases}) {

        ))}
      </div>

  );
}

/* ═══════════════════════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════════════════════════ */
function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');

  async function handleSubmit(e) {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const r = await fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password }),
      });
      const d = await r.json();
      if (!r.ok) { setError(d.error || 'Authentication failed'); return; }
      AUTH.setToken(d.token);
      AUTH.setUser(d.user);
      onLogin(d.user);
    } catch {
      setError('Connection failed — is the server running?');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-4">
      <div className="w-full max-w-sm">

        {/* Branding */}
        <div className="text-center mb-10">
          <div className="font-head font-bold glow-gold mb-2" style={{fontSize:'3rem',color:'var(--gold)',letterSpacing:'.2em'}}>MASH</div>
          <div className="uppercase tracking-widest mb-1" style={{color:'rgba(143,163,192,.45)',fontSize:'.65rem',letterSpacing:'.15em'}}>MTSI Advanced Sentinel Hub</div>
          <div className="uppercase tracking-widest" style={{color:'rgba(201,168,76,.35)',fontSize:'.58rem',letterSpacing:'.12em'}}>Authorized Personnel Only</div>
        </div>

        {/* Login card */}
        <div className="card card-gold p-8">
          <div className="sec-heading mb-6 text-center">Secure Sign-In</div>
          <form onSubmit={handleSubmit} className="space-y-5">
            <div>
              <label className="inp-lbl">Username</label>
              <input className="inp" type="text" value={username}
                onChange={e=>setUsername(e.target.value)}
                required autoFocus autoComplete="username" placeholder="v.kilika"/>
            </div>
            <div>
              <label className="inp-lbl">Password</label>
              <input className="inp" type="password" value={password}
                onChange={e=>setPassword(e.target.value)}
                required autoComplete="current-password" placeholder="••••••••••"/>
            </div>

            {error && (
              <div className="text-xs font-semibold px-3 py-2 rounded-lg flex items-center gap-2"
                style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',color:'#FCA5A5'}}>
                <i className="fa-solid fa-circle-xmark shrink-0"/>{error}
              </div>
            )}

            <button type="submit" className="btn-gold w-full justify-center h-11" disabled={loading}>
              {loading
                ? <><i className="fa-solid fa-spinner fa-spin mr-2"/>Authenticating…</>
                : <><i className="fa-solid fa-shield-halved mr-2"/>Sign In</>}
            </button>
          </form>

          <div className="mt-5 text-center" style={{fontSize:'.6rem',color:'rgba(143,163,192,.25)'}}>
            All access is monitored and logged per NISPOM requirements.
          </div>
        </div>

        {/* SSO / direct login note */}
        <div className="mt-5 card p-4">
          <div className="sec-heading mb-3" style={{fontSize:'.55rem'}}>Sign-In Options</div>
          <div className="space-y-3">
            <div className="flex items-start gap-3 px-3 py-2.5 rounded-lg"
              style={{background:'rgba(16,185,129,.05)',border:'1px solid rgba(16,185,129,.15)'}}>
              <i className="fa-solid fa-arrow-right-to-bracket mt-0.5 text-emerald-400" style={{fontSize:'.7rem'}}/>
              <div>
                <div className="text-xs font-semibold text-emerald-400">From the Hub (recommended)</div>
                <div style={{fontSize:'.62rem',color:'rgba(143,163,192,.5)',marginTop:'2px'}}>Log in to the MTSI Hub on port 3010 and click <strong style={{color:'rgba(201,168,76,.6)'}}>Launch</strong> on the MASH card for one-click SSO.</div>
              </div>
            </div>
            <div className="flex items-start gap-3 px-3 py-2.5 rounded-lg"
              style={{background:'rgba(201,168,76,.04)',border:'1px solid rgba(201,168,76,.1)'}}>
              <i className="fa-solid fa-keyboard mt-0.5" style={{fontSize:'.7rem',color:'var(--gold)'}}/>
              <div>
                <div className="text-xs font-semibold" style={{color:'var(--gold)'}}>Direct login</div>
                <div style={{fontSize:'.62rem',color:'rgba(143,163,192,.5)',marginTop:'2px'}}>Use your Hub credentials. Dev: <span className="font-mono" style={{color:'rgba(201,168,76,.7)'}}>admin / admin</span></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   KPI CARD
══════════════════════════════════════════════════════════════ */
function KpiCard({icon, label, value, valueColor, sub, progress, children}) {
  return (
    <div className="card card-kpi card-tilt p-6">
      <div className="flex items-start justify-between mb-4">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center"
          style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.18)'}}>
          <i className={`fa-solid ${icon} text-base`} style={{color:'var(--gold)'}}/>
        </div>
      </div>
      <div className="uppercase tracking-widest mb-2" style={{fontSize:'.59rem',fontWeight:700,color:'rgba(143,163,192,.5)',letterSpacing:'.1em'}}>{label}</div>
      <div className="font-head font-bold leading-none mb-2.5" style={{fontSize:'2rem',color:valueColor||'var(--gold)'}}>{value}</div>
      {progress != null && <div className="mb-3"><Prog v={progress} cls={progress>=90?'p-g':progress>=75?'p-gold':'p-a'}/></div>}
      <div className="text-xs" style={{color:'rgba(143,163,192,.45)'}}>{sub}</div>
      {children}
    </div>
  );
}

function NextMilestoneCard({ms}) {
  if (!ms) return null;
  const days  = daysUntil(ms.dueDate);
  const urgCls = days<=14?'b-r':days<=30?'b-a':'b-gold';
  const icons  = {inspection:'fa-magnifying-glass-chart','self-inspection':'fa-clipboard-list',construction:'fa-helmet-safety'};
  return (
    <div className="card card-kpi card-tilt p-6">
      <div className="flex items-start justify-between mb-4">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center"
          style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.18)'}}>
          <i className={`fa-solid ${icons[ms.type]||'fa-clock'} text-base`} style={{color:'var(--gold)'}}/>
        </div>
        <Badge cls={urgCls}>{days != null ? `${days}d` : '—'}</Badge>
      </div>
      <div className="uppercase tracking-widest mb-2" style={{fontSize:'.59rem',fontWeight:700,color:'rgba(143,163,192,.5)',letterSpacing:'.1em'}}>Next Major Milestone</div>
      <div className="font-head text-sm font-semibold leading-snug mb-1" style={{color:'var(--off-white)'}}>{ms.title}</div>
      <div className="text-xs" style={{color:'rgba(143,163,192,.4)'}}>{ms.site}</div>
      <div className="text-xs mt-0.5" style={{color:'rgba(143,163,192,.35)'}}>Due {fmtDate(ms.dueDate)}</div>
      {ms.flag==='amber' && (
        <div className="flex items-center gap-x-2 mt-3 px-2.5 py-2 rounded-lg text-[9px]"
          style={{background:'rgba(245,158,11,.06)',color:'rgba(245,158,11,.75)'}}>
          <i className="fa-solid fa-flag text-[8px] shrink-0"/>
          <span className="line-clamp-2">{ms.notes}</span>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   FACILITY CARD
══════════════════════════════════════════════════════════════ */
function FacilityCard({site, onClick}) {
  const p   = site.compliance;
  const lbl = p>=95?'Fully Compliant':p>=82?'Minor Gaps':'At Risk';
  const cls = p>=95?'b-g':p>=82?'b-a':'b-r';
  const bar = p>=95?'p-g':'p-gold';
  return (
    <div onClick={onClick} className="card card-tilt cursor-pointer p-7 transition-all"
      style={{}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(201,168,76,.35)';e.currentTarget.style.boxShadow='0 8px 36px rgba(0,0,0,.6),0 0 24px rgba(201,168,76,.08)';}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor='';e.currentTarget.style.boxShadow='';}}>
      <div className="flex items-start justify-between mb-1">
        <div>
          <div className="font-head font-bold uppercase tracking-widest text-sm" style={{color:'var(--off-white)',letterSpacing:'.1em'}}>{site.name}</div>
          <div className="text-xs mt-0.5 uppercase tracking-wider" style={{color:'rgba(143,163,192,.4)',fontSize:'.65rem',letterSpacing:'.08em'}}>{site.location}</div>
        </div>
        <div className="font-head font-bold leading-none" style={{fontSize:'2.2rem',color:'var(--gold)'}}>{p}%</div>
      </div>
      <div className="mt-5 mb-4"><Prog v={p} cls={bar} h="h-[5px]"/></div>
      <div className="flex items-center justify-between">
        <Badge cls={cls}>{lbl}</Badge>
        <span style={{fontSize:'10px',color:'rgba(143,163,192,.35)'}}>{site.openFindings||0} open items</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   TIMELINE ITEM (Dashboard right column)
══════════════════════════════════════════════════════════════ */
function TimelineItem({item, isLast}) {
  const days   = daysUntil(item.dueDate);
  const urgent = days !== null && days <= 14;
  const soon   = days !== null && days <= 30 && !urgent;
  const urgCls = urgent?'b-r':soon?'b-a':'b-gold';
  const dotC   = urgent?'var(--red)':soon?'var(--amber)':'var(--gold)';
  const icons  = {inspection:'fa-magnifying-glass-chart','self-inspection':'fa-clipboard-list',construction:'fa-helmet-safety'};
  const dayLbl = days===null?'—':days<0?`${Math.abs(days)}d OVR`:days===0?'TODAY':`${days}d`;

  return (
    <div className="relative flex gap-x-4 pb-6">
      {/* Connector */}
      {!isLast && (
        <div className="absolute top-10 bottom-0 w-px" style={{left:'19px',background:`linear-gradient(to bottom,${dotC}40,transparent)`}}/>
      )}
      {/* Icon */}
      <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 mt-0.5"
        style={{background:`rgba(201,168,76,.07)`,border:`1px solid ${dotC}35`}}>
        <i className={`fa-solid ${icons[item.type]||'fa-circle'} text-sm`} style={{color:dotC}}/>
      </div>
      {/* Content */}
      <div className="flex-1 min-w-0 pt-1">
        <div className="flex items-start justify-between gap-x-3 mb-0.5">
          <div className="font-head font-semibold text-sm leading-snug" style={{color:'var(--off-white)'}}>{item.title}</div>
          <Badge cls={urgCls}>{dayLbl}</Badge>
        </div>
        <div className="mb-0.5 uppercase tracking-wider" style={{fontSize:'9px',color:'rgba(143,163,192,.4)',letterSpacing:'.07em'}}>{item.site} · {fmtDate(item.dueDate)}</div>
        <div style={{fontSize:'9px',color:'rgba(143,163,192,.3)'}} className="mb-1">{item.detail}</div>

        {/* Phase bar */}
        {item.phases && <PhaseBar phases={item.phases}/>}
        {item.idealTimeline && item.phases && (
          <div style={{fontSize:'8px',color:'rgba(143,163,192,.3)'}} className="mt-1.5 uppercase tracking-wider">
            Ideal timeline: {item.idealTimeline}
          </div>
        )}

        {/* Prep bar */}
        {item.prepPct !== undefined && !item.phases && (
          <div className="mt-2">
            <div className="flex justify-between mb-1" style={{fontSize:'9px',color:'rgba(143,163,192,.35)'}}>
              <span className="uppercase tracking-wider" style={{fontSize:'8px'}}>Preparation</span>
              <span>{item.prepPct}%</span>
            </div>
            <Prog v={item.prepPct} cls={item.prepPct>=80?'p-g':'p-gold'} h="h-[4px]"/>
          </div>
        )}

        {/* Flag */}
        {item.flag==='amber' && (
          <div className="flex items-center gap-x-1.5 mt-2" style={{fontSize:'8px',color:'rgba(245,158,11,.6)'}}>
            <i className="fa-solid fa-flag shrink-0" style={{fontSize:'8px'}}/>
            <span className="line-clamp-1">{item.notes}</span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DASHBOARD SECTION
══════════════════════════════════════════════════════════════ */
const FEATURED = ['lincolnia-hq','texas-field','california-lab','maryland-warehouse'];

function DashboardSection({data, onNavigate}) {
  const {sites=[], risks=[], budget={}, compliance={}, milestones=[], activity=[]} = data;

  const featured    = FEATURED.map(id=>sites.find(s=>s.id===id)).filter(Boolean);
  const openRisks   = risks.filter(r=>r.status!=='resolved');
  const highRisks   = openRisks.filter(r=>r.severity==='critical'||r.severity==='high');
  const avgPosture  = sites.length ? Math.round(sites.reduce((a,s)=>a+s.compliance,0)/sites.length) : 0;
  const compliantCt = sites.filter(s=>s.compliance>=95).length;
  const atRiskCt    = sites.filter(s=>s.compliance<82).length;
  const budgetTotal = budget.total||0;
  const budgetSpent = budget.spent||0;
  const budgetRemain= budgetTotal-budgetSpent;
  const budgetPct   = budgetTotal ? Math.round(budgetRemain/budgetTotal*100) : 0;
  const nextMs      = milestones[0];
  const actColor    = {success:'bg-emerald-400',warning:'bg-amber-400',info:'bg-yellow-500',danger:'bg-red-400'};

  useEffect(()=>{ MASH.initTilt(); },[featured.length]);

  return (
    <div className="section">
      {/* Page heading */}
      <div className="flex items-end justify-between mb-8">
        <div>
          <div className="sec-heading mb-1.5">Program Overview</div>
          <h2 className="font-head font-bold" style={{fontSize:'1.75rem',color:'var(--off-white)',letterSpacing:'-.01em'}}>
            Security Operations Dashboard
          </h2>
          <p className="text-xs mt-1" style={{color:'rgba(143,163,192,.4)'}}>
            {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
          </p>
        </div>
        <span className="text-[9px] font-mono uppercase tracking-widest px-4 py-1.5 rounded"
          style={{background:'rgba(201,168,76,.06)',border:'1px solid rgba(201,168,76,.15)',color:'rgba(201,168,76,.5)'}}>
          FY26 Q2 &nbsp;·&nbsp; SECRET//NOFORN
        </span>
      </div>

      {/* KPI Row */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">
        <KpiCard icon="fa-building" label="Active Facilities" value={sites.length}
          sub={`${compliantCt} Compliant · ${atRiskCt} Need Attention`}/>

        <KpiCard icon="fa-shield-halved" label="Overall Security Posture"
          value={`${avgPosture}%`} valueColor="var(--gold)"
          progress={avgPosture} sub="↑ 4% vs. Last Month"/>

        <KpiCard icon="fa-dollar-sign" label="FY26 Budget Remaining"
          value={`$${(budgetRemain/1e6).toFixed(2)}M`}
          progress={budgetPct} sub={`${budgetPct}% of $${(budgetTotal/1e6).toFixed(2)}M approved`}/>

        <KpiCard icon="fa-triangle-exclamation" label="Open Risk Items"
          value={openRisks.length}
          valueColor={openRisks.length>4?'#EF4444':'var(--gold)'}
          sub={`${highRisks.length} High Priority · ${openRisks.length - highRisks.length} Medium`}>
          <div className="space-y-1.5 mt-3">
            {openRisks.slice(0,3).map(r=>(
              <div key={r.id} className="flex items-center justify-between" style={{fontSize:'10px'}}>
                <span className="truncate mr-2" style={{color:'rgba(143,163,192,.5)'}}>{(r.title||'').split('—')[0].trim().slice(0,28)}</span>
                <Badge cls={sevCls(r.severity)}>{r.severity?.toUpperCase()}</Badge>
              </div>
            ))}
          </div>
        </KpiCard>

        <NextMilestoneCard ms={nextMs}/>
      </div>

      {/* Main two-column layout */}
      <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">

        {/* LEFT — Facilities from Orbit */}
        <div className="col-span-1 xl:col-span-7">
          <div className="flex items-end justify-between mb-5">
            <div>
              <div className="sec-heading mb-1">Facilities from Orbit</div>
              <p className="text-xs" style={{color:'rgba(143,163,192,.4)'}}>Active cleared facilities under program management</p>
            </div>
            <button onClick={()=>onNavigate('sites')}
              className="text-xs font-bold uppercase tracking-wider transition-colors flex items-center gap-x-1.5"
              style={{color:'var(--gold)',fontSize:'.65rem',letterSpacing:'.08em'}}>
              View All {sites.length} Sites <i className="fa-solid fa-arrow-right text-[9px]"/>
            </button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {featured.map(s=>(
              <FacilityCard key={s.id} site={s} onClick={()=>MASH.openSiteModal(s.id)}/>
            ))}
          </div>
        </div>

        {/* RIGHT — Timeline */}
        <div className="col-span-1 xl:col-span-5">
          <div className="mb-5">
            <div className="sec-heading mb-1">Upcoming Inspections &amp; Secure Space Projects</div>
            <p className="text-xs" style={{color:'rgba(143,163,192,.4)'}}>Ideal timeline for new secure spaces: 4–8 months</p>
          </div>
          <div className="card p-6">
            {milestones.map((m,i)=>(
              <TimelineItem key={m.id} item={m} isLast={i===milestones.length-1}/>
            ))}
          </div>
        </div>

      </div>

      {/* Recent Activity */}
      {activity.length>0 && (
        <div className="mt-6 card p-5">
          <div className="sec-heading mb-4">Recent Program Activity</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {activity.slice(0,6).map(a=>{
              const ts=new Date(a.timestamp);
              return(
                <div key={a.id} className="flex gap-x-3" style={{fontSize:'10px'}}>
                  <div className={`w-1.5 shrink-0 rounded-full mt-1 ${actColor[a.type]||'bg-white/25'}`} style={{minHeight:'14px'}}/>
                  <div>
                    <div className="font-medium leading-snug" style={{color:'rgba(240,244,248,.7)'}}>{a.message}</div>
                    <div className="mt-0.5" style={{color:'rgba(143,163,192,.35)'}}>{ts.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · {a.site}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SITES SECTION
══════════════════════════════════════════════════════════════ */
function SitesSection({data}) {
  const [filterStatus, setFilterStatus] = useState('');
  const [sort, setSort]                 = useState('compliance-desc');
  let sites = [...(data.sites||[])];
  if (filterStatus) sites = sites.filter(s=>s.status===filterStatus);
  if (sort==='compliance-asc')  sites.sort((a,b)=>a.compliance-b.compliance);
  else if (sort==='name-asc')   sites.sort((a,b)=>a.name.localeCompare(b.name));
  else                          sites.sort((a,b)=>b.compliance-a.compliance);

  const bar = v => (
    <div className="flex items-center gap-x-2">
      <span className="font-mono text-xs w-8 text-right" style={{color:'var(--gold)'}}>{v}%</span>
      <div className="w-14 prog prog-s"><div className={`prog-fill p-gold`} style={{width:`${v}%`}}/></div>
    </div>
  );

  return (
    <div className="section">
      <div className="flex items-center justify-between mb-7">
        <div>
          <div className="sec-heading mb-1">All Facilities</div>
          <h2 className="font-head text-[1.8rem] font-bold" style={{color:'var(--off-white)'}}>Facility Overview</h2>
        </div>
        <div className="flex items-center gap-x-3">
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="inp w-auto text-xs py-1.5">
            <option value="">All Statuses</option>
            <option value="green">Compliant</option>
            <option value="amber">Needs Attention</option>
          </select>
          <select value={sort} onChange={e=>setSort(e.target.value)} className="inp w-auto text-xs py-1.5">
            <option value="compliance-desc">Sort: Security Posture ↓</option>
            <option value="compliance-asc">Sort: Security Posture ↑</option>
            <option value="name-asc">Sort: Name A–Z</option>
          </select>
        </div>
      </div>
      <div className="sites-table-wrap card overflow-hidden mb-6">
        <table className="w-full text-sm">
          <thead className="border-b" style={{borderColor:'rgba(201,168,76,.1)'}}>
            <tr>
              <th className="text-left px-6 py-4">Facility</th>
              <th className="text-left px-4 py-4">Location</th>
              <th className="text-left px-4 py-4">Security Posture</th>
              <th className="text-left px-4 py-4">Personnel Security</th>
              <th className="text-left px-4 py-4">Audit Readiness</th>
              <th className="text-left px-4 py-4">SCIF Controls</th>
              <th className="text-left px-4 py-4">Emanations Sec.</th>

            </tr>
          </thead>
          <tbody className="divide-y" style={{borderColor:'rgba(201,168,76,.05)'}}>
            {sites.map(s=>(
              <tr key={s.id}>
                <td className="px-6 py-4">
                  <div className="font-head font-bold uppercase tracking-wide text-sm" style={{color:'var(--off-white)',letterSpacing:'.06em'}}>{s.name}</div>
                  <div style={{fontSize:'9px',color:'rgba(143,163,192,.35)'}} className="mt-0.5 uppercase tracking-wider">{s.type}</div>
                </td>
                <td className="px-4 py-4 text-xs" style={{color:'rgba(143,163,192,.45)'}}>{s.location}</td>
                <td className="px-4 py-4">
                  <span className="font-head font-bold text-xl" style={{color:'var(--gold)'}}>{s.compliance}%</span>
                </td>
                <td className="px-4 py-4">{bar(s.nispom)}</td>
                <td className="px-4 py-4">{bar(s.daapm)}</td>
                <td className="px-4 py-4">{bar(s.icd705)}</td>
                <td className="px-4 py-4">{bar(s.tempest)}</td>
                <td className="px-4 py-4 text-xs" style={{color:'rgba(143,163,192,.45)'}}>{s.ssm||'—'}</td>
                <td className="px-4 py-4 text-xs" style={{color:'rgba(143,163,192,.45)'}}>{fmtDate(s.nextAudit)}</td>
                <td className="px-4 py-4"><Badge cls={s.status==='green'?'b-g':'b-a'}>{s.status==='green'?'COMPLIANT':'NEEDS ATTN'}</Badge></td>
                <td className="px-4 py-4">

              <Badge cls={s.openFindings>0?'b-a':'b-g'}>{s.openFindings||0} findings</Badge>

            <div className="mb-4" style={{fontSize:'10px',color:'rgba(143,163,192,.35)'}}>SSM: {s.ssm||'—'} · {s.personnel} personnel · {s.scifZones} SCIF zones</div>
            <div className="grid grid-cols-2 gap-2 mb-4" style={{fontSize:'9px'}}>
              {[
                ['TS/SCI', s.totalClearances?.tsSci||0],
