<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASH — MTSI Advanced Sentinel Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zt: { bg:'var(--zt-bg)', surface:'var(--zt-surface)', card:'var(--zt-card)', border:'var(--zt-border)', text:'var(--zt-text)', muted:'var(--zt-muted)', dim:'var(--zt-dim)' },
          },
          fontFamily: {
            sans: ['Inter','system-ui','sans-serif'],
            mono: ['JetBrains Mono','Menlo','monospace'],
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }

    /* ── Theme variables ──────────────────────────────────────────────────────
     * :root = light mode defaults.  html.dark = dark mode overrides.
     * Tailwind zt-* tokens reference these vars — toggling the class is all
     * that is needed to switch the entire UI.
     */
    :root {
      --zt-bg:      #f8fafc;
      --zt-surface: #f1f5f9;
      --zt-card:    rgba(255,255,255,0.95);
      --zt-topbar:  rgba(248,250,252,0.95);
      --zt-border:  #e2e8f0;
      --zt-text:    #0f172a;   /* slate-900 */
      --zt-muted:   #334155;   /* slate-700 */
      --zt-dim:     #475569;   /* slate-600 */
      --zt-hover:   rgba(0,0,0,.04);
      --zt-track:   rgba(0,0,0,.07);
      --zt-grid:    rgba(0,0,0,0.04);
    }
    html.dark {
      --zt-bg:      #0b1120;
      --zt-surface: #0d1526;
      --zt-card:    rgba(15,24,41,0.6);
      --zt-topbar:  rgba(13,21,38,0.85);
      --zt-border:  #1e2d45;
      --zt-text:    #f1f5f9;   /* slate-100 — high contrast on dark bg */
      --zt-muted:   #cbd5e1;   /* slate-300 — readable secondary text */
      --zt-dim:     #94a3b8;   /* slate-400 — visible labels / captions */
      --zt-hover:   rgba(255,255,255,.04);
      --zt-track:   rgba(255,255,255,.05);
      --zt-grid:    rgba(255,255,255,0.02);
    }

    body {
      background-color: var(--zt-bg);
      background-image:
        linear-gradient(var(--zt-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--zt-grid) 1px, transparent 1px);
      background-size: 32px 32px;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--zt-text);
      -webkit-font-smoothing: antialiased;
    }

    /* Apply to any element displaying data — numbers, IDs, timestamps */
    .mono { font-family: 'JetBrains Mono', 'Menlo', monospace; }

    ::-webkit-scrollbar              { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track        { background: transparent; }
    ::-webkit-scrollbar-thumb        { background: var(--zt-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: var(--zt-dim); }

    /*
     * Sidebar nav — "left-rule" active state (VS Code / Linear style).
     * A 2px blue left border answers "where am I?" without loud color blocks.
     */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      width: calc(100% - 16px); margin: 1px 8px; padding: 8px 12px;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      color: var(--zt-dim); cursor: pointer; border: none; background: transparent;
      text-align: left; border-left: 2px solid transparent;
      transition: color .12s, background .12s, border-left-color .12s;
    }
    .nav-item:hover  { color: var(--zt-text); background: var(--zt-hover); }
    .nav-item.active { color: var(--zt-text); background: rgba(59,130,246,.08); border-left-color: #3B82F6; }
    .nav-item.active .nav-icon { color: #3B82F6; }

    .zt-input {
      width: 100%; background: var(--zt-hover); border: 1px solid var(--zt-border);
      border-radius: 6px; padding: 10px 14px; font-size: 13px; font-family: inherit;
      color: var(--zt-text); outline: none; transition: border-color .15s, background .15s;
    }
    .zt-input:focus        { border-color: #3B82F6; background: rgba(59,130,246,.04); }
    .zt-input::placeholder { color: var(--zt-dim); }

    .zt-btn-primary {
      width: 100%; background: #3B82F6; color: #fff; border: none;
      border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .15s;
    }
    .zt-btn-primary:hover    { background: #2563EB; }
    .zt-btn-primary:disabled { background: var(--zt-border); color: var(--zt-dim); cursor: not-allowed; }

    /* Shared table primitives */
    .tbl-head {
      display: grid; align-items: center;
      padding: 0 24px; height: 40px; border-bottom: 1px solid var(--zt-border);
    }
    .tbl-row {
      display: grid; align-items: center;
      padding: 0 24px; min-height: 48px; border-bottom: 1px solid var(--zt-border);
      transition: background .1s;
    }
    .tbl-row:hover      { background: var(--zt-hover); }
    .tbl-row:last-child { border-bottom: none; }

    .sort-btn {
      background: none; border: none; cursor: pointer; color: var(--zt-dim);
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: .1em; font-weight: 500;
      padding: 0; display: flex; align-items: center; gap: 4px;
      transition: color .12s;
    }
    .sort-btn:hover { color: var(--zt-text); }

    .tab-btn {
      padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: none; background: transparent; color: var(--zt-dim);
      font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
      letter-spacing: .1em; transition: color .12s, background .12s;
    }
    .tab-btn:hover  { color: var(--zt-text); background: var(--zt-hover); }
    .tab-btn.active { color: var(--zt-text); background: rgba(59,130,246,.1); }

    /* SVG radial gauge progress arc */
    .gauge-arc { transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }

    /* ── Zoom-in modal animation ────────────────────────────────────────────── */
    @keyframes zoom-in-modal {
      from { opacity: 0; transform: scale(0.90) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }
    .modal-zoom-in {
      animation: zoom-in-modal 0.2s cubic-bezier(.22,.61,.36,1) forwards;
    }
  </style>
</head>

<body class="h-full">
<div id="root" class="h-full"></div>

<script type="text/babel">
'use strict';
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ─── AUTH STORE ──────────────────────────────────────────────────────────────
 * Thin localStorage wrapper for the JWT token and decoded user object.
 * AUTH.hdrs() returns the headers every fetch() call needs.
 */
const AUTH = {
  getToken: ()  => localStorage.getItem('mash-token'),
  setToken: t   => localStorage.setItem('mash-token', t),
  getUser:  ()  => { try { return JSON.parse(localStorage.getItem('mash-user')); } catch { return null; } },
  setUser:  u   => localStorage.setItem('mash-user', JSON.stringify(u)),
  clearAll: ()  => { localStorage.removeItem('mash-token'); localStorage.removeItem('mash-user'); },
  hdrs: () => {
    const t = localStorage.getItem('mash-token');
    return t ? { 'Content-Type':'application/json', 'Authorization':`Bearer ${t}` }
             : { 'Content-Type':'application/json' };
  },
};

/* ─── API HELPER ──────────────────────────────────────────────────────────────
 * Centralized fetch wrapper. On 401 the token is expired — wipe it and reload.
 */
function _on401() { AUTH.clearAll(); window.location.reload(); }
const API = {
  async get(c)        { try { const r = await fetch(`/api/${c}`,       { headers:AUTH.hdrs() }); if(r.status===401){_on401();return null;} return r.json(); } catch { return null; } },
  async put(c,d)      { const r = await fetch(`/api/${c}`,             { method:'PUT',    headers:AUTH.hdrs(), body:JSON.stringify(d) }); if(r.status===401)_on401(); return r.json(); },
  async post(c,d)     { const r = await fetch(`/api/${c}`,             { method:'POST',   headers:AUTH.hdrs(), body:JSON.stringify(d) }); if(r.status===401)_on401(); return r.json(); },
  async patch(c,id,d) { const r = await fetch(`/api/${c}/${id}`,       { method:'PATCH',  headers:AUTH.hdrs(), body:JSON.stringify(d) }); if(r.status===401)_on401(); return r.json(); },
  async del(c,id)     { const r = await fetch(`/api/${c}/${id}`,       { method:'DELETE', headers:AUTH.hdrs() });                        if(r.status===401)_on401(); return r.json(); },
};

/* ─── SAFE JSON HELPER ────────────────────────────────────────────────────────
 * Parses a fetch Response as JSON, but guards against HTML error pages.
 * If the server returns a non-2xx response:
 *   • JSON error body  → throws using the server's error message
 *   • HTML/text body   → logs the raw text to the console and throws a
 *                        human-readable message so the browser error panel
 *                        shows something useful instead of "Unexpected token <"
 */
async function safeJson(res) {
  const ct     = res.headers.get('content-type') || '';
  const isJson = ct.includes('application/json');

  if (!res.ok) {
    if (isJson) {
      const json = await res.json();
      throw new Error(json.error || `Server error ${res.status}`);
    }
    const raw = await res.text();
    console.error(`[MASH] Non-JSON error (HTTP ${res.status}):`, raw);
    throw new Error(`Server error ${res.status} — see browser console`);
  }

  // Guard against the SPA fallback returning index.html (status 200, text/html).
  // This happens when a typed API route isn't registered — usually because the
  // server hasn't been restarted after a route was added.
  if (!isJson) {
    const raw = await res.text();
    console.error(`[MASH] Expected JSON but got "${ct}" (HTTP ${res.status}) — is the server restarted?`, raw.slice(0, 300));
    throw new Error('API route not found — restart the server, then hard-refresh (Ctrl+Shift+R)');
  }

  return res.json();
}

/* ─── NAV DEFINITION ──────────────────────────────────────────────────────────
 * Data-driven nav: adding a new view = one object here, nothing else changes.
 */
const NAV_ITEMS = [
  { id:'briefing',   label:'Exec Briefing', icon:'fa-file-shield'          },
  { id:'dashboard',  label:'Dashboard',      icon:'fa-gauge-high'           },
  { id:'sites',      label:'Sites',           icon:'fa-building'             },
  { id:'compliance', label:'Compliance',      icon:'fa-shield-halved'        },
  { id:'budget',     label:'Budget',          icon:'fa-chart-bar'            },
  { id:'timeline',   label:'Timeline',        icon:'fa-diagram-gantt'        },
  { id:'risks',      label:'Risks & Build',   icon:'fa-triangle-exclamation' },
];

/* ─── UTILITIES ───────────────────────────────────────────────────────────────*/
function useClock() {
  const [t, setT] = useState('');
  useEffect(() => {
    const tick = () => setT(new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  return t;
}

const fmtDate   = d => { if(!d) return '—'; return new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fmtMoney  = n => !n ? '$0' : n >= 1e6 ? `$${(n/1e6).toFixed(2)}M` : n >= 1e3 ? `$${(n/1e3).toFixed(0)}K` : `$${n}`;
const daysUntil = d => { if(!d) return null; return Math.ceil((new Date(d+'T12:00:00Z') - new Date()) / 864e5); };

/* ════════════════════════════════════════════════════════════════════════════
   SHARED UI COMPONENTS
   Small, reusable atoms used across multiple views.
════════════════════════════════════════════════════════════════════════════ */

function SeverityBadge({ severity }) {
  const p = {
    critical:{ bg:'rgba(239,68,68,.1)',  border:'rgba(239,68,68,.25)',  color:'#f87171' },
    high:    { bg:'rgba(245,158,11,.1)', border:'rgba(245,158,11,.22)', color:'#fbbf24' },
    medium:  { bg:'rgba(59,130,246,.1)', border:'rgba(59,130,246,.22)', color:'#60a5fa' },
    low:     { bg:'rgba(16,185,129,.1)', border:'rgba(16,185,129,.2)',  color:'#34d399' },
  };
  const c = p[(severity||'').toLowerCase()] || p.low;
  return (
    <span className="mono text-[9px] font-semibold uppercase tracking-[.12em] px-2 py-0.5 rounded shrink-0 whitespace-nowrap"
          style={{background:c.bg, border:`1px solid ${c.border}`, color:c.color}}>
      {severity}
    </span>
  );
}

function StatusBadge({ status }) {
  const m = {
    operational:   {color:'#10B981', bg:'rgba(16,185,129,.08)',  border:'rgba(16,185,129,.2)' },
    compliant:     {color:'#10B981', bg:'rgba(16,185,129,.08)',  border:'rgba(16,185,129,.2)' },
    resolved:      {color:'#10B981', bg:'rgba(16,185,129,.08)',  border:'rgba(16,185,129,.2)' },
    complete:      {color:'#10B981', bg:'rgba(16,185,129,.08)',  border:'rgba(16,185,129,.2)' },
    'in-progress': {color:'#F59E0B', bg:'rgba(245,158,11,.08)',  border:'rgba(245,158,11,.2)' },
    open:          {color:'#F59E0B', bg:'rgba(245,158,11,.08)',  border:'rgba(245,158,11,.2)' },
    active:        {color:'#F59E0B', bg:'rgba(245,158,11,.08)',  border:'rgba(245,158,11,.2)' },
    blocked:       {color:'#EF4444', bg:'rgba(239,68,68,.08)',   border:'rgba(239,68,68,.2)'  },
    overdue:       {color:'#EF4444', bg:'rgba(239,68,68,.08)',   border:'rgba(239,68,68,.2)'  },
  };
  const c = m[(status||'').toLowerCase()] || {color:'#94A3B8', bg:'rgba(148,163,184,.08)', border:'rgba(148,163,184,.2)'};
  return (
    <span className="mono text-[9px] font-semibold uppercase tracking-[.12em] px-2 py-0.5 rounded shrink-0 whitespace-nowrap"
          style={{background:c.bg, border:`1px solid ${c.border}`, color:c.color}}>
      {status}
    </span>
  );
}

/* Section title block — eyebrow label + h1 + optional right-side actions */
function SectionHeader({ eyebrow, title, children }) {
  return (
    <div className="flex items-start justify-between mb-6">
      <div>
        {eyebrow && <div className="mono text-[10px] uppercase tracking-[.2em] text-zt-dim mb-1.5">{eyebrow}</div>}
        <h1 className="text-2xl font-light text-zt-text tracking-tight">{title}</h1>
      </div>
      {children && <div className="flex items-center gap-2 mt-1">{children}</div>}
    </div>
  );
}

/* Compact KPI tile used on the Dashboard overview row */
function StatCard({ label, value, sub, icon, accent='#3B82F6' }) {
  return (
    <div className="rounded-xl p-5 relative overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
      <div className="absolute top-0 left-0 right-0 h-[2px]" style={{background:accent}}/>
      <div className="flex items-start justify-between mb-3">
        <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">{label}</span>
        <i className={`fa-solid ${icon} text-sm`} style={{color:accent}}/>
      </div>
      <div className="mono font-medium text-3xl text-zt-text leading-none mb-2">{value}</div>
      {sub && <div className="mono text-[10px] text-zt-dim uppercase tracking-wider">{sub}</div>}
    </div>
  );
}

/* Horizontal progress bar */
function ThinBar({ pct, color='#10B981', height=4 }) {
  return (
    <div className="w-full rounded-full" style={{height, background:'var(--zt-track)'}}>
      <div className="rounded-full transition-all duration-700"
           style={{height, width:`${Math.min(pct||0,100)}%`, background:color}}/>
    </div>
  );
}

function EmptyState({ message='No data available' }) {
  return (
    <div className="flex flex-col items-center justify-center py-16 gap-3">
      <i className="fa-solid fa-database text-2xl" style={{color:'rgba(59,130,246,.2)'}}/>
      <span className="mono text-[10px] uppercase tracking-widest text-zt-dim">{message}</span>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   VIEW 1 — EXECUTIVE BRIEFING
   Audience: CEO, Executive Director
   Aggregates compliance posture, budget burn, and critical risk exposure.
════════════════════════════════════════════════════════════════════════════ */

/* Large KPI card with top accent bar — exclusive to the Briefing view */
function KpiCard({ label, icon, value, unit, sub, status, accent, onClick, children }) {
  return (
    <div onClick={onClick}
         className={`rounded-xl p-8 relative overflow-hidden transition-all duration-150 ${onClick ? 'cursor-pointer hover:scale-[1.02] hover:shadow-lg hover:shadow-black/20' : ''}`}
         style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
      <div className="absolute top-0 left-0 right-0 h-[2px]" style={{background:accent}}/>
      <div className="flex items-start justify-between mb-7">
        <span className="mono text-[10px] font-semibold uppercase tracking-[.15em] text-zt-muted">{label}</span>
        <i className={`fa-solid ${icon} text-sm`} style={{color:accent}}/>
      </div>
      <div className="mono font-light leading-none mb-4" style={{fontSize:'3rem',color:accent}}>
        {value}<span className="text-xl ml-0.5" style={{color:'rgba(143,163,192,.2)'}}>{unit}</span>
      </div>
      {children && <div className="mb-3">{children}</div>}
      <div className="flex items-center justify-between gap-2">
        <span className="mono text-[10px] uppercase tracking-widest text-zt-muted truncate">{sub}</span>
        <div className="flex items-center gap-1.5 shrink-0">
          <span className="mono text-[10px] uppercase tracking-widest" style={{color:accent}}>{status}</span>
          {onClick && <i className="fa-solid fa-arrow-up-right-from-square text-[8px]" style={{color:`${accent}80`}}/>}
        </div>
      </div>
    </div>
  );
}

function ExecutiveBriefing({ data }) {
  const risks        = data.risks        || [];
  const sites        = data.sites        || [];
  const construction = data.construction || [];
  const activity     = data.activity     || [];

  // ── Recharts — destructured from UMD global ───────────────────────────────
  const RC = window.Recharts || {};
  const { AreaChart, Area, BarChart, Bar, LineChart, Line,
          XAxis, YAxis, CartesianGrid, Tooltip: RCTooltip,
          ResponsiveContainer } = RC;
  const chartsReady = !!ResponsiveContainer;

  // ── Chart theme (respects dark / light mode) ──────────────────────────────
  const isDark     = document.documentElement.classList.contains('dark');
  const gridColor  = isDark ? '#1e2d45' : '#e2e8f0';
  const tickColor  = isDark ? '#94a3b8' : '#64748b';

  // Custom dark tooltip for Recharts
  function ChartTip({ active, payload, label }) {
    if (!active || !payload || !payload.length) return null;
    return (
      <div style={{
        background:'var(--zt-surface)',border:'1px solid var(--zt-border)',
        borderRadius:8,padding:'8px 12px',fontSize:11,
      }}>
        <div className="mono text-zt-dim mb-1">{label}</div>
        {payload.map((p, i) => (
          <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
            <span style={{color:p.color,fontSize:10}}>■</span>
            <span className="mono" style={{color:'var(--zt-muted)'}}>{p.name}:</span>
            <span className="mono font-medium" style={{color:'var(--zt-text)'}}>{fmtMoney(p.value)}</span>
          </div>
        ))}
      </div>
    );
  }

  // ── Live aggregated summary (fetched fresh on mount) ─────────────────────
  const [summary,    setSummary]    = useState(null);
  const [sumLoading, setSumLoading] = useState(true);
  const [sumError,   setSumError]   = useState('');

  useEffect(() => {
    async function load() {
      setSumLoading(true); setSumError('');
      try {
        const res  = await fetch('/api/executive-summary', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setSummary(json);
      } catch (err) { setSumError(err.message); }
      finally { setSumLoading(false); }
    }
    load();
  }, []);

  // ── KPI derivations ───────────────────────────────────────────────────────
  const allocated      = summary?.financials?.allocated     || 0;
  const spent          = summary?.financials?.spent         || 0;
  const contractCount  = summary?.financials?.contractCount || 0;
  const burnPct        = allocated ? Math.round((spent / allocated) * 100) : 0;
  const remaining      = allocated - spent;
  const burnHistory    = summary?.financials?.burnHistory   || [];

  const totalSites     = summary?.sites?.total             || sites.length;
  const readySites     = summary?.sites?.readySites        ?? 0;
  const perSiteFailing = summary?.sites?.perSiteFailing    || {};
  const topContracts   = summary?.sites?.topContracts      || [];

  const expTotal       = summary?.exposures?.total         || 0;
  const expFailing     = summary?.exposures?.failing       || 0;
  const expPending     = summary?.exposures?.pending       || 0;
  const topControls    = summary?.exposures?.topControls   || [];

  // ── Derived colors ────────────────────────────────────────────────────────
  const readinessPct    = totalSites ? Math.round((readySites / totalSites) * 100) : 0;
  const readinessAccent = readinessPct >= 80 ? '#10B981' : readinessPct >= 50 ? '#F59E0B' : '#EF4444';
  const readinessStatus = readinessPct >= 80 ? 'Optimal'  : readinessPct >= 50 ? 'Attention' : 'Critical';

  const burnAccent = burnPct > 85 ? '#EF4444' : burnPct > 70 ? '#F59E0B' : '#3B82F6';
  const burnStatus = burnPct > 85 ? 'Critical' : burnPct > 70 ? 'Watch'   : 'On Track';

  const expAccent = expTotal === 0 ? '#10B981' : expFailing > 10 ? '#EF4444' : '#F59E0B';
  const expStatus = expTotal === 0 ? 'All Clear' : 'Review';

  // ── Threat banner ─────────────────────────────────────────────────────────
  const critRisks   = risks.filter(r => r.status !== 'resolved' && (r.severity === 'critical' || r.severity === 'high'));
  const threatLevel = critRisks.length > 3 || expFailing > 15 ? 'ELEVATED'
                    : critRisks.length > 0 || expFailing > 0  ? 'GUARDED'
                    : 'NOMINAL';
  const threatColor = threatLevel === 'ELEVATED' ? '#EF4444' : threatLevel === 'GUARDED' ? '#F59E0B' : '#10B981';

  const [activeDetail, setActiveDetail] = useState(null);

  // ── Activity icon helper ──────────────────────────────────────────────────
  function activityIcon(type) {
    const t = (type || '').toLowerCase();
    if (t.includes('risk'))       return { icon: 'fa-triangle-exclamation', color: '#EF4444' };
    if (t.includes('contract'))   return { icon: 'fa-file-contract',        color: '#3B82F6' };
    if (t.includes('inspect'))    return { icon: 'fa-clipboard-check',      color: '#10B981' };
    if (t.includes('compli'))     return { icon: 'fa-shield-halved',        color: '#A78BFA' };
    if (t.includes('construct'))  return { icon: 'fa-helmet-safety',        color: '#F59E0B' };
    return                               { icon: 'fa-circle-dot',           color: '#94A3B8' };
  }

  /* ── Renders the body content inside the zoom modal ── */
  function renderModalContent() {

    /* ── OPERATIONAL READINESS deep-dive ─────────────────────────────────── */
    if (activeDetail === 'readiness') {
      const rows = sites.map(s => {
        const sid  = s.siteId || s.id || s._id;
        const fail = perSiteFailing[sid] || 0;
        return { name: s.name || sid, fail, ready: fail === 0 };
      }).sort((a, b) => a.fail - b.fail);
      const maxFail = Math.max(...rows.map(r => r.fail), 1);
      return (
        <>
          <div className="flex items-center gap-3 mb-6">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                 style={{background:'rgba(16,185,129,.12)'}}>
              <i className="fa-solid fa-shield-check text-sm" style={{color:'#10B981'}}/>
            </div>
            <div>
              <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-0.5">Operational Readiness</div>
              <div className="text-lg font-light text-zt-text">
                {readySites} of {totalSites} site{totalSites !== 1 ? 's' : ''} fully compliant
              </div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3 mb-5">
            <div className="rounded-lg p-4 text-center" style={{background:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.15)'}}>
              <div className="mono text-[9px] uppercase tracking-widest mb-1" style={{color:'rgba(16,185,129,.7)'}}>Ready</div>
              <div className="mono text-2xl font-light" style={{color:'#10B981'}}>{readySites}</div>
              <div className="mono text-[9px] text-zt-dim">zero failures</div>
            </div>
            <div className="rounded-lg p-4 text-center" style={{background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.15)'}}>
              <div className="mono text-[9px] uppercase tracking-widest mb-1" style={{color:'rgba(239,68,68,.7)'}}>Attention</div>
              <div className="mono text-2xl font-light" style={{color:'#EF4444'}}>{totalSites - readySites}</div>
              <div className="mono text-[9px] text-zt-dim">have failures</div>
            </div>
            <div className="rounded-lg p-4 text-center" style={{background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.15)'}}>
              <div className="mono text-[9px] uppercase tracking-widest mb-1" style={{color:'rgba(59,130,246,.7)'}}>Readiness</div>
              <div className="mono text-2xl font-light" style={{color:readinessAccent}}>{readinessPct}%</div>
              <div className="mono text-[9px] text-zt-dim">program-wide</div>
            </div>
          </div>
          <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-3">Per-Facility Failure Count</div>
          <div className="space-y-2.5">
            {rows.length === 0 && <div className="text-center py-6 mono text-[10px] text-zt-dim">No site data</div>}
            {rows.map(row => {
              const barPct = row.fail === 0 ? 100 : Math.max(8, 100 - Math.round((row.fail / maxFail) * 100));
              const col    = row.ready ? '#10B981' : row.fail > 5 ? '#EF4444' : '#F59E0B';
              return (
                <div key={row.name}>
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="flex items-center gap-2">
                      <i className={`fa-solid ${row.ready ? 'fa-circle-check' : 'fa-circle-xmark'} text-[11px]`} style={{color:col}}/>
                      <span className="text-xs font-medium text-zt-text">{row.name}</span>
                    </div>
                    <span className="mono text-xs font-semibold" style={{color:col}}>
                      {row.ready ? 'Clean' : `${row.fail} failing`}
                    </span>
                  </div>
                  <ThinBar pct={barPct} color={col} height={4}/>
                </div>
              );
            })}
          </div>
        </>
      );
    }

    /* ── CAPITAL BURN RATE deep-dive ──────────────────────────────────────── */
    if (activeDetail === 'budget') {
      return (
        <>
          <div className="flex items-center gap-3 mb-6">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                 style={{background:'rgba(59,130,246,.12)'}}>
              <i className="fa-solid fa-chart-line text-sm" style={{color:'#3B82F6'}}/>
            </div>
            <div>
              <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-0.5">Capital Allocation</div>
              <div className="text-lg font-light text-zt-text">FY26 Budget Detail</div>
            </div>
          </div>
          <div className="rounded-lg p-4 mb-5" style={{background:`${burnAccent}0a`,border:`1px solid ${burnAccent}28`}}>
            <div className="flex items-center justify-between mb-3">
              <span className="mono text-[10px] uppercase tracking-widest text-zt-dim">Annual Burn Rate</span>
              <span className="mono text-sm font-semibold" style={{color:burnAccent}}>{burnPct}%</span>
            </div>
            <ThinBar pct={burnPct} color={burnAccent} height={6}/>
            <div className="grid grid-cols-3 gap-2 mt-3">
              {[
                ['Spent',     fmtMoney(spent),    '#EF4444'],
                ['Remaining', fmtMoney(remaining), '#10B981'],
                ['Allocated', fmtMoney(allocated), '#94A3B8'],
              ].map(([label, val, col]) => (
                <div key={label} className="text-center">
                  <div className="mono text-[9px] uppercase tracking-widest text-zt-dim mb-0.5">{label}</div>
                  <div className="mono text-xs font-semibold" style={{color:col}}>{val}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-3">
            Top Contracts by Value
            <span className="ml-2 normal-case text-zt-dim" style={{fontSize:'9px'}}>({contractCount} total)</span>
          </div>
          {topContracts.length === 0 ? (
            <div className="text-center py-6 mono text-[10px] text-zt-dim">No contract data — provision contracts in Budget</div>
          ) : (
            <div className="space-y-2">
              {topContracts.map((c, i) => {
                const cBurn = c.totalValue ? Math.round(((c.amountSpent || 0) / c.totalValue) * 100) : 0;
                const cCol  = cBurn > 85 ? '#EF4444' : cBurn > 70 ? '#F59E0B' : '#10B981';
                return (
                  <div key={c.id || i} className="rounded-lg px-4 py-3"
                       style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="min-w-0 mr-4">
                        <div className="mono text-[9px] uppercase tracking-widest text-zt-dim mb-0.5">
                          {c.contractId || c.id} · {c.siteId || '—'}
                        </div>
                        <div className="text-sm font-medium text-zt-text truncate">{c.vendor || 'Unknown Vendor'}</div>
                        {c.scope && <div className="mono text-[9px] text-zt-dim truncate mt-0.5">{c.scope}</div>}
                      </div>
                      <div className="text-right shrink-0">
                        <div className="mono text-sm font-semibold text-zt-text">{fmtMoney(c.totalValue || 0)}</div>
                        <div className="mono text-[9px] uppercase tracking-widest" style={{color:cCol}}>{cBurn}% burned</div>
                      </div>
                    </div>
                    <ThinBar pct={cBurn} color={cCol} height={3}/>
                  </div>
                );
              })}
            </div>
          )}
        </>
      );
    }

    /* ── CRITICAL EXPOSURES deep-dive ─────────────────────────────────────── */
    if (activeDetail === 'exposures') {
      const maxFail = Math.max(...topControls.map(c => c.failCount), 1);
      return (
        <>
          <div className="flex items-center gap-3 mb-6">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                 style={{background:'rgba(239,68,68,.12)'}}>
              <i className="fa-solid fa-triangle-exclamation text-sm" style={{color:'#EF4444'}}/>
            </div>
            <div>
              <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-0.5">Critical Exposures</div>
              <div className="text-lg font-light text-zt-text">
                {expTotal} action item{expTotal !== 1 ? 's' : ''} across all facilities
              </div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3 mb-5">
            <div className="rounded-lg p-4 text-center" style={{background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.15)'}}>
              <div className="mono text-[9px] uppercase tracking-widest mb-1" style={{color:'rgba(239,68,68,.7)'}}>Failing</div>
              <div className="mono text-3xl font-light" style={{color:'#EF4444'}}>{expFailing}</div>
              <div className="mono text-[9px] text-zt-dim">controls failing</div>
            </div>
            <div className="rounded-lg p-4 text-center" style={{background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.15)'}}>
              <div className="mono text-[9px] uppercase tracking-widest mb-1" style={{color:'rgba(245,158,11,.7)'}}>Pending</div>
              <div className="mono text-3xl font-light" style={{color:'#F59E0B'}}>{expPending}</div>
              <div className="mono text-[9px] text-zt-dim">awaiting review</div>
            </div>
          </div>
          <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-3">Most Common Failing Controls</div>
          {topControls.length === 0 ? (
            <div className="text-center py-8">
              <i className="fa-solid fa-shield-check text-2xl mb-3" style={{color:'#10B981'}}/>
              <div className="mono text-[10px] uppercase tracking-widest" style={{color:'rgba(16,185,129,.7)'}}>
                No failing controls — all inspections passing
              </div>
            </div>
          ) : (
            <div className="space-y-3">
              {topControls.map((ctrl, i) => {
                const pct = Math.round((ctrl.failCount / maxFail) * 100);
                const col = i === 0 ? '#EF4444' : i === 1 ? '#F59E0B' : '#94A3B8';
                return (
                  <div key={ctrl.controlId || i} className="rounded-lg p-4"
                       style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
                    <div className="flex items-start justify-between gap-4 mb-2">
                      <div className="min-w-0">
                        <div className="mono text-[9px] font-semibold uppercase tracking-[.12em] mb-0.5" style={{color:col}}>
                          {ctrl.controlId || 'UNKNOWN'}
                        </div>
                        <div className="text-sm font-medium text-zt-text leading-snug">
                          {ctrl.description || 'No description'}
                        </div>
                      </div>
                      <div className="text-right shrink-0">
                        <div className="mono text-lg font-light" style={{color:col}}>{ctrl.failCount}</div>
                        <div className="mono text-[9px] text-zt-dim">site{ctrl.failCount !== 1 ? 's' : ''}</div>
                      </div>
                    </div>
                    <ThinBar pct={pct} color={col} height={3}/>
                  </div>
                );
              })}
            </div>
          )}
        </>
      );
    }

    /* ── SINGLE RISK row drill-down ───────────────────────────────────────── */
    if (activeDetail && typeof activeDetail === 'object') {
      const r          = activeDetail;
      const isHigh     = (r.severity || '').toLowerCase() === 'high';
      const badgeColor = isHigh ? '#F59E0B' : '#EF4444';
      const badgeBg    = isHigh ? 'rgba(245,158,11,.1)' : 'rgba(239,68,68,.1)';
      const mitigation = r.mitigation || r.mitigationPlan ||
        'Immediate escalation to the ISSO and system owner is required. A Plan of Action & Milestones (POA&M) must be established within 72 hours. All affected systems should be isolated pending a full vulnerability assessment and remediation of the identified control deficiency.';
      const poc = r.poc || r.owner || r.manager || 'Program Security Officer (PSO) — security@mtsi.gov';
      return (
        <>
          <div className="flex items-start gap-3 mb-5">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 mt-0.5"
                 style={{background:`${badgeColor}18`}}>
              <i className="fa-solid fa-circle-exclamation text-sm" style={{color:badgeColor}}/>
            </div>
            <div className="min-w-0">
              <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-0.5">Risk Record</div>
              <div className="text-lg font-light text-zt-text leading-snug">{r.title}</div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3 mb-5">
            {[
              ['Severity',      <span className="mono text-[10px] font-semibold uppercase tracking-widest px-2 py-0.5 rounded" style={{background:badgeBg,border:`1px solid ${badgeColor}33`,color:badgeColor}}>{r.severity}</span>],
              ['Fin. Exposure',  <span className="mono text-sm font-semibold text-zt-text">{r.financialImpact ? fmtMoney(r.financialImpact) : 'TBD'}</span>],
              ['Facility',       <span className="text-xs font-medium text-zt-text">{r.site||r.siteId||'All Sites'}</span>],
            ].map(([lbl, val]) => (
              <div key={lbl} className="rounded-lg p-3 text-center"
                   style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
                <div className="mono text-[9px] uppercase tracking-widest text-zt-dim mb-1.5">{lbl}</div>
                {val}
              </div>
            ))}
          </div>
          <div className="mb-4">
            <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-2">Mitigation Plan</div>
            <div className="rounded-lg p-4 text-sm leading-relaxed text-zt-muted"
                 style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
              {mitigation}
            </div>
          </div>
          <div className="rounded-lg px-4 py-3 flex items-center gap-3"
               style={{background:'rgba(59,130,246,.05)',border:'1px solid rgba(59,130,246,.15)'}}>
            <i className="fa-solid fa-user-shield text-sm shrink-0" style={{color:'#3B82F6'}}/>
            <div>
              <div className="mono text-[9px] uppercase tracking-widest mb-0.5" style={{color:'rgba(59,130,246,.7)'}}>
                Point of Contact
              </div>
              <div className="text-sm font-medium text-zt-text">{poc}</div>
            </div>
          </div>
        </>
      );
    }

    return null;
  }

  // ── Sparkline for burn card ───────────────────────────────────────────────
  const BurnSparkline = () => {
    if (!chartsReady || burnHistory.length === 0) return null;
    return (
      <ResponsiveContainer width="100%" height={44}>
        <LineChart data={burnHistory} margin={{top:2,right:0,left:0,bottom:0}}>
          <Line type="monotone" dataKey="spent" name="Spent"
                stroke={burnAccent} strokeWidth={2} dot={false}
                isAnimationActive={false}/>
          <RCTooltip content={<ChartTip/>} cursor={{stroke:`${burnAccent}30`,strokeWidth:1}}/>
        </LineChart>
      </ResponsiveContainer>
    );
  };

  return (
    <div className="max-w-6xl mx-auto space-y-4">

      {/* ── Page header ── */}
      <SectionHeader eyebrow="Top-Level Briefing" title="Strategic Program Health">
        <div className="flex items-center gap-2 px-3 py-1.5 rounded"
             style={{background:`${threatColor}0d`,border:`1px solid ${threatColor}28`}}>
          <span className="w-1.5 h-1.5 rounded-full animate-pulse" style={{background:threatColor}}/>
          <span className="mono text-[10px] font-medium uppercase tracking-[.15em]" style={{color:threatColor}}>
            System: {threatLevel}
          </span>
        </div>
        <button onClick={() => window.print()}
                className="flex items-center gap-2 px-3 py-1.5 rounded transition-colors text-zt-dim hover:text-zt-text"
                style={{background:'rgba(255,255,255,.03)',border:'1px solid var(--zt-border)'}}>
          <i className="fa-solid fa-download text-[10px]"/>
          <span className="mono text-[10px] uppercase tracking-widest">Export</span>
        </button>
      </SectionHeader>

      {sumError && <div className="mono text-xs text-amber-400 px-1">{sumError}</div>}

      {/* ══════════════════════════════════════════════════════════════════════
          ROW 1 — 3 KPI cards
      ══════════════════════════════════════════════════════════════════════ */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

        <KpiCard label="Operational Readiness" icon="fa-shield-check"
          value={sumLoading ? '…' : readySites}
          unit={sumLoading ? '' : `/${totalSites}`}
          sub={`${readinessPct}% of facilities have zero failing controls`}
          status={readinessStatus} accent={readinessAccent}
          onClick={() => setActiveDetail('readiness')}/>

        <KpiCard label="Capital Burn Rate" icon="fa-chart-line"
          value={sumLoading ? '…' : burnPct} unit="%"
          sub={`${fmtMoney(spent)} of ${fmtMoney(allocated)} FY26`}
          status={burnStatus} accent={burnAccent}
          onClick={() => setActiveDetail('budget')}>
          <BurnSparkline/>
        </KpiCard>

        <KpiCard label="Critical Exposures" icon="fa-triangle-exclamation"
          value={sumLoading ? '…' : expTotal} unit=""
          sub={`${expFailing} failing · ${expPending} pending review`}
          status={expStatus} accent={expAccent}
          onClick={() => setActiveDetail('exposures')}/>

      </div>

      {/* ══════════════════════════════════════════════════════════════════════
          ROW 2 — Financial Trend AreaChart  |  Active Construction
      ══════════════════════════════════════════════════════════════════════ */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

        {/* ── Quadrant 1: Financial Trend ─────────────────────────────────── */}
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center justify-between px-5 py-4"
               style={{borderBottom:'1px solid var(--zt-border)'}}>
            <div className="flex items-center gap-2">
              <i className="fa-solid fa-chart-area text-sm" style={{color:'#3B82F6'}}/>
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Financial Trend</span>
            </div>
            <span className="mono text-[9px] uppercase tracking-widest text-zt-dim">6-Month FY26</span>
          </div>
          <div className="p-5">
            {(!chartsReady || burnHistory.length === 0) ? (
              <div className="flex items-center justify-center h-[160px]">
                <span className="mono text-[10px] text-zt-dim">
                  {sumLoading ? 'Loading…' : 'No transaction history'}
                </span>
              </div>
            ) : (
              <ResponsiveContainer width="100%" height={160}>
                <AreaChart data={burnHistory} margin={{top:4,right:4,left:0,bottom:0}}>
                  <defs>
                    <linearGradient id="gradPlanned" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%"  stopColor="#3B82F6" stopOpacity={0.18}/>
                      <stop offset="95%" stopColor="#3B82F6" stopOpacity={0}/>
                    </linearGradient>
                    <linearGradient id="gradSpent" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%"  stopColor={burnAccent} stopOpacity={0.22}/>
                      <stop offset="95%" stopColor={burnAccent} stopOpacity={0}/>
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke={gridColor} vertical={false}/>
                  <XAxis dataKey="month" tick={{fill:tickColor,fontSize:10,fontFamily:'JetBrains Mono,monospace'}} axisLine={false} tickLine={false}/>
                  <YAxis tickFormatter={v => `$${Math.round(v/1000)}k`} tick={{fill:tickColor,fontSize:9,fontFamily:'JetBrains Mono,monospace'}} axisLine={false} tickLine={false} width={46}/>
                  <RCTooltip content={<ChartTip/>}/>
                  <Area type="monotone" dataKey="planned" name="Planned" stroke="#3B82F6" strokeWidth={1.5}
                        fill="url(#gradPlanned)" dot={false} isAnimationActive={false}/>
                  <Area type="monotone" dataKey="spent"   name="Spent"   stroke={burnAccent} strokeWidth={2}
                        fill="url(#gradSpent)" dot={false} isAnimationActive={false}/>
                </AreaChart>
              </ResponsiveContainer>
            )}
            {/* Legend */}
            {chartsReady && burnHistory.length > 0 && (
              <div className="flex items-center gap-4 mt-3">
                {[['Planned','#3B82F6'],[`Spent (${burnPct}%)`,burnAccent]].map(([lbl,col]) => (
                  <div key={lbl} className="flex items-center gap-1.5">
                    <span style={{width:20,height:2,background:col,display:'inline-block',borderRadius:1}}/>
                    <span className="mono text-[9px] uppercase tracking-widest" style={{color:tickColor}}>{lbl}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* ── Quadrant 2: Active Construction ─────────────────────────────── */}
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center justify-between px-5 py-4"
               style={{borderBottom:'1px solid var(--zt-border)'}}>
            <div className="flex items-center gap-2">
              <i className="fa-solid fa-helmet-safety text-sm" style={{color:'#F59E0B'}}/>
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Active Construction</span>
            </div>
            <span className="mono text-[9px] uppercase tracking-widest text-zt-dim">
              {construction.filter(c => c.status !== 'complete').length} active
            </span>
          </div>
          <div className="p-3 space-y-2">
            {construction.length === 0 ? (
              <div className="flex items-center justify-center h-[160px]">
                <span className="mono text-[10px] text-zt-dim">No active construction projects</span>
              </div>
            ) : (
              construction
                .filter(c => c.status !== 'complete')
                .slice(0, 4)
                .map((c, i) => {
                  const pct   = c.percentComplete || 0;
                  const col   = pct >= 80 ? '#10B981' : pct >= 40 ? '#F59E0B' : '#3B82F6';
                  const phase = c.currentPhase || c.phase || c.phases?.[0]?.name || '';
                  const statusLabel = (c.status || '').replace(/-/g, ' ');
                  return (
                    <div key={c.id || i} className="rounded-lg px-4 py-3"
                         style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
                      <div className="flex items-start justify-between gap-3 mb-2">
                        <div className="min-w-0">
                          <div className="text-xs font-semibold text-zt-text truncate">{c.projectTitle || c.title || 'Untitled'}</div>
                          <div className="mono text-[9px] text-zt-dim mt-0.5 flex items-center gap-2">
                            <span>{c.siteId || c.site || '—'}</span>
                            {phase && <><span style={{opacity:.4}}>·</span><span>{phase}</span></>}
                          </div>
                        </div>
                        <div className="text-right shrink-0">
                          <div className="mono text-xs font-semibold" style={{color:col}}>{pct}%</div>
                          <div className="mono text-[9px] text-zt-dim capitalize">{statusLabel}</div>
                        </div>
                      </div>
                      <ThinBar pct={pct} color={col} height={3}/>
                    </div>
                  );
                })
            )}
          </div>
        </div>

      </div>

      {/* ══════════════════════════════════════════════════════════════════════
          ROW 3 — Actionable Intelligence  |  Global Activity Feed
      ══════════════════════════════════════════════════════════════════════ */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

        {/* ── Quadrant 3: Risk Ledger ──────────────────────────────────────── */}
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center justify-between px-5 py-4"
               style={{borderBottom:'1px solid var(--zt-border)'}}>
            <div className="flex items-center gap-2">
              <i className="fa-solid fa-circle-exclamation text-sm" style={{color:'#EF4444'}}/>
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Actionable Intelligence</span>
            </div>
            <span className="mono text-[9px] uppercase tracking-widest text-zt-dim">
              {critRisks.length} item{critRisks.length !== 1 ? 's' : ''}
            </span>
          </div>
          {critRisks.length > 0 ? (
            <div className="divide-y" style={{borderColor:'var(--zt-border)'}}>
              {critRisks.slice(0, 5).map(r => (
                <div key={r.id || r.title}
                     onClick={() => setActiveDetail(r)}
                     className="flex items-center justify-between gap-4 px-5 py-3.5 cursor-pointer transition-colors"
                     style={{}} onMouseEnter={e=>e.currentTarget.style.background='var(--zt-hover)'}
                     onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <div className="flex items-center gap-3 min-w-0">
                    <SeverityBadge severity={r.severity}/>
                    <div className="min-w-0">
                      <div className="text-xs font-medium text-zt-text truncate">{r.title}</div>
                      <div className="mono text-[9px] mt-0.5 uppercase tracking-widest text-zt-dim">
                        {r.site || r.siteId || 'All Sites'}
                      </div>
                    </div>
                  </div>
                  <i className="fa-solid fa-chevron-right text-[10px] text-zt-dim shrink-0"/>
                </div>
              ))}
            </div>
          ) : (
            <div className="flex flex-col items-center justify-center py-10 gap-3">
              <i className="fa-solid fa-shield-check text-xl" style={{color:'#10B981'}}/>
              <span className="mono text-[10px] uppercase tracking-[.15em]" style={{color:'rgba(16,185,129,.7)'}}>
                No active critical or high risks
              </span>
            </div>
          )}
        </div>

        {/* ── Quadrant 4: Global Activity Feed ────────────────────────────── */}
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center justify-between px-5 py-4"
               style={{borderBottom:'1px solid var(--zt-border)'}}>
            <div className="flex items-center gap-2">
              <i className="fa-solid fa-bolt text-sm" style={{color:'#A78BFA'}}/>
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Global Activity</span>
            </div>
            <span className="mono text-[9px] uppercase tracking-widest text-zt-dim">Recent events</span>
          </div>
          <div className="px-5 py-4">
            {activity.length === 0 ? (
              <div className="flex items-center justify-center py-10">
                <span className="mono text-[10px] text-zt-dim">No recent activity</span>
              </div>
            ) : (
              <div className="relative">
                {/* Vertical timeline line */}
                <div className="absolute left-[13px] top-1 bottom-1 w-[1px]"
                     style={{background:'var(--zt-border)'}}/>
                <div className="space-y-4">
                  {activity.slice(0, 5).map((ev, i) => {
                    const { icon, color } = activityIcon(ev.type);
                    const ts = ev.timestamp || ev.date || ev.createdAt;
                    const timeStr = ts ? new Date(ts).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';
                    return (
                      <div key={ev.id || i} className="flex items-start gap-3 relative pl-1">
                        {/* Icon dot */}
                        <div className="w-[26px] h-[26px] rounded-full flex items-center justify-center shrink-0 z-10"
                             style={{background:`${color}15`,border:`1.5px solid ${color}40`}}>
                          <i className={`fa-solid ${icon} text-[9px]`} style={{color}}/>
                        </div>
                        <div className="flex-1 min-w-0 pt-0.5">
                          <div className="text-xs font-medium text-zt-text leading-snug">
                            {ev.description || ev.action || ev.message || 'Activity'}
                          </div>
                          <div className="mono text-[9px] mt-1 flex items-center gap-2 text-zt-dim">
                            {ev.site || ev.siteId ? <span>{ev.site || ev.siteId}</span> : null}
                            <span style={{opacity:.5}}>·</span>
                            <span>{timeStr}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>

      </div>

      {/* ── Zoom Modal Overlay ───────────────────────────────────────────────── */}
      {activeDetail && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{background:'rgba(11,17,32,.82)',backdropFilter:'blur(6px)'}}
             onClick={e => { if (e.target === e.currentTarget) setActiveDetail(null); }}>
          <div className="modal-zoom-in relative w-full max-w-lg rounded-2xl overflow-hidden"
               style={{background:'var(--zt-surface)',border:'1px solid var(--zt-border)',maxHeight:'85vh',overflowY:'auto'}}>
            <button onClick={() => setActiveDetail(null)}
                    className="absolute top-4 right-4 z-10 w-7 h-7 flex items-center justify-center rounded-lg transition-colors text-zt-dim hover:text-zt-text"
                    style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
              <i className="fa-solid fa-xmark text-[11px]"/>
            </button>
            <div className="p-6 pr-12">
              {renderModalContent()}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   VIEW 2 — DASHBOARD
   Audience: Program Managers, FSOs
   Tactical overview: facility posture, upcoming milestones, recent activity.
════════════════════════════════════════════════════════════════════════════ */
function DashboardView({ data, onNavigate }) {
  const sites      = data.sites || [];
  const risks      = data.risks || [];
  const milestones = data.timeline?.milestones || data.milestones || [];
  const activity   = data.activity || [];

  const avgCompliance = sites.length ? Math.round(sites.reduce((a,s)=>a+(s.compliance||0),0)/sites.length) : 0;
  const openRisks     = risks.filter(r=>r.status!=='resolved').length;
  const upcoming      = [...milestones]
    .filter(m=>m.status!=='complete'&&m.endDate)
    .sort((a,b)=>new Date(a.endDate)-new Date(b.endDate))
    .slice(0,5);

  return (
    <div className="max-w-6xl mx-auto space-y-6">
      <SectionHeader eyebrow="Program Overview" title="Operational Dashboard"/>

      {/* Stat row */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <StatCard label="Active Sites"   value={sites.length}        sub="All facilities"     icon="fa-building"             accent="#3B82F6"/>
        <StatCard label="Avg Compliance" value={`${avgCompliance}%`} sub="Across all sites"   icon="fa-shield-halved"        accent={avgCompliance>=90?'#10B981':'#F59E0B'}/>
        <StatCard label="Open Risks"     value={openRisks}           sub="Unresolved items"   icon="fa-triangle-exclamation" accent={openRisks>0?'#F59E0B':'#10B981'}/>
        <StatCard label="Milestones"     value={milestones.length}   sub="Total program items" icon="fa-diagram-gantt"       accent="#94A3B8"/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

        {/* Site posture */}
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid var(--zt-border)'}}>
            <div className="flex items-center gap-2">
              <i className="fa-solid fa-building text-sm" style={{color:'#3B82F6'}}/>
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Facility Posture</span>
            </div>
            <button onClick={()=>onNavigate('sites')}
                    className="mono text-[10px] uppercase tracking-widest text-zt-dim hover:text-blue-400 transition-colors">
              View all →
            </button>
          </div>
          <div className="p-2">
            {sites.length===0 ? <EmptyState message="No sites loaded"/> :
              sites.slice(0,6).map(site => {
                const pct = site.compliance||0;
                const col = pct>=95?'#10B981':pct>=80?'#F59E0B':'#EF4444';
                return (
                  <div key={site.id||site.name} className="flex items-center gap-4 px-3 py-2.5">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between mb-1.5">
                        <span className="text-xs font-medium text-zt-text truncate pr-2">{site.name}</span>
                        <span className="mono text-[11px] font-medium shrink-0" style={{color:col}}>{pct}%</span>
                      </div>
                      <ThinBar pct={pct} color={col} height={4}/>
                    </div>
                  </div>
                );
              })}
          </div>
        </div>

        {/* Upcoming milestones */}
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid var(--zt-border)'}}>
            <div className="flex items-center gap-2">
              <i className="fa-solid fa-flag text-sm" style={{color:'#94A3B8'}}/>
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Upcoming Milestones</span>
            </div>
            <button onClick={()=>onNavigate('timeline')}
                    className="mono text-[10px] uppercase tracking-widest text-zt-dim hover:text-blue-400 transition-colors">
              View all →
            </button>
          </div>
          <div>
            {upcoming.length===0 ? <EmptyState message="No upcoming milestones"/> :
              upcoming.map(ms => {
                const days    = daysUntil(ms.endDate);
                const urgency = days!==null&&days<14?'#EF4444':days!==null&&days<30?'#F59E0B':'#94A3B8';
                return (
                  <div key={ms.id||ms.title}
                       className="flex items-center gap-4 px-5 py-3.5 border-b border-zt-border last:border-0">
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-zt-text truncate">{ms.title}</div>
                      <div className="mono text-[10px] mt-0.5 uppercase tracking-widest text-zt-dim">{ms.site||'All Sites'}</div>
                    </div>
                    <div className="text-right shrink-0">
                      <div className="mono text-xs font-medium" style={{color:urgency}}>
                        {days!==null?`${days}d`:'—'}
                      </div>
                      <div className="mono text-[9px] text-zt-dim uppercase tracking-wider">remaining</div>
                    </div>
                  </div>
                );
              })}
          </div>
        </div>
      </div>

      {/* Recent activity */}
      {activity.length > 0 && (
        <div className="rounded-xl overflow-hidden" style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
          <div className="flex items-center gap-2 px-5 py-4" style={{borderBottom:'1px solid var(--zt-border)'}}>
            <i className="fa-solid fa-clock-rotate-left text-sm" style={{color:'#94A3B8'}}/>
            <span className="mono text-[10px] font-semibold uppercase tracking-[.14em] text-zt-muted">Recent Activity</span>
          </div>
          {activity.slice(0,6).map((act,i) => (
            <div key={act.id||i}
                 className="flex items-start gap-4 px-5 py-3.5 border-b border-zt-border last:border-0">
              <div className="flex items-center justify-center w-7 h-7 rounded-full shrink-0 mt-0.5"
                   style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.15)'}}>
                <i className="fa-solid fa-bolt text-[10px] text-blue-400"/>
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm text-zt-text">{act.description||act.message||act.title}</div>
                <div className="mono text-[10px] mt-0.5 text-zt-dim">{fmtDate(act.date||act.timestamp)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   VIEW 3 — SITES SECTION
   Sortable/searchable facility table with a right-side slide-over drawer
   for creating and editing site records via POST /api/sites and
   PUT /api/sites/:id.
════════════════════════════════════════════════════════════════════════════ */

/*
 * INPUT_CLS — shared Tailwind class string for all form inputs.
 * Uses dark: modifiers so the field adapts to both modes without JS.
 * The focus:ring utilities provide the keyboard-accessible focus indicator
 * required by WCAG 2.1 success criterion 2.4.7.
 */
const INPUT_CLS = [
  'w-full px-3 py-2.5 rounded-lg text-sm font-mono',
  'bg-white dark:bg-slate-800/60',
  'border border-slate-200 dark:border-slate-700',
  'text-slate-900 dark:text-white',
  'placeholder-slate-400 dark:placeholder-slate-500',
  'focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400',
  'focus:border-transparent transition-colors',
].join(' ');

/* Shared class string for native <select> elements in forms */
const SELECT_CLS = [
  'w-full px-3 py-2.5 rounded-lg text-sm font-mono cursor-pointer',
  'bg-white dark:bg-slate-900/50',
  'border border-slate-200 dark:border-slate-700',
  'text-slate-900 dark:text-white',
  'focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400',
  'focus:border-transparent transition-colors',
].join(' ');

/* Labelled field wrapper — monospace eyebrow label above any input element */
function FormField({ label, required, children }) {
  return (
    <div>
      <label className="block mb-1.5 font-mono text-[10px] font-semibold uppercase
                        tracking-widest text-slate-500 dark:text-slate-400">
        {label}{required && <span className="text-red-500 ml-0.5">*</span>}
      </label>
      {children}
    </div>
  );
}

/* Status badge for facility operational state — strict palette per design spec */
function SiteStatusBadge({ status }) {
  const s = (status || '').toLowerCase();
  let cls;
  if (s === 'active') {
    cls = 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10 border-emerald-500/20';
  } else if (s === 'construction' || s === 'renovation') {
    cls = 'text-amber-600 dark:text-amber-400 bg-amber-500/10 border-amber-500/20';
  } else {
    // Decommissioned + unknown
    cls = 'text-slate-500 dark:text-slate-400 bg-slate-500/10 border-slate-500/20';
  }
  return (
    <span className={`mono text-[9px] font-semibold uppercase tracking-[.12em] px-2 py-0.5 rounded border ${cls}`}>
      {status || '—'}
    </span>
  );
}

function SitesSection({ data, onDataChange }) {
  const sites = data.sites || [];

  // ── Table state ────────────────────────────────────────────────────────────
  const [query,   setQuery]   = useState('');
  const [sortKey, setSortKey] = useState('name');
  const [sortAsc, setSortAsc] = useState(true);

  function toggleSort(key) {
    if (sortKey === key) setSortAsc(a => !a);
    else { setSortKey(key); setSortAsc(true); }
  }

  const rows = useMemo(() => {
    const list = sites.filter(s =>
      !query ||
      (s.name     || '').toLowerCase().includes(query.toLowerCase()) ||
      (s.location || '').toLowerCase().includes(query.toLowerCase())
    );
    return [...list].sort((a, b) => {
      const av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
      if (typeof av === 'number') return sortAsc ? av - bv : bv - av;
      return sortAsc
        ? String(av).localeCompare(String(bv))
        : String(bv).localeCompare(String(av));
    });
  }, [sites, query, sortKey, sortAsc]);

  // name · location · status · scif zones · next inspection
  const COLS = 'grid-cols-[2fr_1.5fr_130px_90px_130px]';

  function SortBtn({ label, col }) {
    const active = sortKey === col;
    return (
      <button className="sort-btn" onClick={() => toggleSort(col)}
              style={{color: active ? 'var(--zt-text)' : 'var(--zt-dim)'}}>
        {label}
        <i className={`fa-solid ${active ? (sortAsc ? 'fa-chevron-up' : 'fa-chevron-down') : 'fa-sort'} text-[8px]`}/>
      </button>
    );
  }

  // ── Slide-over state ───────────────────────────────────────────────────────
  const EMPTY = { siteId: '', name: '', location: '', status: 'Active', scifZones: 0, nextInspection: '' };
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [editTarget, setEditTarget] = useState(null);  // null → create mode
  const [form,       setForm]       = useState(EMPTY);
  const [saving,     setSaving]     = useState(false);
  const [saveError,  setSaveError]  = useState('');

  /* Generic field updater — converts number inputs to Number type */
  const field = key => e =>
    setForm(f => ({ ...f, [key]: e.target.type === 'number' ? Number(e.target.value) : e.target.value }));

  function openCreate() {
    setForm(EMPTY); setEditTarget(null); setSaveError(''); setDrawerOpen(true);
  }

  function openEdit(site) {
    // Coerce legacy status values (e.g. 'green', 'yellow') to a valid enum member
    // so the <select> renders a real option and the PUT payload passes validation.
    const VALID_STATUSES = ['Active', 'Construction', 'Renovation', 'Decommissioned'];
    const safeStatus = VALID_STATUSES.includes(site.status) ? site.status : 'Active';
    setForm({
      siteId:         site.siteId         || '',
      name:           site.name           || '',
      location:       site.location       || '',
      status:         safeStatus,
      scifZones:      site.scifZones      ?? 0,
      nextInspection: site.nextInspection || '',
    });
    setEditTarget(site); setSaveError(''); setDrawerOpen(true);
  }

  function closeDrawer() {
    if (saving) return;
    setDrawerOpen(false); setEditTarget(null); setSaveError('');
  }

  /*
   * handleSave — async mutation handler.
   *
   * The state-update bug fix:
   *   `savedId = saved.id || saved._id` then `sId && sId === savedId`
   *
   *   Without the truthy guard, if both s.id and saved.id are undefined,
   *   `undefined === undefined` evaluates to true for EVERY row, causing the
   *   entire sites array to be overwritten with the single saved document.
   *
   *   By checking `sId &&` first, a falsy (undefined) sId short-circuits to
   *   false before the equality test, so only the row whose real ID matches
   *   is replaced.
   */
  async function handleSave(e) {
    e.preventDefault();
    setSaving(true);
    setSaveError('');
    try {
      const isEdit = !!editTarget;
      const docId  = editTarget?.id || editTarget?._id;
      const url    = isEdit ? `/api/sites/${docId}` : '/api/sites';
      const method = isEdit ? 'PUT' : 'POST';

      const res  = await fetch(url, { method, headers: AUTH.hdrs(), body: JSON.stringify(form) });
      const json = await safeJson(res);
      const saved   = json.data;
      const savedId = saved.id || saved._id;
      const updated = isEdit
        ? sites.map(s => {
            const sId = s.id || s._id;
            return (sId && sId === savedId) ? saved : s;
          })
        : [...sites, saved];

      onDataChange({ ...data, sites: updated });
      closeDrawer();
    } catch (err) {
      setSaveError(err.message);
    } finally {
      setSaving(false);
    }
  }

  const isCreate = !editTarget;

  return (
    <div className="max-w-6xl mx-auto space-y-5">

      {/* Header + Provision button */}
      <SectionHeader eyebrow="Facility Registry" title="Sites & Installations">
        <button onClick={openCreate}
                className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium
                           bg-blue-600 hover:bg-blue-500 text-white transition-colors">
          <i className="fa-solid fa-plus text-xs"/>
          Provision Facility
        </button>
      </SectionHeader>

      {/* Search */}
      <input className="zt-input max-w-sm" placeholder="Search by name or location…"
             value={query} onChange={e => setQuery(e.target.value)}/>

      {/* Table */}
      <div className="rounded-xl overflow-hidden"
           style={{background:'var(--zt-card)',border:'1px solid var(--zt-border)'}}>
        <div className={`tbl-head ${COLS}`}>
          <SortBtn label="Facility Name"    col="name"/>
          <SortBtn label="Location"         col="location"/>
          <SortBtn label="Status"           col="status"/>
          <SortBtn label="SCIF Zones"       col="scifZones"/>
          <SortBtn label="Next Inspection"  col="nextInspection"/>
        </div>
        {rows.length === 0 ? <EmptyState message="No sites match filter"/> :
          rows.map(s => (
            <div key={s.id || s.name}
                 className={`tbl-row ${COLS} cursor-pointer`}
                 onClick={() => openEdit(s)}>
              <div className="min-w-0">
                <div className="text-sm font-medium text-zt-text truncate">{s.name}</div>
                {s.siteId && <div className="mono text-[9px] text-zt-dim truncate">{s.siteId}</div>}
              </div>
              <div className="mono text-xs text-zt-muted truncate">{s.location || '—'}</div>
              <div><SiteStatusBadge status={s.status || 'Active'}/></div>
              <div className="mono text-sm text-zt-muted text-center">{s.scifZones ?? '—'}</div>
              <div className="mono text-xs text-zt-muted">{fmtDate(s.nextInspection)}</div>
            </div>
          ))}
      </div>

      <div className="mono text-[10px] text-zt-dim uppercase tracking-widest">
        {rows.length} of {sites.length} site{sites.length !== 1 ? 's' : ''} shown
        {rows.length > 0 && <span className="opacity-60"> · click any row to edit</span>}
      </div>

      {/* ── Slide-over backdrop — always rendered, opacity/pointer-events toggle ── */}
      <div onClick={closeDrawer}
           className={`fixed inset-0 z-40 transition-opacity duration-200
                       ${drawerOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}
           style={{background: 'rgba(0,0,0,.55)'}}/>

      {/* ── Slide-over panel — always rendered, translates in/out ─────────────── */}
      <aside className={`fixed top-0 right-0 h-full w-full max-w-md z-50 flex flex-col
                         bg-white dark:bg-[#0d1526]
                         border-l border-slate-200 dark:border-slate-700/60
                         shadow-2xl transition-transform duration-300 ease-in-out
                         ${drawerOpen ? 'translate-x-0' : 'translate-x-full'}`}>

        {/* Panel header */}
        <div className="flex items-center justify-between px-6 py-5 shrink-0
                        border-b border-slate-200 dark:border-slate-700/60">
          <div>
            <div className="mono text-[10px] font-semibold uppercase tracking-widest
                            text-slate-500 dark:text-slate-400 mb-0.5">
              {isCreate ? 'New Record' : `Editing · ${editTarget?.siteId || ''}`}
            </div>
            <h2 className="text-base font-semibold text-slate-900 dark:text-white leading-snug">
              {isCreate ? 'Provision Facility' : editTarget?.name || 'Edit Site'}
            </h2>
          </div>
          <button onClick={closeDrawer} disabled={saving}
                  className="p-2 rounded-lg text-slate-500 dark:text-slate-400
                             hover:bg-slate-100 dark:hover:bg-slate-800
                             hover:text-slate-900 dark:hover:text-white
                             transition-colors disabled:opacity-40">
            <i className="fa-solid fa-xmark"/>
          </button>
        </div>

        {/* Form — wraps scrollable body + sticky footer */}
        <form onSubmit={handleSave} className="flex-1 flex flex-col min-h-0">

          {/* Scrollable field area */}
          <div className="flex-1 overflow-y-auto px-6 py-6 space-y-5">

            <FormField label="Facility ID" required>
              <input type="text" className={INPUT_CLS} required
                     placeholder="e.g. lincolnia-hq"
                     value={form.siteId} onChange={field('siteId')}/>
            </FormField>

            <FormField label="Facility Name" required>
              <input type="text" className={INPUT_CLS} required
                     placeholder="e.g. Lincolnia Headquarters"
                     value={form.name} onChange={field('name')}/>
            </FormField>

            <FormField label="Location">
              <input type="text" className={INPUT_CLS}
                     placeholder="e.g. Alexandria, VA"
                     value={form.location} onChange={field('location')}/>
            </FormField>

            <div className="grid grid-cols-2 gap-4">
              <FormField label="Operational Status">
                <select className={SELECT_CLS}
                        value={form.status} onChange={field('status')}>
                  <option value="Active">Active</option>
                  <option value="Construction">Construction</option>
                  <option value="Renovation">Renovation</option>
                  <option value="Decommissioned">Decommissioned</option>
                </select>
              </FormField>
              <FormField label="SCIF Zones">
                <input type="number" className={INPUT_CLS}
                       min="0" step="1"
                       value={form.scifZones} onChange={field('scifZones')}/>
              </FormField>
            </div>

            <FormField label="Next Inspection Date">
              <input type="date" className={INPUT_CLS}
                     value={form.nextInspection} onChange={field('nextInspection')}/>
            </FormField>

            {/* Inline validation / server error */}
            {saveError && (
              <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg
                              bg-red-50 dark:bg-red-950/30
                              border border-red-200 dark:border-red-800/50">
                <i className="fa-solid fa-circle-exclamation
                               text-red-500 dark:text-red-400 text-sm shrink-0 mt-0.5"/>
                <span className="mono text-xs text-red-700 dark:text-red-300 break-words">
                  {saveError}
                </span>
              </div>
            )}

          </div>{/* /scrollable */}

          {/* Sticky footer — inside <form> so the submit button works */}
          <div className="shrink-0 flex items-center justify-end gap-3 px-6 py-4
                          border-t border-slate-200 dark:border-slate-700/60
                          bg-slate-50 dark:bg-slate-900/50">
            <button type="button" onClick={closeDrawer} disabled={saving}
                    className="px-4 py-2 rounded-lg text-sm font-medium
                               text-slate-700 dark:text-slate-300
                               bg-white dark:bg-slate-800
                               border border-slate-200 dark:border-slate-700
                               hover:bg-slate-50 dark:hover:bg-slate-700
                               transition-colors disabled:opacity-40">
              Cancel
            </button>
            <button type="submit" disabled={saving}
                    className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium
                               bg-blue-600 hover:bg-blue-500 text-white
                               transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
              {saving ? (
                <><i className="fa-solid fa-rotate-right animate-spin text-xs"/><span>Saving…</span></>
              ) : isCreate ? (
                <><i className="fa-solid fa-plus text-xs"/><span>Create Facility</span></>
              ) : (
                <><i className="fa-solid fa-floppy-disk text-xs"/><span>Save Changes</span></>
              )}
            </button>
          </div>

        </form>{/* /form */}
      </aside>

    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   VIEW 4 — COMPLIANCE SECTION
   RMF Control Baseline Status — framework coverage grid + control families.

   Design: Tailwind dark: modifiers (not CSS vars) per the High-Contrast
   Enterprise spec. Cards use bg-white / dark:bg-slate-900/40 so light and
   dark modes both have appropriate surface depth.
════════════════════════════════════════════════════════════════════════════ */

/*
 * complianceStatusClasses — returns the Tailwind text-color class pair for
 * a given compliance status string.
 *
 * A switch statement is used rather than if/else because:
 *   1. Each case is a single, closed responsibility — adding a new status
 *      is one new `case`, with no risk of accidentally breaking the
 *      fall-through logic of a chain of else-if branches.
 *   2. The intent is immediately readable: this function does ONLY color
 *      mapping, nothing else.
 *
 * The `(status || '').toLowerCase()` guard handles null/undefined gracefully
