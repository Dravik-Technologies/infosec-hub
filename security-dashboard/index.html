/* ═══════════════════════════════════════════════════════════
   COMPLIANCE SECTION
══════════════════════════════════════════════════════════════ */
function ComplianceSection({data, onRefresh}) {
  const c   = data.compliance||{};
  const circ= 188.5;
  const openFindings   = (c.findings||[]).filter(f=>f.status!=='resolved');
  const closedFindings = (c.findings||[]).filter(f=>f.status==='resolved');

  async function resolveFinding(id) {
    await API.patch('compliance',id,{status:'resolved',resolvedAt:new Date().toISOString()});
    const f=c.findings?.find(x=>x.id===id); if(f){f.status='resolved';}
    onRefresh(); MASH.toast('Finding resolved','success');
  }

  function openAddFinding() {
    MASH.openModal('Add Compliance Finding',`
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2"><label class="inp-lbl">Finding Title</label><input id="fn-t" class="inp" placeholder="Describe the finding…"></div>
        <div><label class="inp-lbl">Control Area</label><select id="fn-s" class="inp">
          <option value="nispom">Personnel &amp; Operational Security</option>
          <option value="daapm">Audit Readiness</option>
          <option value="icd705">SCIF Technical Controls</option>
          <option value="tempest">Emanations Security</option></select></div>
        <div><label class="inp-lbl">Facility</label><select id="fn-si" class="inp">
          ${(data.sites||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
        <div><label class="inp-lbl">Severity</label><select id="fn-sv" class="inp">
          <option value="critical">Critical</option><option value="high">High</option>
          <option value="medium">Medium</option><option value="low">Low</option></select></div>
        <div><label class="inp-lbl">Due Date</label><input type="date" id="fn-d" class="inp"></div>
        <div class="col-span-2"><label class="inp-lbl">Owner</label><input id="fn-o" class="inp" placeholder="e.g. J. Martinez"></div>
        <div class="col-span-2"><label class="inp-lbl">Description</label><textarea id="fn-desc" rows="2" class="inp"></textarea></div>
      </div>`,
      `<button onclick="MASH._saveFinding()" class="btn-gold">Add Finding</button>
       <button onclick="MASH.closeModal()" class="px-5 h-9 rounded text-xs font-semibold uppercase tracking-wider" style="border:1px solid rgba(201,168,76,.2);color:rgba(143,163,192,.6)">Cancel</button>`);
    MASH._saveFinding = async () => {
      const stdEl=document.getElementById('fn-s');
      const site=(data.sites||[]).find(s=>s.id===document.getElementById('fn-si').value);
      const item={id:uid(),title:document.getElementById('fn-t').value,
        standard:stdEl.value,standardName:COMP[stdEl.value]?.label||stdEl.value,
        siteId:site?.id,site:site?.name,severity:document.getElementById('fn-sv').value,
        dueDate:document.getElementById('fn-d').value,owner:document.getElementById('fn-o').value,
        description:document.getElementById('fn-desc').value,status:'open',createdAt:new Date().toISOString()};
      if(!item.title){MASH.toast('Title required','warning');return;}
      c.findings=(c.findings||[]).concat(item);
      await API.put('compliance',c);
      MASH.closeModal();onRefresh();MASH.toast('Finding added','success');
    };
  }

  return (
    <div className="section">
      <div className="mb-7">
        <div className="sec-heading mb-1">Security Compliance</div>
        <h2 className="font-head text-[1.8rem] font-bold" style={{color:'var(--off-white)'}}>Compliance Status</h2>
      </div>

      {/* Gauges */}
      <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-6">
        {(c.standards||[]).map(s=>{
          const cd = COMP[s.id]||{label:s.name,sub:s.name,icon:'fa-shield-halved',color:'var(--gold)'};
          const offset = circ*(1-s.percentage/100);
          return(
            <div key={s.id} className="card p-6">
              <div className="flex items-center gap-x-5 mb-5">
                <div className="radial-wrap">
                  <svg width="84" height="84" viewBox="0 0 84 84">
                    <circle cx="42" cy="42" r="32" fill="none" stroke="rgba(201,168,76,.08)" strokeWidth="7"/>
                    <circle cx="42" cy="42" r="32" fill="none" stroke={cd.color} strokeWidth="7"
                      strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}/>
                  </svg>
                  <div className="radial-lbl" style={{color:cd.color}}>{s.percentage}%</div>
                </div>
                <div>
                  <div className="font-head font-bold text-sm leading-snug mb-1" style={{color:'var(--off-white)'}}>{cd.label}</div>
                  <div className="mb-2 uppercase tracking-wider" style={{fontSize:'8px',color:'rgba(143,163,192,.35)',letterSpacing:'.09em'}}>{cd.sub}</div>
                  <Badge cls={s.percentage>=95?'b-g':s.percentage>=80?'b-a':'b-r'}>
                    {s.percentage>=95?'COMPLIANT':s.percentage>=80?'NEEDS WORK':'NON-COMPLIANT'}
                  </Badge>
                </div>
              </div>
              <div className="pt-4 space-y-1" style={{borderTop:'1px solid rgba(201,168,76,.07)',fontSize:'9px',color:'rgba(143,163,192,.35)'}}>
                <div>{s.openFindings} open finding{s.openFindings!==1?'s':''}</div>
                <div>Next review: {fmtDate(s.nextReview)}</div>
              </div>
              <div className="mt-3 space-y-1.5">
                {(c.checklist||[]).filter(i=>i.standard===s.id).slice(0,3).map(item=>(
                  <div key={item.id} className="flex items-center gap-x-2" style={{fontSize:'9px'}}>
                    <i className={`fa-solid ${item.status==='complete'?'fa-circle-check text-emerald-400':'fa-circle-half-stroke text-amber-400'} shrink-0`}/>
                    <span className="truncate flex-1" style={{color:'rgba(143,163,192,.45)'}}>{item.title.replace(/^(NISPOM|DAAPM|ICD 705|TEMPEST)\s+/,'')}</span>
                    <span className="font-mono font-bold shrink-0" style={{color:'var(--gold)'}}>{item.percentage}%</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Findings */}
      <div className="card p-6">
        <div className="flex items-center justify-between mb-5">
          <div>
            <div className="font-head font-semibold" style={{color:'var(--off-white)'}}>Open Findings</div>
            <div style={{fontSize:'10px',color:'rgba(143,163,192,.4)'}} className="mt-0.5">{openFindings.length} open · {closedFindings.length} resolved</div>
          </div>
          <button onClick={openAddFinding} className="badge b-gold cursor-pointer transition-colors" style={{cursor:'pointer'}}>
            <i className="fa-solid fa-plus mr-1"/> Add Finding
          </button>
        </div>
        <table className="w-full text-xs">
          <thead className="border-b" style={{borderColor:'rgba(201,168,76,.08)'}}>
            <tr>
              <th className="text-left pb-3">Finding</th>
              <th className="text-left pb-3">Control Area</th>
              <th className="text-left pb-3">Facility</th>
              <th className="text-left pb-3">Due</th>
              <th className="text-left pb-3">Severity</th>
              <th className="text-left pb-3">Owner</th>
              <th className="text-left pb-3">Status</th>
              <th className="pb-3"/>
            </tr>
          </thead>
          <tbody className="divide-y" style={{borderColor:'rgba(201,168,76,.05)'}}>
            {[...openFindings,...closedFindings].map(f=>{
              const overdue = f.status!=='resolved' && new Date(f.dueDate)<today;
              const cd = COMP[f.standard]||{label:f.standardName||f.standard};
              return(
                <tr key={f.id} className={f.status==='resolved'?'opacity-50':''}>
                  <td className="py-3">
                    <div className="font-medium" style={{color:'var(--off-white)'}}>{f.title}</div>
                    {f.description && <div className="max-w-xs line-clamp-1 mt-0.5" style={{fontSize:'9px',color:'rgba(143,163,192,.35)'}}>{f.description}</div>}
                  </td>
                  <td className="py-3" style={{color:'rgba(143,163,192,.45)'}}>{cd.label}</td>
                  <td className="py-3" style={{color:'rgba(143,163,192,.45)'}}>{f.site}</td>
                  <td className={`py-3 ${overdue?'text-red-400 font-bold':''}`} style={!overdue?{color:'rgba(143,163,192,.45)'}:{}}>{fmtDate(f.dueDate)}</td>
                  <td className="py-3"><Badge cls={sevCls(f.severity)}>{f.severity?.toUpperCase()}</Badge></td>
                  <td className="py-3" style={{color:'rgba(143,163,192,.45)'}}>{f.owner}</td>
                  <td className="py-3"><Badge cls={f.status==='resolved'?'b-g':'b-r'}>{f.status?.toUpperCase()}</Badge></td>
                  <td className="py-3">
                    {f.status!=='resolved' && (
                      <button onClick={()=>resolveFinding(f.id)} className="text-[9px] text-emerald-400 hover:text-emerald-300 font-bold uppercase tracking-wider">Resolve</button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   BUDGET SECTION
══════════════════════════════════════════════════════════════ */
function BudgetSection({data}) {
  const b        = data.budget||{};
  const barRef   = useRef(null);
  const barChart = useRef(null);
  const qRef     = useRef(null);
  const qChart   = useRef(null);
  const spentPct = b.total ? Math.round(b.spent/b.total*100) : 0;

  const chartDefaults = {
    plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},color:'rgba(143,163,192,.5)'}}},
    responsive:true, maintainAspectRatio:false
  };

  useEffect(()=>{
    if(!barRef.current||!b.bySite) return;
    if(barChart.current) barChart.current.destroy();
    barChart.current=new Chart(barRef.current,{type:'bar',
      data:{labels:b.bySite.map(s=>s.name.split(' ').slice(0,2).join(' ')),
        datasets:[
          {label:'Spent YTD', data:b.bySite.map(s=>s.spent),          backgroundColor:'rgba(201,168,76,.55)', borderRadius:4},
          {label:'Remaining', data:b.bySite.map(s=>s.budgeted-s.spent),backgroundColor:'rgba(201,168,76,.12)', borderRadius:4}
        ]},
      options:{...chartDefaults,
        scales:{x:{stacked:true,grid:{display:false},ticks:{color:'rgba(143,163,192,.35)',font:{size:10}}},
          y:{stacked:true,grid:{color:'rgba(201,168,76,.05)'},ticks:{color:'rgba(143,163,192,.35)',font:{size:10},callback:v=>'$'+Math.round(v/1000)+'K'}}}}});
  },[b.bySite]);

  useEffect(()=>{
    if(!qRef.current||!b.quarterly) return;
    const qArr = Object.entries(b.quarterly).map(([k,v])=>({quarter:k,...v}));
    if(qChart.current) qChart.current.destroy();
    qChart.current=new Chart(qRef.current,{type:'bar',
      data:{labels:qArr.map(q=>q.quarter),
        datasets:[
          {label:'Planned',data:qArr.map(q=>q.planned),backgroundColor:'rgba(201,168,76,.15)',borderRadius:4},
          {label:'Actual', data:qArr.map(q=>q.actual), backgroundColor:'rgba(201,168,76,.48)',borderRadius:4}
        ]},
      options:{...chartDefaults,
        scales:{x:{grid:{display:false},ticks:{color:'rgba(143,163,192,.35)',font:{size:10}}},
          y:{grid:{color:'rgba(201,168,76,.05)'},ticks:{color:'rgba(143,163,192,.35)',font:{size:10},callback:v=>'$'+Math.round(v/1000)+'K'}}}}});
  },[b.quarterly]);

  return (
    <div className="section">
      <div className="mb-7">
        <div className="sec-heading mb-1">Budget &amp; Expenditures</div>
        <h2 className="font-head text-[1.8rem] font-bold" style={{color:'var(--off-white)'}}>FY26 Financial Overview</h2>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-6">
        {[
          {label:'Total FY26 Budget', val:`$${(b.total/1e6).toFixed(2)}M`,    sub:'Contract W9133L-24-D-0047'},
          {label:'Spent YTD',         val:`$${(b.spent/1e6).toFixed(2)}M`,    sub:`${spentPct}% of total`, prog:spentPct},
          {label:'Remaining',         val:`$${((b.total-b.spent)/1e6).toFixed(2)}M`, sub:`${100-spentPct}% remaining`, prog:100-spentPct},
          {label:'Projected Variance',val:'On Track',                         sub:'No overrun projected'},
        ].map((k,i)=>(
          <div key={i} className="card card-kpi p-6">
            <div className="uppercase tracking-widest mb-3" style={{fontSize:'.59rem',fontWeight:700,color:'rgba(143,163,192,.5)',letterSpacing:'.1em'}}>{k.label}</div>
            <div className="font-head font-bold mb-2" style={{fontSize:'1.7rem',color:'var(--gold)'}}>{k.val}</div>
            {k.prog!=null && <div className="mb-3"><Prog v={k.prog} cls={k.prog>80?'p-g':'p-gold'}/></div>}
            <div className="text-xs" style={{color:'rgba(143,163,192,.4)'}}>{k.sub}</div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-3 gap-5 mb-5">
        <div className="card p-6 xl:col-span-2">
          <div className="font-head font-semibold mb-4" style={{color:'var(--off-white)'}}>Spent vs. Budgeted by Facility</div>
          <div style={{height:'220px'}}><canvas ref={barRef}/></div>
        </div>
        <div className="card p-6">
          <div className="font-head font-semibold mb-4" style={{color:'var(--off-white)'}}>Category Breakdown</div>
          <div className="space-y-4">
            {(b.categories||[]).map(cat=>{
              const p=Math.round(cat.spent/cat.budgeted*100)||0;
              return(
                <div key={cat.name}>
                  <div className="flex justify-between text-xs mb-1.5" style={{color:'rgba(143,163,192,.55)'}}>
                    <span>{cat.name}</span>
                    <span className="font-mono font-bold" style={{color:'var(--gold)'}}>${Math.round(cat.spent/1000)}K / ${Math.round(cat.budgeted/1000)}K</span>
                  </div>
                  <Prog v={p} cls={p>90?'p-r':p>75?'p-a':'p-gold'} h="h-[5px]"/>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
        <div className="card p-6">
          <div className="font-head font-semibold mb-4" style={{color:'var(--off-white)'}}>Quarterly Planned vs. Actual</div>
          <div style={{height:'180px'}}><canvas ref={qRef}/></div>
        </div>
        <div className="card p-6">
          <div className="font-head font-semibold mb-4" style={{color:'var(--off-white)'}}>Recent Transactions</div>
          <div className="space-y-3 text-xs">
            {(b.recentTransactions||[]).slice(0,6).map((t,i)=>(
              <div key={i} className="flex items-start justify-between gap-x-4 pb-3" style={{borderBottom:'1px solid rgba(201,168,76,.06)'}}>
                <div>
                  <div className="font-medium" style={{color:'rgba(240,244,248,.75)'}}>{t.vendor}</div>
                  <div style={{fontSize:'9px',color:'rgba(143,163,192,.3)'}}>{t.description} · {t.po}</div>
                </div>
                <div className="text-right shrink-0">
                  <div className="font-mono font-bold" style={{color:'var(--gold)'}}>${t.amount?.toLocaleString()}</div>
                  <div style={{fontSize:'9px',color:'rgba(143,163,192,.28)'}}>{fmtDate(t.date)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   TIMELINE SECTION (Gantt)
══════════════════════════════════════════════════════════════ */
function TimelineSection({data}) {
  const t = data.timeline||{};
  const ms = t.milestones||[];
  const todayPct = ((t.todayOffset||103)/t.totalDays*100).toFixed(1);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
  const BAR = {
    complete:'rgba(16,185,129,.5)', 'in-progress':'rgba(201,168,76,.45)',
    in_progress:'rgba(201,168,76,.45)', 'at-risk':'rgba(239,68,68,.42)', upcoming:'rgba(201,168,76,.1)'
  };
  const BDR = {
    complete:'#10B981','in-progress':'var(--gold)',in_progress:'var(--gold)',
    'at-risk':'var(--red)',upcoming:'rgba(201,168,76,.2)'
  };
  const ICN = {
    complete:'fa-circle-check text-emerald-400','in-progress':'fa-circle-half-stroke',
    in_progress:'fa-circle-half-stroke','at-risk':'fa-triangle-exclamation text-red-400',
    upcoming:'fa-circle'
  };
  const summary = {
    complete:ms.filter(m=>m.status==='complete').length,
    inProg:ms.filter(m=>m.status==='in-progress'||m.status==='in_progress').length,
    atRisk:ms.filter(m=>m.status==='at-risk').length,
    upcoming:ms.filter(m=>m.status==='upcoming').length,
  };
  return (
    <div className="section">
      <div className="flex items-center justify-between mb-7">
        <div>
          <div className="sec-heading mb-1">Program Timeline</div>
          <h2 className="font-head text-[1.8rem] font-bold" style={{color:'var(--off-white)'}}>FY26 Gantt View</h2>
        </div>
        <div className="flex items-center gap-x-5" style={{fontSize:'10px'}}>
          {[
            ['rgba(16,185,129,.5)','Complete',summary.complete],
            ['rgba(201,168,76,.45)','In Progress',summary.inProg],
            ['rgba(239,68,68,.42)','At Risk',summary.atRisk],
            ['rgba(201,168,76,.12)','Upcoming',summary.upcoming],
          ].map(([bg,lbl,cnt])=>(
            <span key={lbl} className="flex items-center gap-x-1.5">
              <span className="w-3 h-2 rounded inline-block" style={{background:bg}}/>
              <span style={{color:'rgba(143,163,192,.45)'}}>{lbl} ({cnt})</span>
            </span>
          ))}
        </div>
      </div>
      <div className="card p-7 overflow-x-auto">
        <div className="flex mb-4" style={{paddingLeft:'230px'}}>
          <div className="flex flex-1 uppercase tracking-wider font-mono" style={{fontSize:'9px',color:'rgba(143,163,192,.28)'}}>
            {months.map(m=><div key={m} className="flex-1 text-center">{m}</div>)}
          </div>
        </div>
        <div className="relative">
          <div className="gantt-today" style={{left:`calc(230px + (100% - 230px) * ${todayPct}/100)`}}>
            <span className="absolute -top-5 left-1 font-mono whitespace-nowrap" style={{fontSize:'8px',color:'var(--gold)'}}>TODAY</span>
          </div>
          {ms.map(m=>{
            const sp=(m.startDay/t.totalDays*100).toFixed(1);
            const ep=(m.endDay/t.totalDays*100).toFixed(1);
            const w =(parseFloat(ep)-parseFloat(sp)).toFixed(1);
            return(
              <div key={m.id} className="gantt-row">
                <div className="w-[230px] shrink-0 flex items-center gap-x-2.5 pr-5">
                  <i className={`fa-solid ${ICN[m.status]||ICN.upcoming} text-xs shrink-0`} style={{color:(m.status==='in-progress'||m.status==='in_progress')?'var(--gold)':'rgba(143,163,192,.4)'}}/>
                  <div className="min-w-0">
                    <div className="text-xs font-medium truncate" style={{color:'var(--off-white)'}}>{m.title}</div>
                    <div className="truncate uppercase tracking-wider" style={{fontSize:'9px',color:'rgba(143,163,192,.3)',letterSpacing:'.06em'}}>{m.site} · {m.standard}</div>
                  </div>
                </div>
                <div className="gantt-bar-wrap flex-1 relative">
                  <div className="gantt-bar" style={{left:`${sp}%`,width:`${w}%`,background:BAR[m.status]||BAR.upcoming,border:`1px solid ${BDR[m.status]||'rgba(201,168,76,.2)'}`}}>
                    {m.progress ? <div className="absolute inset-0 rounded" style={{width:`${m.progress}%`,background:'rgba(255,255,255,.08)'}}/> : null}
                  </div>
                  {m.status==='at-risk' && <span className="absolute right-1 top-0.5 font-mono" style={{fontSize:'8px',color:'var(--red)'}}>DUE {fmtShort(m.dueDate)}</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   RISKS SECTION
══════════════════════════════════════════════════════════════ */
function RisksSection({data, onRefresh}) {
  const risks    = data.risks||[];
  const open     = risks.filter(r=>r.status!=='resolved');
  const resolved = risks.filter(r=>r.status==='resolved');
  const matrix   = {tl:[],tr:[],bl:[],br:[]};
  open.forEach(r=>{
    const hp=r.probability==='high', hi=r.impact==='high';
    if(hp&&hi) matrix.tr.push(r.title);
    else if(hp) matrix.tl.push(r.title);
    else if(hi) matrix.br.push(r.title);
    else matrix.bl.push(r.title);
  });

  async function resolveRisk(id) {
    await API.patch('risks',id,{status:'resolved',resolvedAt:new Date().toISOString()});
    const r=risks.find(x=>x.id===id); if(r) r.status='resolved';
    onRefresh(); MASH.toast('Risk resolved','success');
  }

  function openRiskModal(id=null) {
    const r=id?risks.find(x=>x.id===id):null;
    const sOpts=(data.sites||[]).map(s=>`<option value="${s.id}" ${r?.siteId===s.id?'selected':''}>${s.name}</option>`).join('');
    MASH.openModal(r?`Edit Risk — ${r.id}`:'Add New Risk',`
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2"><label class="inp-lbl">Title</label><input id="rk-t" class="inp" value="${r?.title||''}"></div>
        <div class="col-span-2"><label class="inp-lbl">Description</label><textarea id="rk-d" rows="2" class="inp">${r?.description||''}</textarea></div>
        <div><label class="inp-lbl">Standard</label><select id="rk-s" class="inp">${['NISPOM','DAAPM','ICD 705','TEMPEST'].map(s=>`<option ${r?.standard===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div><label class="inp-lbl">Facility</label><select id="rk-si" class="inp">${sOpts}</select></div>
        <div><label class="inp-lbl">Severity</label><select id="rk-sv" class="inp">${['critical','high','medium','low'].map(s=>`<option ${r?.severity===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div><label class="inp-lbl">Probability</label><select id="rk-p" class="inp">${['high','medium','low'].map(s=>`<option ${r?.probability===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div><label class="inp-lbl">Impact</label><select id="rk-i" class="inp">${['high','medium','low'].map(s=>`<option ${r?.impact===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div><label class="inp-lbl">Due Date</label><input type="date" id="rk-dd" class="inp" value="${r?.dueDate||''}"></div>
        <div><label class="inp-lbl">Owner</label><input id="rk-o" class="inp" value="${r?.owner||''}"></div>
        <div><label class="inp-lbl">Financial Impact ($)</label><input type="number" id="rk-f" class="inp" value="${r?.financialImpact||0}"></div>
        <div class="col-span-2"><label class="inp-lbl">Mitigation Plan</label><textarea id="rk-m" rows="2" class="inp">${r?.mitigation||''}</textarea></div>
      </div>`,
      `<button onclick="MASH._saveRisk('${id||''}')" class="btn-gold">${r?'Save Changes':'Add Risk'}</button>
       <button onclick="MASH.closeModal()" class="px-5 h-9 rounded text-xs font-semibold uppercase tracking-wider" style="border:1px solid rgba(201,168,76,.2);color:rgba(143,163,192,.6)">Cancel</button>`);
    MASH._saveRisk = async (id) => {
      const site=(data.sites||[]).find(s=>s.id===document.getElementById('rk-si').value);
      const d={title:document.getElementById('rk-t').value,description:document.getElementById('rk-d').value,
        standard:document.getElementById('rk-s').value,siteId:site?.id,site:site?.name,
        severity:document.getElementById('rk-sv').value,probability:document.getElementById('rk-p').value,
        impact:document.getElementById('rk-i').value,dueDate:document.getElementById('rk-dd').value,
        owner:document.getElementById('rk-o').value,financialImpact:+document.getElementById('rk-f').value,
        mitigation:document.getElementById('rk-m').value};
      if(!d.title){MASH.toast('Title required','warning');return;}
      if(id){await API.patch('risks',id,d);const idx=risks.findIndex(x=>x.id===id);if(idx!==-1)Object.assign(risks[idx],d);}
      else{d.id=uid();d.status='open';d.createdAt=new Date().toISOString();await API.post('risks',d);risks.push(d);}
      MASH.closeModal();onRefresh();MASH.toast(id?'Risk updated':'Risk added','success');
    };
  }

  const sevBdr={critical:'#EF4444',high:'#EF4444',medium:'#F59E0B',low:'#10B981',resolved:'#10B981'};

  return (
    <div className="section">
      <div className="flex items-center justify-between mb-7">
        <div>
          <div className="sec-heading mb-1">Risk Register</div>
          <h2 className="font-head text-[1.8rem] font-bold" style={{color:'var(--off-white)'}}>Open Risk Items</h2>
        </div>
        <button onClick={()=>openRiskModal()} className="btn-gold">
          <i className="fa-solid fa-plus text-[10px]"/> Add Risk
        </button>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        {/* Matrix */}
        <div className="card p-6">
          <div className="font-head font-semibold mb-0.5" style={{color:'var(--off-white)'}}>Risk Matrix</div>
          <div className="uppercase tracking-wider mb-5" style={{fontSize:'9px',color:'rgba(143,163,192,.35)',letterSpacing:'.08em'}}>Probability × Impact</div>
          <div className="grid grid-cols-2 grid-rows-2 gap-2 mb-4" style={{aspectRatio:'1'}}>
            {[
              {id:'tl',bg:'rgba(245,158,11,.08)',bdr:'rgba(245,158,11,.18)',tc:'rgba(245,158,11,.6)',lbl:'Hi Prob / Lo Impact'},
              {id:'tr',bg:'rgba(239,68,68,.10)', bdr:'rgba(239,68,68,.22)', tc:'rgba(239,68,68,.7)',  lbl:'Hi Prob / Hi Impact'},
              {id:'bl',bg:'rgba(16,185,129,.07)',bdr:'rgba(16,185,129,.18)',tc:'rgba(16,185,129,.55)',lbl:'Lo Prob / Lo Impact'},
              {id:'br',bg:'rgba(245,158,11,.06)',bdr:'rgba(245,158,11,.14)',tc:'rgba(245,158,11,.5)', lbl:'Lo Prob / Hi Impact'},
            ].map(q=>(
              <div key={q.id} className="rounded-xl p-3 flex flex-col justify-between"
                style={{background:q.bg,border:`1px solid ${q.bdr}`}}>
                <div className="uppercase tracking-wider" style={{fontSize:'8px',letterSpacing:'.08em',color:q.tc}}>{q.lbl}</div>
                <div className="mt-2 leading-relaxed" style={{fontSize:'9px',color:'rgba(240,244,248,.5)'}}>{matrix[q.id].join(' / ')||'—'}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-between uppercase tracking-wider px-1" style={{fontSize:'8px',color:'rgba(143,163,192,.25)',letterSpacing:'.08em'}}>
            <span>Low Impact</span><span>High Impact</span>
          </div>
          <div className="mt-5 pt-4 grid grid-cols-2 gap-2 text-center" style={{borderTop:'1px solid rgba(201,168,76,.07)',fontSize:'10px'}}>
            {[
              {lbl:'Critical',cnt:open.filter(r=>r.severity==='critical').length,c:'#EF4444'},
              {lbl:'High',    cnt:open.filter(r=>r.severity==='high').length,    c:'#F59E0B'},
              {lbl:'Medium',  cnt:open.filter(r=>r.severity==='medium').length,  c:'var(--gold)'},
              {lbl:'Resolved',cnt:resolved.length,                               c:'#10B981'},
            ].map(({lbl,cnt,c})=>(
              <div key={lbl} className="rounded-xl py-3" style={{background:'rgba(201,168,76,.04)',border:'1px solid rgba(201,168,76,.07)'}}>
                <div className="font-head font-bold text-2xl" style={{color:c}}>{cnt}</div>
                <div className="mt-0.5" style={{color:'rgba(143,163,192,.4)'}}>{lbl}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Risk cards */}
        <div className="col-span-1 lg:col-span-2 space-y-3">
          {[...open,...resolved].map(r=>(
            <div key={r.id} className={`card p-6 border-l-4 ${r.status==='resolved'?'opacity-50':''}`}
              style={{borderLeftColor:sevBdr[r.status==='resolved'?'resolved':r.severity]||'rgba(201,168,76,.3)'}}>
              <div className="flex items-start justify-between gap-x-4 mb-3">
                <div>
                  <div className="flex items-center gap-x-2 flex-wrap gap-y-1 mb-2">
                    <Badge cls={r.status==='resolved'?'b-g':sevCls(r.severity)}>
                      {r.status==='resolved'?'RESOLVED':r.severity?.toUpperCase()}
                    </Badge>
                    <span className="font-mono" style={{fontSize:'9px',color:'rgba(143,163,192,.3)'}}>{r.id}</span>
                  </div>
                  <div className="font-semibold text-sm" style={{color:'var(--off-white)'}}>{r.title}</div>
                  <div className="text-xs mt-1" style={{color:'rgba(143,163,192,.4)'}}>{r.description}</div>
                </div>
                <div className="text-right shrink-0">
                  <div style={{fontSize:'9px',color:'rgba(143,163,192,.35)'}}>Due</div>
                  <div className={`text-sm font-bold font-mono ${r.status==='resolved'?'text-emerald-400':new Date(r.dueDate)<today?'text-red-400':'text-amber-400'}`}>
                    {r.status==='resolved'?'CLOSED':fmtDate(r.dueDate)}
                  </div>
                  {r.financialImpact ? <div style={{fontSize:'9px',color:'rgba(143,163,192,.28)'}} className="mt-0.5">${r.financialImpact.toLocaleString()} est.</div> : null}
                </div>
              </div>
              {r.mitigation && (
                <div className="text-[10px] p-2.5 rounded-xl mt-2" style={{background:'rgba(201,168,76,.04)',border:'1px solid rgba(201,168,76,.08)',color:'rgba(143,163,192,.45)'}}>
                  <i className="fa-solid fa-shield-halved mr-1.5" style={{color:'var(--gold)'}}/>
                  {r.mitigation}
                </div>
              )}
              <div className="flex items-center gap-x-5 mt-3 pt-3 text-[10px]" style={{borderTop:'1px solid rgba(201,168,76,.06)',color:'rgba(143,163,192,.35)'}}>
                <span><i className="fa-solid fa-user mr-1.5"/>{r.owner||'—'}</span>
                <span><i className="fa-solid fa-building mr-1.5"/>{r.site||'—'}</span>
                {r.status!=='resolved' && (
                  <>
                    <button onClick={()=>resolveRisk(r.id)} className="ml-auto text-emerald-400 hover:text-emerald-300 font-bold uppercase tracking-wider" style={{fontSize:'9px',letterSpacing:'.07em'}}>Resolve</button>
                    <button onClick={()=>openRiskModal(r.id)} className="font-bold uppercase tracking-wider transition-colors" style={{fontSize:'9px',letterSpacing:'.07em',color:'var(--gold)'}}>Edit</button>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   CONSTRUCTION SECTION
══════════════════════════════════════════════════════════════ */
const STATUS_META = {
  'pending-auth': { label:'Pending Authorization', cls:'b-a',  dot:'var(--amber)' },
  'design':       { label:'Design Phase',          cls:'b-c',  dot:'var(--gold)'  },
  'planning':     { label:'Planning',              cls:'b-b',  dot:'#93C5FD'      },
  'construction': { label:'Under Construction',    cls:'b-r',  dot:'#F87171'      },
  'tech-controls':{ label:'Tech Controls',         cls:'b-v',  dot:'#C4B5FD'      },
  'accreditation':{ label:'Accreditation',         cls:'b-g',  dot:'var(--green)' },
  'complete':     { label:'Complete',              cls:'b-g',  dot:'var(--green)' },
};
const TYPE_ICON = {
  'new-scif':   'fa-building-circle-arrow-right',
  'renovation': 'fa-screwdriver-wrench',
  'expansion':  'fa-maximize',
};
const PHASE_NOTE_COLOR = {
  'complete':'var(--green)', 'in-progress':'var(--gold)', 'upcoming':'rgba(143,163,192,.35)'
};

function ConstructionPhaseRow({phase, isLast}) {
  const dotC = PHASE_NOTE_COLOR[phase.status] || 'rgba(143,163,192,.35)';
  return (
    <div className="relative flex gap-x-3">
      {!isLast && (
        <div className="absolute top-5 bottom-0 w-px" style={{left:'9px', background:`linear-gradient(to bottom,${dotC}50,transparent)`}}/>
      )}
      <div className="w-5 h-5 rounded-full flex items-center justify-center shrink-0 mt-0.5"
        style={{background:`${dotC}18`, border:`1px solid ${dotC}55`}}>
        {phase.status==='complete'
          ? <i className="fa-solid fa-check" style={{fontSize:'7px',color:dotC}}/>
          : phase.status==='in-progress'
          ? <i className="fa-solid fa-circle-half-stroke" style={{fontSize:'7px',color:dotC}}/>
          : <i className="fa-solid fa-circle" style={{fontSize:'6px',color:`${dotC}60`}}/>}
      </div>
      <div className="flex-1 pb-4">
        <div className="flex items-center justify-between gap-x-2 mb-0.5">
          <span className="font-head font-semibold text-xs" style={{color:phase.status==='upcoming'?'rgba(143,163,192,.5)':'var(--off-white)'}}>{phase.name}</span>
          <span className="font-mono text-right shrink-0" style={{fontSize:'9px',color:dotC}}>{phase.completedDate ? fmtDate(phase.completedDate) : phase.targetDate ? fmtDate(phase.targetDate) : '—'}</span>
        </div>
        {phase.note && (
          <div style={{fontSize:'9px',color:'rgba(143,163,192,.38)'}}>{phase.note}</div>
        )}
      </div>
    </div>
  );
}

function ConstructionCard({project}) {
  const sm     = STATUS_META[project.status] || {label:project.status, cls:'b-b', dot:'#93C5FD'};
  const daysTo = daysUntil(project.projectedCompletion);
  const budgetPct = project.budget.total ? Math.round(project.budget.spent / project.budget.total * 100) : 0;
  const phasesDone = project.phases.filter(p=>p.status==='complete').length;
  const phasePct   = Math.round((phasesDone / project.phases.length) * 100);
  const priorityC  = {high:'var(--red)',medium:'var(--amber)',low:'var(--gold)'}[project.priority]||'var(--gold)';

  return (
    <div className="card p-0 overflow-hidden">
      {/* Card header */}
      <div className="px-6 pt-5 pb-4" style={{borderBottom:'1px solid rgba(201,168,76,.08)'}}>
        <div className="flex items-start justify-between gap-x-4 mb-3">
          <div className="flex items-center gap-x-3">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
              style={{background:'rgba(201,168,76,.07)',border:'1px solid rgba(201,168,76,.18)'}}>
              <i className={`fa-solid ${TYPE_ICON[project.type]||'fa-building'} text-sm`} style={{color:'var(--gold)'}}/>
            </div>
            <div>
              <div className="font-head font-bold text-sm uppercase tracking-wide" style={{color:'var(--off-white)',letterSpacing:'.08em'}}>{project.title}</div>
              <div className="text-xs mt-0.5" style={{color:'rgba(143,163,192,.45)'}}>{project.subtitle}</div>
            </div>
          </div>
          <div className="flex items-center gap-x-2 shrink-0">
            <Badge cls={sm.cls}>{sm.label}</Badge>
            {project.flag==='amber' && <i className="fa-solid fa-flag text-xs" style={{color:'var(--amber)'}}/>}
          </div>
        </div>

        {/* Site + meta row */}
        <div className="flex items-center gap-x-5 flex-wrap gap-y-1" style={{fontSize:'10px',color:'rgba(143,163,192,.45)'}}>
          <span><i className="fa-solid fa-location-dot mr-1.5" style={{color:'var(--gold)'}}/>
            <strong style={{color:'rgba(240,244,248,.7)'}}>{project.site}</strong> · {project.location}</span>
          <span><i className="fa-solid fa-building-lock mr-1.5" style={{color:'var(--gold)'}}/>{project.scifType}</span>
          <span><i className="fa-solid fa-ruler-combined mr-1.5" style={{color:'var(--gold)'}}/>{project.squareFootage?.toLocaleString()} sq ft</span>
          <span><i className="fa-solid fa-shield-halved mr-1.5" style={{color:'var(--gold)'}}/>{project.classification}</span>
        </div>
      </div>

      {/* Body: 3-column grid */}
      <div className="cs-card-body grid grid-cols-1 lg:grid-cols-3 divide-y lg:divide-y-0 lg:divide-x" style={{borderColor:'rgba(201,168,76,.07)'}}>

        {/* Col 1 — Phase timeline */}
        <div className="px-5 py-5">
          <div className="sec-heading mb-4" style={{fontSize:'.58rem'}}>Build Phases</div>
          <div className="mb-4">
            <div className="flex justify-between mb-1.5" style={{fontSize:'9px',color:'rgba(143,163,192,.4)'}}>
              <span className="uppercase tracking-wider" style={{fontSize:'8px'}}>Overall Progress</span>
              <span style={{color:'var(--gold)'}}>{phasePct}%</span>
            </div>
            <Prog v={phasePct} cls="p-gold" h="h-[5px]"/>
          </div>
          <div>
            {project.phases.map((p,i)=>(
              <ConstructionPhaseRow key={i} phase={p} isLast={i===project.phases.length-1}/>
            ))}
          </div>
        </div>

        {/* Col 2 — Budget */}
        <div className="px-5 py-5">
          <div className="sec-heading mb-4" style={{fontSize:'.58rem'}}>Budget Breakdown</div>
          <div className="mb-5">
            <div className="flex items-end justify-between mb-1">
              <span style={{fontSize:'9px',color:'rgba(143,163,192,.4)',textTransform:'uppercase',letterSpacing:'.08em'}}>Total Approved</span>
              <span className="font-head font-bold text-lg" style={{color:'var(--gold)'}}>
                ${(project.budget.total/1000).toFixed(0)}K
              </span>
            </div>
            <div className="flex items-end justify-between mb-2" style={{fontSize:'10px'}}>
              <span style={{color:'rgba(143,163,192,.4)'}}>Spent YTD</span>
              <span className="font-mono font-bold" style={{color:'rgba(240,244,248,.7)'}}>
                ${project.budget.spent.toLocaleString()}
              </span>
            </div>
            <Prog v={budgetPct} cls={budgetPct>80?'p-a':'p-gold'} h="h-[5px]"/>
            <div className="flex justify-between mt-1.5" style={{fontSize:'9px',color:'rgba(143,163,192,.35)'}}>
              <span>{budgetPct}% spent</span>
              <span>${project.budget.remaining.toLocaleString()} remaining</span>
            </div>
          </div>

          {/* CFO Auth */}
          <div className="rounded-lg px-3 py-2.5 mb-4" style={{
            background: project.budget.cfoAuth==='approved' ? 'rgba(16,185,129,.06)' : 'rgba(245,158,11,.06)',
            border: `1px solid ${project.budget.cfoAuth==='approved' ? 'rgba(16,185,129,.18)' : 'rgba(245,158,11,.2)'}`}}>
            <div className="flex items-center gap-x-2" style={{fontSize:'9px'}}>
              <i className={`fa-solid ${project.budget.cfoAuth==='approved'?'fa-circle-check text-emerald-400':'fa-hourglass-half text-amber-400'}`}/>
              <span style={{color:project.budget.cfoAuth==='approved'?'rgba(110,231,183,.8)':'rgba(252,211,77,.8)'}}>{project.budget.cfoAuthNote}</span>
            </div>
          </div>

          {/* Cost breakdown bars */}
          <div className="space-y-2.5">
            {project.budget.breakdown.map((b,i)=>{
              const pct=Math.round(b.amount/project.budget.total*100);
              return(
                <div key={i}>
                  <div className="flex justify-between mb-1" style={{fontSize:'9px',color:'rgba(143,163,192,.4)'}}>
                    <span>{b.label}</span>
                    <span className="font-mono" style={{color:'rgba(240,244,248,.55)'}}>${b.amount.toLocaleString()}</span>
                  </div>
                  <Prog v={pct} cls={b.status==='complete'?'p-g':b.status==='in-progress'?'p-gold':'p-a'} h="h-[3px]"/>
                </div>
              );
            })}
          </div>
        </div>

        {/* Col 3 — Timeline + blockers */}
        <div className="px-5 py-5">
          <div className="sec-heading mb-4" style={{fontSize:'.58rem'}}>Timeline &amp; Details</div>

          {/* Key dates */}
          <div className="space-y-2.5 mb-5">
            {[
              {icon:'fa-calendar-day',   label:'Kickoff Date',          val:fmtDate(project.kickoffDate)},
              {icon:'fa-flag-checkered', label:'Projected Completion',   val:fmtDate(project.projectedCompletion)},
              {icon:'fa-clock',          label:'Ideal Timeline',         val:project.idealTimeline},
              {icon:'fa-hard-hat',       label:'Contractor',             val:project.contractor},
              {icon:'fa-drafting-compass',label:'A&E Firm',              val:project.aE},
              {icon:'fa-user-shield',    label:'SSM (Post-Accred)',       val:project.ssm},
            ].map(({icon,label,val})=>(
              <div key={label} className="flex items-start gap-x-2.5" style={{fontSize:'10px'}}>
                <i className={`fa-solid ${icon} mt-0.5 shrink-0 w-3 text-center`} style={{color:'var(--gold)',fontSize:'9px'}}/>
                <div>
                  <div className="uppercase tracking-wider" style={{fontSize:'8px',color:'rgba(143,163,192,.4)',letterSpacing:'.07em'}}>{label}</div>
                  <div style={{color:'rgba(240,244,248,.7)'}}>{val}</div>
                </div>
              </div>
            ))}
            {daysTo !== null && (
              <div className="flex items-center gap-x-2 mt-1 px-2.5 py-2 rounded-lg" style={{
                background:'rgba(201,168,76,.06)', border:'1px solid rgba(201,168,76,.15)',fontSize:'10px'}}>
                <i className="fa-solid fa-hourglass-half" style={{color:'var(--gold)',fontSize:'9px'}}/>
                <span style={{color:'rgba(201,168,76,.8)'}}><strong>{daysTo}d</strong> until projected completion</span>
              </div>
            )}
          </div>

          {/* Blockers */}
          {project.blockers?.length > 0 && (
            <div>
              <div className="sec-heading mb-2.5" style={{fontSize:'.55rem',color:'rgba(245,158,11,.7)'}}>Active Blockers</div>
              <div className="space-y-2">
                {project.blockers.map((b,i)=>(
                  <div key={i} className="flex items-start gap-x-2 px-2.5 py-2 rounded-lg" style={{
                    background:'rgba(245,158,11,.05)',border:'1px solid rgba(245,158,11,.15)',fontSize:'9px',color:'rgba(252,211,77,.7)'}}>
                    <i className="fa-solid fa-triangle-exclamation shrink-0 mt-0.5" style={{fontSize:'9px'}}/>
                    <span>{b}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Notes */}
          {project.notes && (
            <div className="mt-3 pt-3" style={{borderTop:'1px solid rgba(201,168,76,.07)'}}>
              <div className="sec-heading mb-1.5" style={{fontSize:'.55rem',color:'rgba(143,163,192,.4)'}}>Notes</div>
              <p style={{fontSize:'9px',color:'rgba(143,163,192,.4)',lineHeight:'1.5'}}>{project.notes}</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ConstructionSection({data}) {
  const projects = data.construction || [];
  const totalBudget  = projects.reduce((a,p)=>a+p.budget.total, 0);
  const totalSpent   = projects.reduce((a,p)=>a+p.budget.spent, 0);
  const activeCount  = projects.filter(p=>p.status!=='complete').length;
  const blockerCount = projects.reduce((a,p)=>a+(p.blockers?.length||0), 0);

  return (
    <div className="section">
      <div className="flex items-end justify-between mb-7">
        <div>
          <div className="sec-heading mb-1">Infrastructure Pipeline</div>
          <h2 className="font-head text-[1.8rem] font-bold" style={{color:'var(--off-white)'}}>Construction &amp; Secure Space Projects</h2>
          <p className="text-xs mt-1" style={{color:'rgba(143,163,192,.4)'}}>Active builds, renovations, and accreditation milestones across all facilities</p>
        </div>
        <span className="text-[9px] font-mono uppercase tracking-widest px-4 py-1.5 rounded"
          style={{background:'rgba(201,168,76,.06)',border:'1px solid rgba(201,168,76,.15)',color:'rgba(201,168,76,.5)'}}>
          {activeCount} Active Project{activeCount!==1?'s':''} · FY26
        </span>
      </div>

      {/* Summary KPI row */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-4 mb-7">
        {[
          {icon:'fa-helmet-safety',          label:'Active Projects',    val:activeCount,                                          sub:'Across all facilities'},
          {icon:'fa-dollar-sign',            label:'Total Budget',       val:`$${(totalBudget/1000).toFixed(0)}K`,                sub:'All authorized projects'},
          {icon:'fa-chart-line',             label:'Total Spent YTD',    val:`$${(totalSpent/1000).toFixed(1)}K`,                 sub:`${totalBudget?Math.round(totalSpent/totalBudget*100):0}% of total budget`},
          {icon:'fa-triangle-exclamation',   label:'Active Blockers',    val:blockerCount, sub:'Requiring PM attention',
            color: blockerCount>0?'var(--amber)':'var(--green)'},
        ].map((k,i)=>(
          <div key={i} className="card card-kpi p-6">
            <div className="flex items-start justify-between mb-4">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center"
                style={{background:'rgba(201,168,76,.07)',border:'1px solid rgba(201,168,76,.18)'}}>
                <i className={`fa-solid ${k.icon} text-base`} style={{color:'var(--gold)'}}/>
              </div>
            </div>
            <div className="uppercase tracking-widest mb-2" style={{fontSize:'.58rem',fontWeight:700,color:'rgba(143,163,192,.5)',letterSpacing:'.1em'}}>{k.label}</div>
            <div className="font-head font-bold leading-none mb-2" style={{fontSize:'2rem',color:k.color||'var(--gold)'}}>{k.val}</div>
            <div className="text-xs" style={{color:'rgba(143,163,192,.4)'}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Project cards */}
      <div className="space-y-6">
        {projects.length === 0 ? (
          <div className="card p-12 text-center" style={{color:'rgba(143,163,192,.35)'}}>
            <i className="fa-solid fa-helmet-safety text-4xl mb-4 block" style={{color:'rgba(201,168,76,.2)'}}/>
            <div className="font-head font-semibold mb-1">No active construction projects</div>
            <div className="text-sm">Projects will appear here once added to construction.json</div>
          </div>
        ) : (
          projects.map(p => <ConstructionCard key={p.id} project={p}/>)
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════ */
function App() {
  const [currentUser, setCurrentUser] = useState(() => {
    // Priority 1: already have a stored session
    const stored = AUTH.getUser();
    if (stored) return stored;
    // Priority 2: arriving via hub SSO redirect (?mash_token=<jwt>)
    const params    = new URLSearchParams(window.location.search);
    const ssoToken  = params.get('mash_token');
    const ssoError  = params.get('sso_error');
    if (ssoToken) {
      try {
        // Decode JWT payload — base64url → base64 (fix alphabet + add padding)
        const b64 = ssoToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
        const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
        const payload = JSON.parse(atob(padded));
        AUTH.setToken(ssoToken);
        AUTH.setUser(payload);
        setTimeout(() => window.history.replaceState({}, '', '/'), 0);
        return payload;
      } catch { /* malformed token — fall through to login */ }
    }
    if (ssoError) {
      setTimeout(() => { MASH.toast(`SSO error: ${decodeURIComponent(ssoError)}`,'error'); window.history.replaceState({}, '', '/'); }, 500);
    }
    return null;
  });
  const [section, setSection] = useState('dashboard');
  const [data, setData]       = useState({sites:[],risks:[],budget:{},timeline:{},compliance:{},activity:[],settings:{},milestones:[],construction:[]});
  const [loaded, setLoaded]   = useState(false);
  const [tick, setTick]       = useState(0);
  const refresh = useCallback(()=>setTick(t=>t+1),[]);

  function handleLogin(user)  { setCurrentUser(user); }
  function handleLogout()     { AUTH.clearAll(); setCurrentUser(null); setLoaded(false); setData({sites:[],risks:[],budget:{},timeline:{},compliance:{},activity:[],settings:{},milestones:[],construction:[]}); }

  useEffect(()=>{
    if (!currentUser) return;
    (async()=>{
      const [sites,risks,budget,timeline,compliance,activity,settings,milestones,construction]=await Promise.all([
        API.get('sites'),API.get('risks'),API.get('budget'),API.get('timeline'),
        API.get('compliance'),API.get('activity'),API.get('settings'),API.get('milestones'),API.get('construction')
      ]);
      setData({
        sites:sites||[], risks:risks||[], budget:budget||{}, timeline:timeline||{},
        compliance:compliance||{}, activity:activity||[], settings:settings||{},
        milestones:milestones||[], construction:construction||[]
      });
      setLoaded(true);
    })();
  },[currentUser]);

  useEffect(()=>{
    MASH.openSiteModal = (id) => {
      const s=data.sites.find(x=>x.id===id); if(!s) return;
      MASH.openModal(`Update Compliance — ${s.name}`,`
        <div class="text-xs mb-4" style="color:rgba(143,163,192,.4)">${s.location} · SSM: ${s.ssm||'—'}</div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="inp-lbl">Personnel Security %</label><input type="number" name="nispom"  value="${s.nispom}"  min="0" max="100" class="inp"></div>
          <div><label class="inp-lbl">Audit Readiness %</label>   <input type="number" name="daapm"   value="${s.daapm}"   min="0" max="100" class="inp"></div>
          <div><label class="inp-lbl">SCIF Controls %</label>      <input type="number" name="icd705"  value="${s.icd705}"  min="0" max="100" class="inp"></div>
          <div><label class="inp-lbl">Emanations Security %</label><input type="number" name="tempest" value="${s.tempest}" min="0" max="100" class="inp"></div>
          <div><label class="inp-lbl">Status</label><select name="status" class="inp">
            <option value="green"  ${s.status==='green'?'selected':''}>Fully Compliant</option>
            <option value="amber"  ${s.status==='amber'?'selected':''}>Needs Attention</option></select></div>
          <div><label class="inp-lbl">Open Findings</label><input type="number" name="openFindings" value="${s.openFindings||0}" min="0" class="inp"></div>
          <div class="col-span-2"><label class="inp-lbl">Notes</label><textarea name="notes" rows="2" class="inp">${s.notes||''}</textarea></div>
        </div>`,
        `<button onclick="MASH._saveSite('${s.id}')" class="btn-gold">Save Changes</button>
         <button onclick="MASH.closeModal()" class="px-5 h-9 rounded text-xs font-semibold uppercase tracking-wider" style="border:1px solid rgba(201,168,76,.2);color:rgba(143,163,192,.6)">Cancel</button>`);
      MASH._saveSite = async (id) => {
        const inputs=document.querySelectorAll('#modal-body input,#modal-body select,#modal-body textarea');
        const updates={};
        inputs.forEach(i=>{updates[i.name]=i.type==='number'?+i.value:i.value;});
        updates.compliance=Math.round((updates.nispom+updates.daapm+updates.icd705+updates.tempest)/4);
        const res=await API.patch('sites',id,updates);
        if(res?.ok){
          const idx=data.sites.findIndex(x=>x.id===id);
          if(idx!==-1) Object.assign(data.sites[idx],updates);
          MASH.closeModal(); refresh(); MASH.toast('Compliance updated','success');
        } else MASH.toast('Save failed — is the server running?','error');
      };
    };
  },[data,refresh]);

  useEffect(()=>{
    if(!loaded) return;
    const urgent=(data.compliance?.findings||[]).filter(f=>f.status!=='resolved'&&(f.severity==='critical'||f.severity==='high'));
    const nl=document.getElementById('notif-list');
    const nc=document.getElementById('notif-count');
    const bb=document.getElementById('bell-badge');
    if(nl){
      nl.innerHTML=urgent.slice(0,5).map(f=>`
        <div class="card rounded-xl p-3" style="border-left:2px solid ${f.severity==='critical'?'#EF4444':'#F59E0B'}">
          <div class="text-xs font-semibold" style="color:var(--off-white)">${f.title}</div>
          <div class="mt-0.5" style="font-size:10px;color:rgba(143,163,192,.4)">${f.site} · Due ${fmtDate(f.dueDate)}</div>
        </div>`).join('');
    }
    if(nc) nc.textContent=urgent.length;
    if(bb) bb.textContent=urgent.length;
  },[loaded,tick]);

  if (!currentUser) return <LoginPage onLogin={handleLogin}/>;

  if(!loaded) return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center">
        <div className="font-head font-bold glow-gold mb-3" style={{fontSize:'3.5rem',color:'var(--gold)',letterSpacing:'.2em'}}>MASH</div>
        <div className="uppercase tracking-widest" style={{color:'rgba(143,163,192,.4)',fontSize:'.72rem',letterSpacing:'.15em'}}>Loading secure program data…</div>
      </div>
    </div>
  );

  const sections = {
    dashboard:    <DashboardSection data={data} onNavigate={setSection}/>,
    sites:        <SitesSection data={data}/>,
    compliance:   <ComplianceSection data={data} onRefresh={refresh}/>,
    budget:       <BudgetSection data={data}/>,
    timeline:     <TimelineSection data={data}/>,
    construction: <ConstructionSection data={data}/>,
    risks:        <RisksSection data={data} onRefresh={refresh}/>,
  };

  return (
    <>
      <Header section={section} onNav={setSection} data={data} currentUser={currentUser} onLogout={handleLogout}/>
      <main className="max-w-screen-2xl mx-auto px-6 py-8 relative z-10">
        {sections[section]}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
console.log('%c✦ MASH v2.4.0 — MTSI Advanced Sentinel Hub','color:#c9a84c;font-family:Space Grotesk;font-size:13px;font-weight:700');
</script>
</body>
</html>
