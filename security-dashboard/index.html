 * before the switch runs, so callers never need to null-check first.
 */
function complianceStatusClasses(status) {
  switch ((status || '').toLowerCase()) {
    case 'compliant':     return 'text-emerald-600 dark:text-emerald-400';
    case 'guarded':       return 'text-amber-600   dark:text-amber-400';
    case 'non-compliant': return 'text-red-600     dark:text-red-400';
    default:              return 'text-slate-500   dark:text-slate-400';
  }
}

function complianceDotClass(status) {
  switch ((status || '').toLowerCase()) {
    case 'compliant':     return 'bg-emerald-500';
    case 'guarded':       return 'bg-amber-500';
    case 'non-compliant': return 'bg-red-500';
    default:              return 'bg-slate-400 dark:bg-slate-500';
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   InspectionTab — Self-Inspection sub-view, rendered inside ComplianceSection
   when the "Self-Inspections" tab is active. Owns all its own async state so
   ComplianceSection stays lean.
════════════════════════════════════════════════════════════════════════════ */
function InspectionTab({ sites }) {
  // ── View & data state ────────────────────────────────────────────────────
  const [viewMode,     setViewMode]     = useState('site');  // 'site' | 'action'
  const [selectedSite, setSelectedSite] = useState('');
  const [items,        setItems]        = useState([]);
  const [loading,      setLoading]      = useState(false);
  const [fetchError,   setFetchError]   = useState('');
  const [refreshTick,  setRefreshTick]  = useState(0);

  /* Seed the selector to the first site once sites data is available */
  useEffect(() => {
    if (sites.length > 0 && !selectedSite) {
      setSelectedSite(sites[0].id || sites[0]._id || '');
    }
  }, [sites]);

  /*
   * Fetch checklist items whenever viewMode, selectedSite, or refreshTick
   * changes. refreshTick is incremented after a successful import so the
   * ledger updates without a page reload.
   */
  useEffect(() => {
    if (viewMode === 'site' && !selectedSite) { setItems([]); return; }
    async function load() {
      setLoading(true); setFetchError('');
      try {
        const url = viewMode === 'action'
          ? '/api/inspections/action-items'
          : `/api/inspections/${selectedSite}`;
        const res  = await fetch(url, { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setItems(Array.isArray(json) ? json : (json.data || []));
      } catch (err) {
        setFetchError(err.message); setItems([]);
      } finally { setLoading(false); }
    }
    load();
  }, [viewMode, selectedSite, refreshTick]);

  // ── Import modal state ───────────────────────────────────────────────────
  const [importOpen,    setImportOpen]    = useState(false);
  const [importSite,    setImportSite]    = useState('');
  const [importFile,    setImportFile]    = useState(null);
  const [importing,     setImporting]     = useState(false);
  const [importError,   setImportError]   = useState('');
  const [importSuccess, setImportSuccess] = useState('');

  // ── Slide-over / edit-item state ─────────────────────────────────────────
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [editTarget, setEditTarget] = useState(null);   // item currently being edited
  const [editForm,   setEditForm]   = useState({ status: 'Pending', notes: '' });
  const [saving,     setSaving]     = useState(false);
  const [saveError,  setSaveError]  = useState('');

  function openImport() {
    setImportSite(selectedSite || (sites[0]?.id || sites[0]?._id || ''));
    setImportFile(null); setImportError(''); setImportSuccess('');
    setImportOpen(true);
  }
  function closeImport() {
    setImportOpen(false); setImportFile(null);
    setImportError(''); setImportSuccess('');
  }

  function openDrawer(item) {
    setEditTarget(item);
    setEditForm({ status: item.status || 'Pending', notes: item.notes || '' });
    setSaveError('');
    setDrawerOpen(true);
  }
  function closeDrawer() {
    setDrawerOpen(false);
    setSaveError('');
  }

  /*
   * handleUpdateItem — PUT /api/inspections/:id with new status + notes.
   *
   * PM Action Items filter rule: if the user is viewing the action-items view
   * and the updated status is Pass or N/A, the item is now resolved and should
   * be removed from the list immediately via .filter(). All other cases update
   * the row in-place via .map() so the badge refreshes without a full reload.
   */
  async function handleUpdateItem(e) {
    e.preventDefault();
    if (!editTarget) return;
    const itemId = editTarget.id || editTarget._id;
    setSaving(true); setSaveError('');
    try {
      const res  = await fetch(`/api/inspections/${itemId}`, {
        method:  'PUT',
        headers: AUTH.hdrs(),
        body:    JSON.stringify({ status: editForm.status, notes: editForm.notes }),
      });
      const json = await safeJson(res);

      const updated  = json.data || { ...editTarget, ...editForm };
      const newSt    = (editForm.status || '').toLowerCase();

      if (viewMode === 'action' && ['pass', 'n/a'].includes(newSt)) {
        // Item resolved — remove from PM action list immediately
        setItems(prev => prev.filter(i => (i.id || i._id) !== itemId));
      } else {
        // Update the row badge in-place
        setItems(prev => prev.map(i => (i.id || i._id) === itemId ? updated : i));
      }
      closeDrawer();
    } catch (err) {
      setSaveError(err.message);
    } finally { setSaving(false); }
  }

  /*
   * handleImport — FileReader-based async file processor.
   *
   * FileReader uses callbacks (onload / onerror); wrapping the instantiation
   * in `new Promise(resolve, reject)` lets us `await` it like any other
   * async call, keeping the try/catch/finally error-handling uniform with
   * the subsequent fetch() — no nested callback hell.
   *
   * After parsing:
   *   JSON files → parsed directly with JSON.parse()
   *   CSV files  → first row treated as headers; remaining rows become objects
   *
   * A successful import increments refreshTick, which triggers the useEffect
   * above to re-fetch items for the currently selected site.
   */
  async function handleImport(e) {
    e.preventDefault();
    if (!importFile || !importSite) return;
    setImporting(true); setImportError(''); setImportSuccess('');
    try {
      // Step 1 — read file bytes to string (callback → Promise)
      const text = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = evt => resolve(evt.target.result);
        reader.onerror = ()  => reject(new Error('File could not be read'));
        reader.readAsText(importFile);
      });

      // Step 2 — parse text into a JS array
      let rows;
      const ext = (importFile.name.split('.').pop() || '').toLowerCase();
      if (ext === 'json') {
        rows = JSON.parse(text);
        if (!Array.isArray(rows)) throw new Error('JSON file must be an array of objects');
      } else if (ext === 'csv') {
        const lines = text.trim().split('\n').filter(Boolean);
        if (lines.length < 2) throw new Error('CSV must have a header row and at least one data row');
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        rows = lines.slice(1).map(line => {
          const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
          return Object.fromEntries(headers.map((h, i) => [h, vals[i] ?? '']));
        });
      } else {
        throw new Error('Unsupported file — use .json or .csv');
      }

      // Step 3 — POST parsed rows to the API
      const res  = await fetch('/api/inspections/import', {
        method:  'POST',
        headers: AUTH.hdrs(),
        body:    JSON.stringify({ siteId: importSite, items: rows }),
      });
      const json = await safeJson(res);

      setImportSuccess(`${json.count} item${json.count !== 1 ? 's' : ''} imported`);
      setImportFile(null);
      if (viewMode === 'site' && selectedSite === importSite) setRefreshTick(t => t + 1);
    } catch (err) {
      setImportError(err.message);
    } finally { setImporting(false); }
  }

  /* Status → Tailwind class string (switch keeps each status one self-contained case) */
  function statusCls(status) {
    switch ((status || '').toLowerCase()) {
      case 'pass':    return 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10 border-emerald-500/20';
      case 'fail':    return 'text-red-600     dark:text-red-400     bg-red-500/10     border-red-500/20';
      case 'pending': return 'text-amber-600   dark:text-amber-400   bg-amber-500/10   border-amber-500/20';
      default:        return 'text-slate-500   dark:text-slate-400   bg-slate-500/10   border-slate-500/20';
    }
  }

  const passCount    = items.filter(i => (i.status||'').toLowerCase() === 'pass').length;
  const failCount    = items.filter(i => (i.status||'').toLowerCase() === 'fail').length;
  const pendingCount = items.filter(i => (i.status||'').toLowerCase() === 'pending').length;

  return (
    <>
      {/* Controls row: view toggle + import button */}
      <div className="flex items-center justify-between gap-4 flex-wrap">
        <div className="flex items-center gap-2">
          <button className={`tab-btn ${viewMode === 'site' ? 'active' : ''}`}
                  onClick={() => setViewMode('site')}>
            <i className="fa-solid fa-building text-[10px] mr-1.5"/>
            Site View
          </button>
          <button className={`tab-btn ${viewMode === 'action' ? 'active' : ''}`}
                  onClick={() => setViewMode('action')}>
            <i className="fa-solid fa-triangle-exclamation text-[10px] mr-1.5"/>
            PM Action Items
          </button>
        </div>
        <button onClick={openImport}
                className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium
                           bg-blue-600 hover:bg-blue-500 text-white transition-colors shrink-0">
          <i className="fa-solid fa-file-import text-xs"/>
          Import Checklist
        </button>
      </div>

      {/* Site selector + live summary pills */}
      {viewMode === 'site' && (
        <div className="flex items-center gap-4 flex-wrap">
          <select className={SELECT_CLS + ' max-w-xs'}
                  value={selectedSite}
                  onChange={e => setSelectedSite(e.target.value)}>
            {sites.length === 0
              ? <option value="">No sites available</option>
              : sites.map(s => (
                  <option key={s.id || s._id} value={s.id || s._id}>{s.name}</option>
                ))}
          </select>
          {!loading && items.length > 0 && (
            <div className="flex items-center gap-2 mono text-[10px] uppercase tracking-widest">
              <span className="text-emerald-500">{passCount} pass</span>
              <span className="text-slate-500 dark:text-slate-400">·</span>
              <span className="text-red-400">{failCount} fail</span>
              <span className="text-slate-500 dark:text-slate-400">·</span>
              <span className="text-amber-400">{pendingCount} pending</span>
            </div>
          )}
        </div>
      )}

      {/* Loading / error states */}
      {loading ? (
        <div className="flex items-center gap-2.5 py-10 justify-center">
          <i className="fa-solid fa-rotate-right animate-spin text-blue-400"/>
          <span className="mono text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest">
            Loading checklist…
          </span>
        </div>
      ) : fetchError ? (
        <div className="mono text-xs text-red-400 text-center py-6">{fetchError}</div>
      ) : (
        <>
          {/* Checklist ledger */}
          <div className="rounded-xl overflow-hidden bg-white dark:bg-slate-900/40
                          border border-slate-200 dark:border-slate-700/50">

            {/* Column headers */}
            <div className="flex items-center gap-4 px-5 py-3
                            border-b border-slate-200 dark:border-slate-700/50
                            bg-slate-50 dark:bg-slate-800/40">
              {viewMode === 'action' && (
                <span className="mono text-[9px] font-semibold uppercase tracking-[.12em]
                                 text-slate-500 dark:text-slate-400 w-28 shrink-0">Facility</span>
              )}
              <span className="mono text-[9px] font-semibold uppercase tracking-[.12em]
                               text-slate-500 dark:text-slate-400 w-24 shrink-0">Control ID</span>
              <span className="mono text-[9px] font-semibold uppercase tracking-[.12em]
                               text-slate-500 dark:text-slate-400 flex-1">Description</span>
              <span className="mono text-[9px] font-semibold uppercase tracking-[.12em]
                               text-slate-500 dark:text-slate-400 w-20 text-right shrink-0">Status</span>
            </div>

            {items.length === 0 ? (
              <EmptyState message={
                viewMode === 'action'
                  ? 'No failing or pending items — all sites are on track'
                  : 'No checklist items — click Import Checklist to get started'
              }/>
            ) : (
              items.map((item, idx) => (
                <div key={item.id || item._id || idx}
                     onClick={() => openDrawer(item)}
                     className="flex items-start gap-4 px-5 py-4
                                border-b border-slate-100 dark:border-slate-800
                                last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/30
                                transition-colors cursor-pointer">
                  {viewMode === 'action' && (
                    <span className="mono text-[10px] font-semibold text-blue-400 uppercase
                                     w-28 shrink-0 pt-0.5 truncate">
                      {item.siteId || '—'}
                    </span>
                  )}
                  <span className="mono text-xs text-slate-600 dark:text-slate-400 w-24 shrink-0 pt-0.5">
                    {item.controlId || '—'}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-slate-900 dark:text-white leading-snug">
                      {item.description || '—'}
                    </div>
                    {item.notes && (
                      <div className="mono text-[10px] text-slate-500 dark:text-slate-400
                                      mt-1.5 leading-relaxed" style={{fontStyle:'italic'}}>
                        {item.notes}
                      </div>
                    )}
                  </div>
                  <div className="w-20 flex justify-end shrink-0">
                    <span className={`mono text-[9px] font-semibold uppercase tracking-[.12em]
                                     px-2 py-0.5 rounded border ${statusCls(item.status)}`}>
                      {item.status || 'N/A'}
                    </span>
                  </div>
                </div>
              ))
            )}
          </div>

          {items.length > 0 && (
            <div className="mono text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest">
              {items.length} item{items.length !== 1 ? 's' : ''}
              {viewMode === 'action' && (
                <span className="text-amber-400 ml-1.5">· action required</span>
              )}
            </div>
          )}
        </>
      )}

      {/* ── Slide-over drawer (edit inspection item) ─────────────────────── */}
      {/* Backdrop */}
      <div onClick={closeDrawer}
           className="fixed inset-0 z-40 transition-opacity duration-200"
           style={{
             background:    'rgba(11,17,32,.60)',
             opacity:       drawerOpen ? 1 : 0,
             pointerEvents: drawerOpen ? 'auto' : 'none',
           }}/>

      {/* Panel */}
      <div className="fixed top-0 right-0 z-50 h-full w-full max-w-sm flex flex-col
                      transition-transform duration-300 ease-in-out"
           style={{
             background:  'var(--zt-surface)',
             borderLeft:  '1px solid var(--zt-border)',
             transform:   drawerOpen ? 'translateX(0)' : 'translateX(100%)',
           }}>

        {/* Header */}
        <div className="flex items-center justify-between px-6 py-5 shrink-0
                        border-b border-slate-200 dark:border-slate-700/50">
          <div>
            <div className="mono text-[9px] uppercase tracking-[.15em] mb-0.5"
                 style={{color:'var(--zt-dim)'}}>Edit Inspection Item</div>
            <div className="text-base font-semibold" style={{color:'var(--zt-text)'}}>
              {editTarget?.controlId || '—'}
            </div>
          </div>
          <button onClick={closeDrawer}
                  className="w-7 h-7 flex items-center justify-center rounded-lg transition-colors"
                  style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)',color:'var(--zt-dim)'}}>
            <i className="fa-solid fa-xmark text-[11px]"/>
          </button>
        </div>

        {/* Form — flex-col so footer stays pinned to bottom */}
        <form onSubmit={handleUpdateItem} className="flex-1 flex flex-col overflow-hidden">

          {/* Scrollable fields */}
          <div className="flex-1 overflow-y-auto p-6 space-y-5">

            {/* Read-only info block */}
            <div className="rounded-lg px-4 py-3.5 space-y-2.5"
                 style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
              <div className="flex items-center justify-between gap-3">
                <span className="mono text-[9px] uppercase tracking-[.12em]"
                      style={{color:'var(--zt-dim)'}}>Control ID</span>
                <span className="mono text-xs font-semibold"
                      style={{color:'var(--zt-text)'}}>{editTarget?.controlId || '—'}</span>
              </div>
              {editTarget?.siteId && (
                <div className="flex items-center justify-between gap-3">
                  <span className="mono text-[9px] uppercase tracking-[.12em]"
                        style={{color:'var(--zt-dim)'}}>Facility</span>
                  <span className="mono text-xs font-semibold text-blue-400">
                    {editTarget.siteId}
                  </span>
                </div>
              )}
              {editTarget?.description && (
                <div className="pt-2 mt-0.5 border-t border-slate-200 dark:border-slate-700/50">
                  <span className="mono text-[9px] uppercase tracking-[.12em] block mb-1.5"
                        style={{color:'var(--zt-dim)'}}>Description</span>
                  <p className="text-xs leading-relaxed"
                     style={{color:'var(--zt-text)'}}>{editTarget.description}</p>
                </div>
              )}
            </div>

            <FormField label="Status" required>
              <select className={SELECT_CLS}
                      value={editForm.status}
                      onChange={e => setEditForm(f => ({ ...f, status: e.target.value }))}
                      required>
                <option value="Pass">Pass</option>
                <option value="Fail">Fail</option>
                <option value="Pending">Pending</option>
                <option value="N/A">N/A</option>
              </select>
            </FormField>

            <FormField label="Remediation Notes">
              <textarea className={INPUT_CLS + ' resize-none'}
                        rows={5}
                        placeholder="Describe remediation steps, findings, or additional context…"
                        value={editForm.notes}
                        onChange={e => setEditForm(f => ({ ...f, notes: e.target.value }))}/>
            </FormField>

            {saveError && (
              <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg
                              bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800/50">
                <i className="fa-solid fa-circle-exclamation text-red-500 dark:text-red-400
                               text-sm shrink-0 mt-0.5"/>
                <span className="mono text-xs text-red-700 dark:text-red-300 break-words">
                  {saveError}
                </span>
              </div>
            )}
          </div>

          {/* Footer — pinned */}
          <div className="px-6 py-4 shrink-0 flex gap-3
                          border-t border-slate-200 dark:border-slate-700/50">
            <button type="button" onClick={closeDrawer}
                    className="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors
                               text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800
                               border border-slate-200 dark:border-slate-700
                               hover:bg-slate-50 dark:hover:bg-slate-700">
              Cancel
            </button>
            <button type="submit" disabled={saving}
                    className="flex-1 flex items-center justify-center gap-2 px-4 py-2.5
                               rounded-lg text-sm font-medium text-white bg-blue-600
                               hover:bg-blue-500 transition-colors
                               disabled:opacity-50 disabled:cursor-not-allowed">
              {saving
                ? <><i className="fa-solid fa-rotate-right animate-spin text-xs"/><span>Saving…</span></>
                : <><i className="fa-solid fa-floppy-disk text-xs"/><span>Save Changes</span></>
              }
            </button>
          </div>

        </form>
      </div>

      {/* ── Import Modal ──────────────────────────────────────────────────── */}
      {importOpen && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{background:'rgba(11,17,32,.82)',backdropFilter:'blur(6px)'}}
             onClick={e => { if (e.target === e.currentTarget) closeImport(); }}>
          <div className="modal-zoom-in relative w-full max-w-md rounded-2xl"
               style={{background:'var(--zt-surface)',border:'1px solid var(--zt-border)'}}>

            <button onClick={closeImport}
                    className="absolute top-4 right-4 z-10 w-7 h-7 flex items-center justify-center
                               rounded-lg transition-colors text-zt-dim hover:text-zt-text"
                    style={{background:'var(--zt-hover)',border:'1px solid var(--zt-border)'}}>
              <i className="fa-solid fa-xmark text-[11px]"/>
            </button>

            <div className="p-6 pr-12">
              <div className="flex items-center gap-3 mb-6">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                     style={{background:'rgba(59,130,246,.12)'}}>
                  <i className="fa-solid fa-file-import text-sm" style={{color:'#3B82F6'}}/>
                </div>
                <div>
                  <div className="mono text-[10px] uppercase tracking-[.15em] text-zt-dim mb-0.5">
                    Upload File
                  </div>
                  <div className="text-lg font-light text-zt-text">Import Checklist</div>
                </div>
              </div>

              <form onSubmit={handleImport} className="space-y-5">

                <FormField label="Target Site" required>
                  <select className={SELECT_CLS} value={importSite}
                          onChange={e => setImportSite(e.target.value)} required>
                    <option value="">Select a site…</option>
                    {sites.map(s => (
                      <option key={s.id || s._id} value={s.id || s._id}>{s.name}</option>
                    ))}
                  </select>
                </FormField>

                <FormField label="Checklist File (.json or .csv)" required>
                  <label className={[
                    'flex flex-col items-center justify-center gap-2.5 px-4 py-8',
                    'rounded-lg border-2 border-dashed cursor-pointer transition-colors',
                    importFile
                      ? 'border-blue-500/50 bg-blue-500/[.04]'
                      : 'border-slate-300 dark:border-slate-600 hover:border-blue-500/40',
                  ].join(' ')}>
                    <i className={`fa-solid text-2xl ${
                      importFile ? 'fa-file-check text-blue-400' : 'fa-cloud-arrow-up text-zt-dim'
                    }`}/>
                    <div className="text-center">
                      {importFile
                        ? <span className="mono text-xs font-medium text-blue-400">{importFile.name}</span>
                        : <>
                            <span className="mono text-xs text-zt-muted block">Click to browse</span>
                            <span className="mono text-[10px] text-zt-dim">or drag &amp; drop a .json / .csv</span>
                          </>
                      }
                    </div>
                    <input type="file" accept=".json,.csv" className="hidden"
                           onChange={e => {
                             setImportFile(e.target.files[0] || null);
                             setImportError(''); setImportSuccess('');
                           }}/>
                  </label>
                </FormField>

                {importError && (
                  <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg
                                  bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800/50">
                    <i className="fa-solid fa-circle-exclamation text-red-500 dark:text-red-400 text-sm shrink-0 mt-0.5"/>
                    <span className="mono text-xs text-red-700 dark:text-red-300 break-words">{importError}</span>
                  </div>
                )}
                {importSuccess && (
                  <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg
                                  bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-800/40">
                    <i className="fa-solid fa-circle-check text-emerald-500 dark:text-emerald-400 text-sm shrink-0 mt-0.5"/>
                    <span className="mono text-xs text-emerald-700 dark:text-emerald-300">{importSuccess}</span>
                  </div>
                )}

                <div className="flex items-center justify-end gap-3 pt-1">
                  <button type="button" onClick={closeImport}
                          className="px-4 py-2 rounded-lg text-sm font-medium
                                     text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800
                                     border border-slate-200 dark:border-slate-700
                                     hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                    Cancel
                  </button>
                  <button type="submit" disabled={importing || !importFile || !importSite}
                          className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium
                                     bg-blue-600 hover:bg-blue-500 text-white
                                     transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    {importing
                      ? <><i className="fa-solid fa-rotate-right animate-spin text-xs"/><span>Importing…</span></>
                      : <><i className="fa-solid fa-file-import text-xs"/><span>Import</span></>
                    }
                  </button>
                </div>

              </form>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function ComplianceSection({ data }) {
  const compliance      = data.compliance || {};
  const controlFamilies = (compliance.controlFamilies || []);
  const sites           = data.sites || [];

  const [activeTab, setActiveTab] = useState('baseline');  // 'baseline' | 'inspections'

  // ── Control matrix state (fetched from aggregation endpoint) ─────────────
  const [matrix,        setMatrix]        = useState([]);
  const [matrixLoading, setMatrixLoading] = useState(false);
  const [matrixError,   setMatrixError]   = useState('');

  /*
   * Fetch the control matrix when the baseline tab is active.
   * The dependency on `activeTab` means we only fetch when the user is
   * actually viewing this tab, and we refetch if they navigate away and back.
   */
  useEffect(() => {
    if (activeTab !== 'baseline') return;
    async function loadMatrix() {
      setMatrixLoading(true); setMatrixError('');
      try {
        const res  = await fetch('/api/compliance/matrix', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setMatrix(Array.isArray(json) ? json : []);
      } catch (err) {
        setMatrixError(err.message); setMatrix([]);
      } finally { setMatrixLoading(false); }
    }
    loadMatrix();
  }, [activeTab]);

  return (
    <div className="max-w-5xl mx-auto space-y-5">

      <SectionHeader eyebrow="RMF Control Baseline" title="Regulatory Governance"/>

      {/* ── Internal sub-navigation ───────────────────────────────────────── */}
      <div className="flex items-center gap-1 pb-0.5 border-b border-zt-border">
        <button className={`tab-btn ${activeTab === 'baseline' ? 'active' : ''}`}
                onClick={() => setActiveTab('baseline')}>
          <i className="fa-solid fa-shield-halved text-[10px] mr-1.5"/>
          Control Baseline
        </button>
        <button className={`tab-btn ${activeTab === 'inspections' ? 'active' : ''}`}
                onClick={() => setActiveTab('inspections')}>
          <i className="fa-solid fa-clipboard-check text-[10px] mr-1.5"/>
          Self-Inspections
        </button>
      </div>

      {/* ── Tab 1: Control Baseline ───────────────────────────────────────── */}
      {activeTab === 'baseline' && (
        <div className="space-y-6">

          {/* ── Dynamic Cross-Site Control Matrix ──────────────────────────── */}
          <div className="rounded-xl overflow-hidden bg-white dark:bg-slate-900/40
                          border border-slate-200 dark:border-slate-700/50">

            {/* Matrix header */}
            <div className="flex items-center justify-between px-5 py-4
                            border-b border-slate-200 dark:border-slate-700/50
                            bg-slate-50 dark:bg-slate-800/40">
              <span className="mono text-[10px] font-semibold uppercase tracking-[.14em]
                               text-slate-500 dark:text-slate-400">
                Cross-Site Control Matrix — Applicability-Weighted
              </span>
              {!matrixLoading && matrix.length > 0 && (
                <span className="mono text-[10px] text-slate-500 dark:text-slate-400">
                  {matrix.length} control{matrix.length !== 1 ? 's' : ''}
                </span>
              )}
            </div>

            {matrixLoading ? (
              <div className="flex items-center gap-2.5 py-10 justify-center">
                <i className="fa-solid fa-rotate-right animate-spin text-blue-400"/>
                <span className="mono text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest">
                  Running aggregation…
                </span>
              </div>
            ) : matrixError ? (
              <div className="mono text-xs text-red-400 text-center py-8">{matrixError}</div>
            ) : matrix.length === 0 ? (
              <EmptyState message="No inspection data — import checklists in the Self-Inspections tab"/>
            ) : (
              /*
               * Each row shows one control's applicability-weighted compliance.
               *
               * Denominator = totalApplicableSites (sites that HAVE this control)
               * Numerator   = compliantSites       (of those, how many passed)
               *
               * Threat color thresholds: 100% → Emerald, 50-99% → Amber, <50% → Red
               * This mirrors the strict palette used across the entire MASH UI.
               */
              matrix.map(ctrl => {
                const pct = ctrl.totalApplicableSites > 0
                  ? Math.round((ctrl.compliantSites / ctrl.totalApplicableSites) * 100)
                  : 0;
                const barCls = pct === 100 ? 'bg-emerald-500'
                             : pct >= 50   ? 'bg-amber-500'
                                           : 'bg-red-500';
                const txtCls = pct === 100 ? 'text-emerald-600 dark:text-emerald-400'
                             : pct >= 50   ? 'text-amber-600 dark:text-amber-400'
                                           : 'text-red-600 dark:text-red-400';
                return (
                  <div key={ctrl.controlId}
                       className="flex flex-col md:flex-row md:items-center gap-x-5 gap-y-3
                                  px-5 py-4 border-b border-slate-100 dark:border-slate-800
                                  last:border-0 transition-colors
                                  hover:bg-slate-50 dark:hover:bg-slate-800/30">

                    {/* Control ID badge */}
                    <div className="shrink-0 md:w-20">
                      <span className="mono text-[10px] font-bold uppercase tracking-widest
                                       px-2 py-0.5 rounded
                                       bg-slate-100 dark:bg-slate-800
                                       text-slate-700 dark:text-slate-300
                                       border border-slate-200 dark:border-slate-700">
                        {ctrl.controlId || '—'}
                      </span>
                    </div>

                    {/* Control description */}
                    <div className="flex-1 min-w-0">
                      <span className="text-sm text-slate-900 dark:text-white leading-snug">
                        {ctrl.description || '—'}
                      </span>
                    </div>

                    {/* Applicability bar + exact readout */}
                    <div className="shrink-0 md:w-72">
                      <div className="flex items-center justify-between mb-1.5">
                        <span className={`mono text-[9px] font-semibold uppercase tracking-wider ${txtCls}`}>
                          {ctrl.compliantSites} / {ctrl.totalApplicableSites} applicable sites secured
                        </span>
                        <span className={`mono text-xs font-bold ${txtCls}`}>{pct}%</span>
                      </div>
                      <div className="w-full h-1.5 rounded-full bg-slate-100 dark:bg-slate-800">
                        <div className={`h-1.5 rounded-full transition-all duration-700 ${barCls}`}
                             style={{width:`${pct}%`}}/>
                      </div>
                    </div>

                  </div>
                );
              })
            )}
          </div>

          {/* ── Control Families Policy Reference ──────────────────────────── */}
          {controlFamilies.length > 0 && (
            <div className="rounded-xl overflow-hidden bg-white dark:bg-slate-900/40
                            border border-slate-200 dark:border-slate-700/50">
              <div className="px-5 py-4 border-b border-slate-200 dark:border-slate-700/50
                              bg-slate-50 dark:bg-slate-800/40">
                <span className="mono text-[10px] font-semibold uppercase tracking-[.14em]
                                 text-slate-500 dark:text-slate-400">
                  Global Policy Implementation — Control Families
                </span>
              </div>
              {controlFamilies.map(cf => (
                <div key={cf.id}
                     className="flex flex-col md:flex-row md:items-center gap-x-5 gap-y-2
                                px-5 py-3.5 border-b border-slate-100 dark:border-slate-800
                                last:border-0 transition-colors
                                hover:bg-slate-50 dark:hover:bg-slate-800/30">
                  <div className="shrink-0 md:w-12">
                    <span className="mono text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded
                                     bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300
                                     border border-slate-200 dark:border-slate-700">
                      {cf.id}
                    </span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <span className="text-sm font-medium text-slate-900 dark:text-white">{cf.name}</span>
                  </div>
                  <div className="shrink-0 md:w-40">
                    <span className="mono text-xs text-slate-700 dark:text-slate-300">{cf.policy || '—'}</span>
                  </div>
                  <div className="flex items-center gap-2 shrink-0 md:w-32">
                    <span className={`w-2 h-2 rounded-full shrink-0 ${complianceDotClass(cf.status)}`}/>
                    <span className={`mono text-[10px] font-semibold uppercase tracking-[.1em] ${complianceStatusClasses(cf.status)}`}>
                      {cf.status || 'unknown'}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          )}

        </div>
      )}

      {/* ── Tab 2: Self-Inspections ───────────────────────────────────────── */}
      {activeTab === 'inspections' && (
        <InspectionTab sites={sites}/>
      )}

    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   VIEW 5 — BUDGET
   FY26 financial overview: totals, per-site bars, transaction history.
════════════════════════════════════════════════════════════════════════════ */
function BudgetView({ data }) {
  // ── Legacy budget data (transactions only) ───────────────────────────────
  const budget = data.budget || {};
  const txns   = budget.recentTransactions || [];
  const sites  = data.sites || [];

  // ── Internal tab state ───────────────────────────────────────────────────
  const [activeTab, setActiveTab] = useState('ledger'); // 'ledger' | 'utilization'

  // ── Contracts state (fetched from /api/contracts) ────────────────────────
  const [contracts,  setContracts]  = useState([]);
  const [loading,    setLoading]    = useState(false);
  const [fetchError, setFetchError] = useState('');

  useEffect(() => {
    async function load() {
      setLoading(true); setFetchError('');
      try {
        const res  = await fetch('/api/contracts', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setContracts(Array.isArray(json) ? json : (json.data || []));
      } catch (err) {
        setFetchError(err.message);
      } finally { setLoading(false); }
    }
    load();
  }, []);

  // ── Site utilization state (fetched on demand when tab is active) ─────────
  const [siteBurn,    setSiteBurn]    = useState([]);
  const [utilLoading, setUtilLoading] = useState(false);
  const [utilError,   setUtilError]   = useState('');

  useEffect(() => {
    if (activeTab !== 'utilization') return;
    async function load() {
      setUtilLoading(true); setUtilError('');
      try {
        const res  = await fetch('/api/budget/site-utilization', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setSiteBurn(Array.isArray(json) ? json : []);
      } catch (err) {
        setUtilError(err.message);
      } finally { setUtilLoading(false); }
    }
    load();
  }, [activeTab]);

  // ── Audit trail state (fetched on demand when tab is active) ─────────────
  const [auditLog,     setAuditLog]     = useState([]);
  const [auditLoading, setAuditLoading] = useState(false);
  const [auditError,   setAuditError]   = useState('');

  useEffect(() => {
    if (activeTab !== 'audit') return;
    async function load() {
      setAuditLoading(true); setAuditError('');
      try {
        const res  = await fetch('/api/budget/transactions', { headers: AUTH.hdrs() });
        const json = await safeJson(res);
        setAuditLog(Array.isArray(json) ? json : []);
      } catch (err) {
        setAuditError(err.message);
      } finally { setAuditLoading(false); }
    }
    load();
  }, [activeTab]);

  // ── KPIs derived by reducing the contracts array ──────────────────────────
  const totalAllocated = contracts.reduce((s, c) => s + (c.totalValue  || 0), 0);
  const totalSpent     = contracts.reduce((s, c) => s + (c.amountSpent || 0), 0);
  const remaining      = totalAllocated - totalSpent;
  const burn           = totalAllocated ? Math.round((totalSpent / totalAllocated) * 100) : 0;
  const burnColor      = burn > 85 ? '#EF4444' : burn > 70 ? '#F59E0B' : '#10B981';

  // ── Drawer state ─────────────────────────────────────────────────────────
  const [drawerOpen,  setDrawerOpen]  = useState(false);
  const [drawerMode,  setDrawerMode]  = useState('create'); // 'create' | 'edit' | 'expense'
  const [editTarget,  setEditTarget]  = useState(null);
  const [form,        setForm]        = useState({ contractId: '', vendor: '', scope: '', siteId: '', totalValue: '', expiration: '', status: 'Active' });
  const [expForm,     setExpForm]     = useState({ targetId: '', amount: '' });
  const [saving,      setSaving]      = useState(false);
  const [saveError,   setSaveError]   = useState('');

  const EMPTY_FORM = { contractId: '', vendor: '', scope: '', siteId: '', totalValue: '', expiration: '', status: 'Active' };

  function openCreate() {
    setDrawerMode('create');
    setEditTarget(null);
    setForm(EMPTY_FORM);
    setSaveError('');
    setDrawerOpen(true);
  }
  function openEdit(contract) {
    setDrawerMode('edit');
    setEditTarget(contract);
    setForm({
      contractId: contract.contractId || '',
      vendor:     contract.vendor     || '',
      scope:      contract.scope      || '',
      siteId:     contract.siteId     || '',
      totalValue: contract.totalValue != null ? String(contract.totalValue) : '',
      expiration: contract.expiration ? String(contract.expiration).slice(0, 10) : '',
      status:     contract.status     || 'Active',
    });
    setSaveError('');
    setDrawerOpen(true);
  }
  function openExpense() {
    const firstId = contracts[0] ? (contracts[0].id || contracts[0]._id || '') : '';
    setDrawerMode('expense');
    setEditTarget(null);
    setExpForm({ targetId: firstId, amount: '' });
    setSaveError('');
    setDrawerOpen(true);
  }
  function closeDrawer() { setDrawerOpen(false); setSaveError(''); }

  /*
   * handleSave — three branches:
   *   create  → POST /api/contracts → spread new doc into state
   *   edit    → PUT  /api/contracts/:id → map to replace the updated row
   *   expense → PUT  /api/contracts/:id with new amountSpent → map to update the row
   */
  async function handleSave(e) {
    e.preventDefault();
    setSaving(true); setSaveError('');
    try {
      if (drawerMode === 'expense') {
        const target = contracts.find(c => (c.id || c._id) === expForm.targetId);
        if (!target) throw new Error('Select a contract first');
        if (!expForm.amount || Number(expForm.amount) <= 0) throw new Error('Enter a positive expense amount');
        const newSpent = (target.amountSpent || 0) + Number(expForm.amount);
        const res  = await fetch(`/api/contracts/${expForm.targetId}`, {
          method:  'PUT',
          headers: AUTH.hdrs(),
          body:    JSON.stringify({ amountSpent: newSpent }),
        });
        const json = await safeJson(res);
        const updated = json.data;
        setContracts(prev => prev.map(c => (c.id || c._id) === expForm.targetId ? updated : c));

      } else if (drawerMode === 'create') {
        const res  = await fetch('/api/contracts', {
          method:  'POST',
          headers: AUTH.hdrs(),
          body:    JSON.stringify({ ...form, totalValue: Number(form.totalValue) || 0 }),
        });
        const json = await safeJson(res);
        setContracts(prev => [...prev, json.data]);

      } else {
        // edit
        const id  = editTarget.id || editTarget._id;
        const res = await fetch(`/api/contracts/${id}`, {
          method:  'PUT',
          headers: AUTH.hdrs(),
          body:    JSON.stringify({ ...form, totalValue: Number(form.totalValue) || 0 }),
        });
        const json = await safeJson(res);
        setContracts(prev => prev.map(c => (c.id || c._id) === id ? json.data : c));
      }
      closeDrawer();
    } catch (err) {
      setSaveError(err.message);
    } finally { setSaving(false); }
  }

  function contractStatusCls(status) {
    switch ((status || '').toLowerCase()) {
      case 'active':  return 'text-emerald-600 dark:text-emerald-400 bg-emerald-500/10 border-emerald-500/20';
      case 'pending': return 'text-amber-600   dark:text-amber-400   bg-amber-500/10   border-amber-500/20';
      default:        return 'text-slate-500   dark:text-slate-400   bg-slate-500/10   border-slate-500/20';
    }
  }

  return (
    <div className="max-w-5xl mx-auto space-y-6">

      {/* ── Header + action buttons (buttons only on ledger tab) ───────────── */}
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <SectionHeader eyebrow="FY26 Financials" title="Budget Utilization"/>
        {activeTab === 'ledger' && (
          <div className="flex items-center gap-2 shrink-0 pt-1">
            <button onClick={openCreate}
                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium
                               bg-blue-600 hover:bg-blue-500 text-white transition-colors">
              <i className="fa-solid fa-file-contract text-xs"/>
              Provision Contract
            </button>
            <button onClick={openExpense}
                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium
                               transition-colors text-slate-700 dark:text-slate-300
                               bg-white dark:bg-slate-800
                               border border-slate-200 dark:border-slate-700
                               hover:bg-slate-50 dark:hover:bg-slate-700">
              <i className="fa-solid fa-circle-dollar-to-slot text-xs"/>
              Log Expense
            </button>
          </div>
        )}
      </div>

      {/* ── KPI cards (derived from contracts state via reduce) ───────────── */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <StatCard label="Total Allocated" value={fmtMoney(totalAllocated)} sub="Capital authorized"   icon="fa-vault"        accent="#94A3B8"/>
        <StatCard label="Spent to Date"   value={fmtMoney(totalSpent)}     sub="Across all contracts" icon="fa-credit-card"  accent={burnColor}/>
        <StatCard label="Remaining"       value={fmtMoney(remaining)}      sub="Available balance"    icon="fa-piggy-bank"   accent="#3B82F6"/>
        <StatCard label="Burn Rate"       value={`${burn}%`}               sub="Of total allocated"   icon="fa-fire"         accent={burnColor}/>
      </div>

      {/* ── Tab nav ──────────────────────────────────────────────────────── */}
      <div className="flex items-center gap-2">
        <button className={`tab-btn ${activeTab === 'ledger' ? 'active' : ''}`}
                onClick={() => setActiveTab('ledger')}>
          <i className="fa-solid fa-file-contract text-[10px] mr-1.5"/>
          Master Ledger
        </button>
        <button className={`tab-btn ${activeTab === 'utilization' ? 'active' : ''}`}
                onClick={() => setActiveTab('utilization')}>
          <i className="fa-solid fa-map-location-dot text-[10px] mr-1.5"/>
          Site Utilization
        </button>
