server {
    listen 3003;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the crater-api container (Docker internal DNS)
    location /api/ {
        proxy_pass         http://crater-api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # All other requests → React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html so deployments take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Aggressive caching for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
