<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Signing in to CRATER…</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; background: #0d1117; font-family: monospace; color: #58a6ff; }
  </style>
</head>
<body>
  <p>Authenticating via MTSI Hub SSO…</p>
  <script>
    (async function () {
      var params   = new URLSearchParams(window.location.search);
      var hubToken = params.get('hub_token');
      if (!hubToken) { window.location.href = '/login'; return; }
      try {
        var r    = await fetch('/api/auth/sso?hub_token=' + encodeURIComponent(hubToken));
        var data = await r.json();
        if (data.token && data.user) {
          localStorage.setItem('crater-token', data.token);
          localStorage.setItem('crater-user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          window.location.href = '/login';
        }
      } catch (e) {
        console.error('[CRATER SSO]', e);
        window.location.href = '/login';
      }
    })();
  </script>
</body>
</html>
